        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        if ($('previewAutoSaveToggle')) $('previewAutoSaveToggle').disabled = !templateReady;
        if ($('previewDirtyWarning')) {
            if (!templateReady) {
                $('previewDirtyWarning').textContent = '选择模板后可生成样张';
            } else if (state.editorDirty && shouldAutoSaveBeforePreview()) {
                $('previewDirtyWarning').textContent = '有未保存元素，预览会先保存';
            } else if (state.editorDirty) {
                $('previewDirtyWarning').textContent = '有未保存元素，预览可能不是最新';
            } else {
                $('previewDirtyWarning').textContent = '当前预览使用已保存模板';
            }
        }
    }

    function quickInspectorSelectionTitle(selected) {
        if (!selected.length) return '未选择元素';
        if (selected.length > 1) return `${selected.length} 个元素已选中`;
        return `${elementLabel(selected[0])} / ${selected[0].type || 'ELEMENT'}`;
    }

    function quickInspectorModeOptions() {
        return [
            {mode: 'content', label: '内容'},
            {mode: 'position', label: '位置'},
            {mode: 'style', label: '样式'},
            {mode: 'actions', label: '操作'}
        ];
    }

    function quickInspectorMode() {
        const modes = quickInspectorModeOptions().map((item) => item.mode);
        return modes.indexOf(state.quickInspectorMode) >= 0 ? state.quickInspectorMode : 'content';
    }

    function suggestedQuickInspectorModeForSelection(selected) {
        if (!selected || selected.length !== 1) return 'actions';
        const element = selected[0];
        if (elementUsesContentTools(element) || element.type === 'STATIC_TEXT') return 'content';
        return 'position';
    }

    function syncQuickInspectorModeForSelection(selected) {
        const selection = selected || [];
        const nextKey = selection.map((item) => item.id || '').join('|');
        const modes = quickInspectorModeOptions().map((item) => item.mode);
        if (state.quickInspectorSelectionKey !== nextKey) {
            state.quickInspectorSelectionKey = nextKey;
            state.quickInspectorMode = suggestedQuickInspectorModeForSelection(selection);
            return;
        }
        if (modes.indexOf(state.quickInspectorMode) < 0) {
            state.quickInspectorMode = suggestedQuickInspectorModeForSelection(selection);
        }
    }

    function setQuickInspectorMode(mode) {
        const modes = quickInspectorModeOptions().map((item) => item.mode);
        state.quickInspectorMode = modes.indexOf(mode) >= 0 ? mode : suggestedQuickInspectorModeForSelection(selectedEditorElements());
        renderCanvasQuickInspector();
    }

    function renderQuickInspectorModeTabs(activeMode) {
        const active = activeMode || quickInspectorMode();
        return `<div class="quickInspectorModeTabs quick-inspector-mode-tabs" id="quickInspectorModeTabs">
            <button type="button" class="${active === 'content' ? 'active' : ''}" data-quick-inspector-mode="content">内容</button>
            <button type="button" class="${active === 'position' ? 'active' : ''}" data-quick-inspector-mode="position">位置</button>
            <button type="button" class="${active === 'style' ? 'active' : ''}" data-quick-inspector-mode="style">样式</button>
            <button type="button" class="${active === 'actions' ? 'active' : ''}" data-quick-inspector-mode="actions">操作</button>
        </div>`;
    }

    function quickInspectorSection(mode, activeMode, content) {
        const hidden = mode === activeMode ? '' : 'hidden';
        return `<div class="quick-inspector-section quick-inspector-section-${escapeHtml(mode)}" data-quick-inspector-section="${escapeHtml(mode)}" ${hidden}>${content}</div>`;
    }

    function quickInspectorContent(element) {
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0) {
            return quickInspectorFieldBinding(element);
        }
        if (element.type === 'STATIC_TEXT') {
            const disabled = element.locked ? 'disabled' : '';
            return `<div class="quick-text-editor" id="quickTextEditor">
                <label for="quickElementText">文本<textarea id="quickElementText" data-live-inspector="true" ${disabled}>${escapeHtml(element.text || '')}</textarea></label>
            </div>`;
        }
        return '<div class="quick-inspector-note">当前组件没有可绑定字段或文本内容，可切到位置调整摆放。</div>';
    }

    function quickInspectorGeometry(element) {
        const disabled = element.locked ? 'disabled' : '';
        return `<div class="quickGeometryGrid" id="quickGeometryGrid">
            <label for="quickLeftMm">X<input id="quickLeftMm" data-live-inspector="true" type="number" step="0.5" value="${escapeHtml(element.leftMm || 0)}" ${disabled}></label>
            <label for="quickTopMm">Y<input id="quickTopMm" data-live-inspector="true" type="number" step="0.5" value="${escapeHtml(element.topMm || 0)}" ${disabled}></label>
            <label for="quickWidthMm">W<input id="quickWidthMm" data-live-inspector="true" type="number" step="0.5" value="${escapeHtml(element.widthMm || 20)}" ${disabled}></label>
            <label for="quickHeightMm">H<input id="quickHeightMm" data-live-inspector="true" type="number" step="0.5" value="${escapeHtml(element.heightMm || 8)}" ${disabled}></label>
        </div>`;
    }

    function quickInspectorFieldBinding(element) {
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) < 0) return '';
        const source = fieldSourceByName(element.fieldName);
        const sample = source && source.value ? source.value : '暂无样例值';
        const disabled = element.locked ? 'disabled' : '';
        return `<div class="quick-field-binding" id="quickFieldBinding">
            <label for="quickFieldName">字段<select id="quickFieldName" ${disabled}>${fieldOptions(element.fieldName)}</select></label>
            <span class="quick-inspector-note">${escapeHtml(sample)}</span>
        </div>`;
    }

    function quickInspectorStyle(element) {
        if (!elementUsesTextStyle(element)) return '';
        const disabled = element.locked ? 'disabled' : '';
        return `<div class="quick-style-grid" id="quickStyleGrid">
            <label for="quickFontSize">字号<input id="quickFontSize" data-live-inspector="true" type="number" min="6" value="${escapeHtml(element.fontSize || 10)}" ${disabled}></label>
            <label for="quickTextAlign">对齐<select id="quickTextAlign" ${disabled}>
                <option value="left" ${normalizeTextAlign(element.textAlign) === 'left' ? 'selected' : ''}>左</option>
                <option value="center" ${normalizeTextAlign(element.textAlign) === 'center' ? 'selected' : ''}>中</option>
                <option value="right" ${normalizeTextAlign(element.textAlign) === 'right' ? 'selected' : ''}>右</option>
            </select></label>
            <label class="checkbox-field" for="quickBold"><input id="quickBold" type="checkbox" ${element.bold ? 'checked' : ''} ${disabled}>加粗</label>
        </div>`;
    }

    function renderCanvasQuickInspector() {
        const panel = $('canvasQuickInspector');
        if (!panel) return;
        const selected = selectedEditorElements();
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        if (!templateReady || !selected.length) {
            panel.hidden = true;
            panel.className = 'canvas-quick-inspector quick-inspector-empty';
            panel.innerHTML = '';
            state.quickInspectorSelectionKey = '';
            return;
        }
        syncQuickInspectorModeForSelection(selected);
        const editableCount = selectedEditableElements().length;
        const title = quickInspectorSelectionTitle(selected);
        panel.hidden = false;
        panel.className = 'canvas-quick-inspector quickInspectorCompact';
        if (selected.length > 1) {
            panel.innerHTML = `<div class="quick-inspector-head">
                    <strong>${escapeHtml(title)}</strong>
                    <span>${editableCount} 可编辑</span>
                </div>
                <div class="quick-inspector-actions">
                    <button id="quickDuplicateBtn" type="button" ${editableCount ? '' : 'disabled'}>复制</button>
                    <button id="quickDeleteBtn" type="button" ${editableCount ? '' : 'disabled'}>删除</button>
                    <button id="quickLockBtn" type="button">锁定/解锁</button>
                    <button id="quickSaveBtn" type="button" class="primary">保存</button>
                </div>
                <div class="quick-inspector-note">批量尺寸、对齐和图层顺序仍在右侧属性面板中处理。</div>`;
            wireCanvasQuickInspector();
            return;
        }
        const element = selected[0];
        const activeMode = quickInspectorMode();
        const styleContent = quickInspectorStyle(element) || '<div class="quick-inspector-note">当前组件没有文字样式，可切到位置调整尺寸。</div>';
        const actionsContent = `<div class="quick-inspector-actions">
                <button id="quickDuplicateBtn" type="button" ${element.locked ? 'disabled' : ''}>复制</button>
                <button id="quickDeleteBtn" type="button" ${element.locked ? 'disabled' : ''}>删除</button>
                <button id="quickLockBtn" type="button">${element.locked ? '解锁' : '锁定'}</button>
                <button id="quickSaveBtn" type="button" class="primary">保存</button>
            </div>`;
        panel.innerHTML = `<div class="quick-inspector-head">
                <strong>${escapeHtml(title)}</strong>
                <span>${element.locked ? '已锁定' : '可编辑'}</span>
            </div>
            ${renderQuickInspectorModeTabs(activeMode)}
            ${quickInspectorSection('content', activeMode, quickInspectorContent(element))}
            ${quickInspectorSection('position', activeMode, quickInspectorGeometry(element))}
            ${quickInspectorSection('style', activeMode, styleContent)}
            ${quickInspectorSection('actions', activeMode, actionsContent)}`;
        wireCanvasQuickInspector();
    }

    function renderModificationActionDock() {
        const dock = $('modificationActionDock');
        if (!dock) return;
        const selected = selectedEditorElements();
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        if (!templateReady || !selected.length) {
            dock.hidden = true;
            dock.className = 'modificationActionDock modification-action-dock dock-empty';
            dock.innerHTML = '';
            return;
        }
        const editableCount = selectedEditableElements().length;
        const disabledAttr = editableCount ? '' : 'disabled';
        const step = currentSnapStepMm();
        dock.hidden = false;
        dock.className = 'modificationActionDock modification-action-dock';
        dock.innerHTML = `<div class="modification-dock-summary">
                <strong>${escapeHtml(quickInspectorSelectionTitle(selected))}</strong>
                <span>${editableCount} 可编辑 / 步进 ${escapeHtml(step)}mm</span>
            </div>
            <div class="modification-dock-controls">
                <div class="modification-dock-group" aria-label="位置微调">
                    <button type="button" data-modifier-action="nudge-left" title="左移" ${disabledAttr}>&#8592;</button>
                    <button type="button" data-modifier-action="nudge-up" title="上移" ${disabledAttr}>&#8593;</button>
                    <button type="button" data-modifier-action="nudge-down" title="下移" ${disabledAttr}>&#8595;</button>
                    <button type="button" data-modifier-action="nudge-right" title="右移" ${disabledAttr}>&#8594;</button>
                </div>
                <div class="modification-dock-group" aria-label="尺寸微调">
                    <button type="button" class="dock-wide" data-modifier-action="shrink-width" title="减小宽度" ${disabledAttr}>W-</button>
                    <button type="button" class="dock-wide" data-modifier-action="grow-width" title="增大宽度" ${disabledAttr}>W+</button>
                    <button type="button" class="dock-wide" data-modifier-action="shrink-height" title="减小高度" ${disabledAttr}>H-</button>
                    <button type="button" class="dock-wide" data-modifier-action="grow-height" title="增大高度" ${disabledAttr}>H+</button>
                </div>
                <div class="modification-dock-group" aria-label="常用操作">
                    <button type="button" class="dock-wide" data-modifier-action="duplicate" ${disabledAttr}>复制</button>
                    <button type="button" class="dock-wide" data-modifier-action="delete" ${disabledAttr}>删除</button>
                    <button type="button" class="dock-wide" data-modifier-action="lock">锁定</button>
                    <button type="button" class="dock-wide primary" data-modifier-action="save">保存</button>
                </div>
            </div>`;
        wireModificationActionDock();
    }

    function wireModificationActionDock() {
        Array.prototype.forEach.call(document.querySelectorAll('[data-modifier-action]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => handleModifierDockAction(button.getAttribute('data-modifier-action')));
        });
    }

    function handleModifierDockAction(action) {
        const step = currentSnapStepMm();
        if (action === 'nudge-left') return nudgeSelectedElements(-step, 0);
        if (action === 'nudge-right') return nudgeSelectedElements(step, 0);
        if (action === 'nudge-up') return nudgeSelectedElements(0, -step);
        if (action === 'nudge-down') return nudgeSelectedElements(0, step);
        if (action === 'shrink-width') return resizeSelectedElementsBy(-step, 0);
        if (action === 'grow-width') return resizeSelectedElementsBy(step, 0);
        if (action === 'shrink-height') return resizeSelectedElementsBy(0, -step);
        if (action === 'grow-height') return resizeSelectedElementsBy(0, step);
        if (action === 'duplicate') return duplicateSelectedElements();
        if (action === 'delete') return deleteSelectedElement();
        if (action === 'lock') return toggleSelectedElementLock();
        if (action === 'save') return saveEditorFromShortcut();
        setStatus('middleStatus', '未知快捷操作', 'error');
        return null;
    }

    function activeQuickInspectorControlBinding(node) {
        if (!node || !node.id) return null;
        const bindings = {
            quickFieldName: 'fieldName',
            quickLeftMm: 'leftMm',
            quickTopMm: 'topMm',
            quickWidthMm: 'widthMm',
            quickHeightMm: 'heightMm',
            quickFontSize: 'fontSize',
            quickTextAlign: 'textAlign',
            quickBold: 'bold',
            quickElementText: 'text'
        };
        const field = bindings[node.id];
        if (!field) return null;
        return {
            field: field,
            value: node.type === 'checkbox' ? node.checked : node.value
        };
    }

    function wireCanvasQuickInspector() {
        const bindField = (id, field) => {
            const node = $(id);
            if (!node) return;
            if (['quickLeftMm', 'quickTopMm', 'quickWidthMm', 'quickHeightMm', 'quickFontSize', 'quickElementText'].indexOf(id) >= 0) {
                wireLiveInspectorInput(node, field);
            } else {
                node.onchange = () => runAction('middleStatus', () => updateSelectedElementField(field, node.type === 'checkbox' ? node.checked : node.value));
            }
        };
        Array.prototype.forEach.call(document.querySelectorAll('[data-quick-inspector-mode]'), (button) => {
            button.onclick = () => setQuickInspectorMode(button.getAttribute('data-quick-inspector-mode'));
        });
        bindField('quickFieldName', 'fieldName');
        bindField('quickElementText', 'text');
        bindField('quickLeftMm', 'leftMm');
        bindField('quickTopMm', 'topMm');
        bindField('quickWidthMm', 'widthMm');
        bindField('quickHeightMm', 'heightMm');
        bindField('quickFontSize', 'fontSize');
        bindField('quickTextAlign', 'textAlign');
        bindField('quickBold', 'bold');
        if ($('quickDuplicateBtn')) {
            $('quickDuplicateBtn').onclick = () => runAction('middleStatus', duplicateSelectedElements);
        }
        if ($('quickDeleteBtn')) {
            $('quickDeleteBtn').onclick = () => runAction('middleStatus', deleteSelectedElement);
        }
        if ($('quickLockBtn')) {
            $('quickLockBtn').onclick = () => runAction('middleStatus', () => toggleSelectedElementLock());
        }
        if ($('quickSaveBtn')) {
            $('quickSaveBtn').onclick = () => runAction('middleStatus', saveEditorFromShortcut);
        }
    }

    function validateTemplateElements() {
        const issues = [];
        if (!state.editorTemplate) return issues;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const validTypes = ['STATIC_TEXT', 'FIELD_TEXT', 'BARCODE', 'QRCODE', 'LOGO', 'LINE', 'RECTANGLE'];
        if (!state.editorElements.length) {
            issues.push({severity: 'warning', kind: 'empty-template', message: '模板还没有元素，预览和打印会是空白。'});
        }
        missingRequiredFieldContracts().forEach((field) => {
            issues.push({
                severity: 'warning',
                kind: 'missing-required-field',
                fieldName: field.fieldName,
                message: `缺少必填字段 ${field.displayName || field.fieldName}。`
            });
        });
        state.editorElements.forEach((element, index) => {
            const type = element.type || '';
            const label = `${index + 1}. ${elementLabel(element)}`;
            const width = Number(element.widthMm);
            const height = Number(element.heightMm);
            const left = Number(element.leftMm);
            const top = Number(element.topMm);
            if (validTypes.indexOf(type) < 0) {
                issues.push({severity: 'error', kind: 'invalid-type', elementId: element.id, message: `${label} 类型无效。`});
            }
            if (!isFinite(left) || !isFinite(top) || !isFinite(width) || !isFinite(height) || width <= 0 || height <= 0) {
                issues.push({severity: 'error', kind: 'invalid-geometry', elementId: element.id, message: `${label} 位置或尺寸无效。`});
            } else if (elementOutsidePage(element, pageWidth, pageHeight)) {
                issues.push({severity: 'error', kind: 'out-of-page', elementId: element.id, message: `${label} 超出页面范围。`});
            }
            if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(type) >= 0) {
                if (!element.fieldName) {
                    issues.push({severity: 'error', kind: 'unbound-field', elementId: element.id, message: `${label} 未绑定字段。`});
                } else if (state.fieldContract.length && !fieldContractByName(element.fieldName)) {
                    issues.push({severity: 'warning', kind: 'unknown-field', elementId: element.id, message: `${label} 字段 ${element.fieldName} 不在字段库中。`});
                }
            }
            if (type === 'STATIC_TEXT' && !String(element.text || '').trim()) {
                issues.push({severity: 'warning', kind: 'empty-text', elementId: element.id, message: `${label} 文本为空。`});
            }
        });
        return issues;
    }

    function elementOutsidePage(element, pageWidth, pageHeight) {
        const width = Number(element && element.widthMm);
        const height = Number(element && element.heightMm);
        const left = Number(element && element.leftMm);
        const top = Number(element && element.topMm);
        if (!isFinite(left) || !isFinite(top) || !isFinite(width) || !isFinite(height)) return false;
        return left < 0 || top < 0 || left + width > Number(pageWidth || 120) || top + height > Number(pageHeight || 80);
    }

    function healthSeverityText(severity) {
        return severity === 'error' ? '错误' : '提醒';
    }

    function uniqueIssueElementIds(issues) {
        const seen = {};
        const ids = [];
        (issues || []).forEach((issue) => {
            if (!issue.elementId || seen[issue.elementId]) return;
            seen[issue.elementId] = true;
            ids.push(issue.elementId);
        });
        return ids;
    }

    function templateHealthDetailsCollapsed() {
        return state.templateHealthDetailsCollapsed !== false;
    }

    function toggleTemplateHealthDetails() {
        state.templateHealthDetailsCollapsed = !templateHealthDetailsCollapsed();
        renderTemplateHealth();
    }

    function renderTemplateHealth() {
        const panel = $('templateHealthPanel');
        if (!panel) return;
        if (!state.editorTemplate) {
            panel.innerHTML = '';
            panel.className = 'template-health-panel';
            return;
        }
        const issues = validateTemplateElements();
        const detailsCollapsed = templateHealthDetailsCollapsed();
        panel.className = 'template-health-panel' + (detailsCollapsed ? ' template-health-details-collapsed' : '');
        const errorCount = issues.filter((issue) => issue.severity === 'error').length;
        const warningCount = issues.filter((issue) => issue.severity !== 'error').length;
        const missingRequiredFields = missingRequiredFieldContracts();
        const errorElementCount = uniqueIssueElementIds(issues.filter((issue) => issue.severity === 'error')).length;
        const warningElementCount = uniqueIssueElementIds(issues.filter((issue) => issue.severity !== 'error')).length;
        const unboundIssueCount = uniqueIssueElementIds(issues.filter((issue) => issue.kind === 'unbound-field')).length;
        const outOfPageIssueCount = uniqueIssueElementIds(issues.filter((issue) => issue.kind === 'out-of-page')).length;
        const autoFixableIssueCount = autoFixableTemplateIssues(issues).length;
        const missingRequiredAction = missingRequiredFields.length
            ? `<button id="addMissingRequiredFieldsBtn" type="button">补齐 ${missingRequiredFields.length} 个必填字段</button>`
            : '';
        const actions = `<div class="template-health-actions templateIssueNavigator" id="templateIssueNavigator">
                <button class="template-health-action-primary-fix" id="fixAllTemplateIssuesBtn" type="button" ${autoFixableIssueCount ? '' : 'disabled'}>全部修复 ${autoFixableIssueCount}</button>
                <button class="template-health-action-select" id="selectTemplateErrorIssuesBtn" type="button" ${errorElementCount ? '' : 'disabled'}>选错误 ${errorElementCount}</button>
                <button class="template-health-action-select" id="selectTemplateWarningIssuesBtn" type="button" ${warningElementCount ? '' : 'disabled'}>选提醒 ${warningElementCount}</button>
                <button class="template-health-action-select" id="selectUnboundIssueElementsBtn" type="button" ${unboundIssueCount ? '' : 'disabled'}>未绑定 ${unboundIssueCount}</button>
                <button class="template-health-action-select" id="selectOutOfPageIssueElementsBtn" type="button" ${outOfPageIssueCount ? '' : 'disabled'}>越界 ${outOfPageIssueCount}</button>
                <button class="template-health-action-fix" id="fixUnboundIssueElementsBtn" type="button" ${unboundIssueCount ? '' : 'disabled'}>修未绑定 ${unboundIssueCount}</button>
                <button class="template-health-action-fix" id="fixOutOfPageIssueElementsBtn" type="button" ${outOfPageIssueCount ? '' : 'disabled'}>收回越界 ${outOfPageIssueCount}</button>
                ${missingRequiredAction}
            </div>`;
        const list = issues.length ? issues.map((issue) => {
            const tag = issue.elementId ? 'button' : 'div';
            const elementAttr = issue.elementId ? ` data-health-element="${escapeHtml(issue.elementId)}"` : '';
            const typeAttr = tag === 'button' ? ' type="button"' : '';
            return `<${tag}${typeAttr} class="template-health-item issue-${escapeHtml(issue.severity)}"${elementAttr}>
                <span class="template-health-severity">${healthSeverityText(issue.severity)}</span>
                <span>${escapeHtml(issue.message)}</span>
            </${tag}>`;
        }).join('') : `<div class="template-health-item issue-ok">
                <span class="template-health-severity">正常</span>
                <span>没有发现明显配置问题。</span>
            </div>`;
        panel.innerHTML = `
            <div class="template-health-summary">
                <div class="template-health-summary-main">
                    <strong id="templateHealthSummary">模板体检</strong>
                    <span id="templateHealthDetailsStateText">${errorCount} 错误 / ${warningCount} 提醒，${detailsCollapsed ? '明细已收起' : '明细已展开'}</span>
                </div>
                <button class="template-health-details-toggle" id="templateHealthDetailsToggleBtn" type="button" aria-controls="templateHealthList" aria-expanded="${detailsCollapsed ? 'false' : 'true'}">${detailsCollapsed ? '展开明细' : '收起明细'}</button>
            </div>
            ${actions}
            <div class="template-health-list" id="templateHealthList">${list}</div>
        `;
        if ($('templateHealthDetailsToggleBtn')) {
            $('templateHealthDetailsToggleBtn').onclick = () => toggleTemplateHealthDetails();
        }
        Array.prototype.forEach.call(panel.querySelectorAll('[data-health-element]'), (button) => {
            button.onclick = () => focusTemplateIssue(button.getAttribute('data-health-element'));
        });
        if ($('fixAllTemplateIssuesBtn')) {
            $('fixAllTemplateIssuesBtn').onclick = () => runAction('middleStatus', fixAllTemplateIssues);
        }
        if ($('selectTemplateErrorIssuesBtn')) {
            $('selectTemplateErrorIssuesBtn').onclick = () => runAction('middleStatus', () => selectTemplateIssueElementsBySeverity('error'));
        }
        if ($('selectTemplateWarningIssuesBtn')) {
            $('selectTemplateWarningIssuesBtn').onclick = () => runAction('middleStatus', () => selectTemplateIssueElementsBySeverity('warning'));
        }
        if ($('selectUnboundIssueElementsBtn')) {
            $('selectUnboundIssueElementsBtn').onclick = () => runAction('middleStatus', selectUnboundIssueElements);
        }
        if ($('selectOutOfPageIssueElementsBtn')) {
            $('selectOutOfPageIssueElementsBtn').onclick = () => runAction('middleStatus', selectOutOfPageIssueElements);
        }
        if ($('fixUnboundIssueElementsBtn')) {
            $('fixUnboundIssueElementsBtn').onclick = () => runAction('middleStatus', fixUnboundIssueElements);
        }
        if ($('fixOutOfPageIssueElementsBtn')) {
            $('fixOutOfPageIssueElementsBtn').onclick = () => runAction('middleStatus', fixOutOfPageIssueElements);
        }
        if ($('addMissingRequiredFieldsBtn')) {
            $('addMissingRequiredFieldsBtn').onclick = () => runAction('middleStatus', addMissingRequiredFields);
        }
    }

    function focusTemplateIssue(elementId) {
        if (!elementId) return;
        const element = state.editorElements.find((item) => item.id === elementId);
        if (!element) {
            setStatus('middleStatus', '问题元素已不存在', 'error');
            renderTemplateHealth();
            return;
        }
        selectEditorElement(elementId, false);
        setRightPanelTab('properties');
        setStatus('middleStatus', `已定位 ${elementLabel(element)}`, 'ok');
    }

    function selectTemplateIssueElements(predicate, emptyMessage, okMessage) {
        if (!requireEditorTemplate('middleStatus')) return;
        const existingIds = state.editorElements.reduce((map, element) => {
            map[element.id] = true;
            return map;
        }, {});
        const ids = uniqueIssueElementIds(validateTemplateElements().filter((issue) =>
            issue.elementId && existingIds[issue.elementId] && (!predicate || predicate(issue))
        ));
        if (!ids.length) {
            setStatus('middleStatus', emptyMessage || '当前没有可选择的问题元素', 'ok');
            return;
        }
        state.canvasElementTypeFilter = '';
        state.selectedElementIds = ids;
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        const text = typeof okMessage === 'function' ? okMessage(ids.length) : okMessage;
        setStatus('middleStatus', text || `已选择 ${ids.length} 个问题元素`, 'ok');
    }

    function selectTemplateIssueElementsBySeverity(severity) {
        const isError = severity === 'error';
        return selectTemplateIssueElements(
            (issue) => isError ? issue.severity === 'error' : issue.severity !== 'error',
            isError ? '当前没有错误元素' : '当前没有提醒元素',
            (count) => isError ? `已选择 ${count} 个错误元素` : `已选择 ${count} 个提醒元素`
        );
    }

    function selectUnboundIssueElements() {
        return selectTemplateIssueElements(
            (issue) => issue.kind === 'unbound-field',
            '当前没有未绑定字段元素',
            (count) => `已选择 ${count} 个未绑定元素`
        );
    }

    function selectOutOfPageIssueElements() {
        return selectTemplateIssueElements(
            (issue) => issue.kind === 'out-of-page',
            '当前没有越界元素',
            (count) => `已选择 ${count} 个越界元素`
        );
    }

    function autoFixableTemplateIssues(issues) {
        const source = issues || validateTemplateElements();
        const elementsById = state.editorElements.reduce((map, element) => {
            if (element && element.id) map[element.id] = element;
            return map;
        }, {});
        const fixableKinds = ['invalid-geometry', 'out-of-page', 'unbound-field', 'empty-text'];
        return (source || []).filter((issue) => {
            if (!issue || !issue.kind) return false;
            if (issue.kind === 'missing-required-field') return !!issue.fieldName;
            const element = issue.elementId ? elementsById[issue.elementId] : null;
            return !!element && !element.locked && fixableKinds.indexOf(issue.kind) >= 0;
        });
    }

    function defaultElementGeometryForAutoFix(type) {
        if (type === 'QRCODE') return {widthMm: 20, heightMm: 20};
        if (type === 'BARCODE') return {widthMm: 65, heightMm: 16};
        if (type === 'LOGO') return {widthMm: 22, heightMm: 12};
        if (type === 'LINE') return {widthMm: 40, heightMm: 1};
        if (type === 'RECTANGLE') return {widthMm: 32, heightMm: 18};
        return {widthMm: 50, heightMm: 8};
    }

    function repairElementGeometryForAutoFix(element) {
        const defaults = defaultElementGeometryForAutoFix(element.type);
        const left = Number(element.leftMm);
        const top = Number(element.topMm);
        const width = Number(element.widthMm);
        const height = Number(element.heightMm);
        element.leftMm = roundMm(isFinite(left) ? left : 0);
        element.topMm = roundMm(isFinite(top) ? top : 0);
        element.widthMm = roundMm(isFinite(width) && width > 0 ? width : defaults.widthMm);
        element.heightMm = roundMm(isFinite(height) && height > 0 ? height : defaults.heightMm);
        return fitElementInsidePage(element);
    }

    function issueKindAllowed(kind, allowedKinds) {
        return !allowedKinds || allowedKinds.indexOf(kind) >= 0;
    }

    function applyTemplateIssueAutoFixes(options) {
        if (!requireEditorTemplate('middleStatus')) return {changedCount: 0, selectedIds: []};
        const allowedKinds = options && options.kinds ? options.kinds : null;
        const initialIssues = autoFixableTemplateIssues(validateTemplateElements())
            .filter((issue) => issueKindAllowed(issue.kind, allowedKinds));
        if (!initialIssues.length) return {changedCount: 0, selectedIds: []};
        snapshotEditorHistory();
        const touchedIds = {};
        const elementIssueKinds = initialIssues.reduce((map, issue) => {
            if (!issue.elementId) return map;
            if (!map[issue.elementId]) map[issue.elementId] = {};
            map[issue.elementId][issue.kind] = true;
            return map;
        }, {});
        const bindableTypes = ['FIELD_TEXT', 'BARCODE', 'QRCODE'];
        state.editorElements.forEach((element) => {
            if (!element || element.locked || !elementIssueKinds[element.id]) return;
            const kinds = elementIssueKinds[element.id];
            let changed = false;
            if (kinds['invalid-geometry']) {
                repairElementGeometryForAutoFix(element);
                changed = true;
            } else if (kinds['out-of-page']) {
                fitElementInsidePage(element);
                changed = true;
            }
            if (kinds['unbound-field'] && bindableTypes.indexOf(element.type) >= 0) {
                ensureFieldBindingForType(element, element.type);
                changed = true;
            }
            if (kinds['empty-text'] && element.type === 'STATIC_TEXT') {
                element.text = '固定文本';
                changed = true;
            }
            if (changed && element.id) touchedIds[element.id] = true;
        });
        let addedElements = [];
        if (issueKindAllowed('missing-required-field', allowedKinds)) {
            const missingFields = missingRequiredFieldContracts();
            addedElements = missingFields.map(createRequiredFieldElement);
            state.editorElements = state.editorElements.concat(addedElements);
            addedElements.forEach((element) => {
                if (element.id) touchedIds[element.id] = true;
            });
        }
        const selectedIds = Object.keys(touchedIds);
        return {
            changedCount: selectedIds.length,
            fixedCount: Math.max(0, selectedIds.length - addedElements.length),
            addedCount: addedElements.length,
            selectedIds: selectedIds
        };
    }

    function finishTemplateIssueAutoFix(result, emptyMessage, okMessage) {
        if (!result || !result.changedCount) {
            setStatus('middleStatus', emptyMessage, 'ok');
            return;
        }
        state.canvasElementTypeFilter = '';
        state.selectedElementIds = result.selectedIds;
        state.inspectorTab = result.selectedIds.length > 1 ? 'batch' : 'binding';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', typeof okMessage === 'function' ? okMessage(result) : okMessage, 'ok');
    }

    function fixAllTemplateIssues() {
        const result = applyTemplateIssueAutoFixes();
        return finishTemplateIssueAutoFix(
            result,
            '没有可自动修复的问题，锁定或未知字段请手动处理',
            (data) => data.addedCount
                ? `已修复 ${data.fixedCount} 个问题元素，并补齐 ${data.addedCount} 个必填字段`
                : `已自动修复 ${data.changedCount} 个问题元素`
        );
    }

    function fixUnboundIssueElements() {
        const result = applyTemplateIssueAutoFixes({kinds: ['unbound-field']});
        return finishTemplateIssueAutoFix(
            result,
            '没有可自动修复的未绑定元素，锁定元素请先解锁',
            (data) => `已自动绑定 ${data.changedCount} 个元素`
        );
    }

    function fixOutOfPageIssueElements() {
        const result = applyTemplateIssueAutoFixes({kinds: ['out-of-page', 'invalid-geometry']});
        return finishTemplateIssueAutoFix(
            result,
            '没有可收回的越界元素，锁定元素请先解锁',
            (data) => `已收回 ${data.changedCount} 个越界元素`
        );
    }

    function runTemplateAudit() {
        if (!requireEditorTemplate('middleStatus')) return;
        setRightPanelTab('properties');
        renderTemplateHealth();
        const issues = validateTemplateElements();
        const errorCount = issues.filter((issue) => issue.severity === 'error').length;
        const warningCount = issues.length - errorCount;
        setStatus('middleStatus', `体检完成：${errorCount} 错误 / ${warningCount} 提醒`, errorCount ? 'error' : 'ok');
    }

    function renderCanvasControls() {
        if ($('gridToggle')) $('gridToggle').checked = !!state.canvasGridVisible;
        if ($('snapStepMm')) $('snapStepMm').value = String(currentSnapStepMm());
        if ($('canvasValueMode')) $('canvasValueMode').value = canvasValueMode();
        if ($('canvasElementTypeFilter')) {
            $('canvasElementTypeFilter').value = canvasElementTypeFilter();
            $('canvasElementTypeFilter').disabled = !state.editorTemplate;
        }
        if ($('focusCanvasBtn')) {
            $('focusCanvasBtn').className = state.canvasFocusMode ? 'active-toggle' : '';
            $('focusCanvasBtn').textContent = state.canvasFocusMode ? '退出专注' : '专注';
        }
        syncWorkspaceModeSwitcher();
        renderCanvasFilterHint();
    }

    function setCanvasFocusMode(enabled) {
        setWorkspaceMode(enabled ? 'canvas' : 'balanced');
    }

    function applyPagePreset() {
        const value = $('pagePresetSelect') ? $('pagePresetSelect').value : '';
        const match = /^([0-9]+(?:\.[0-9]+)?)x([0-9]+(?:\.[0-9]+)?)$/.exec(value);
        if (!match) return;
        const width = Number(match[1]);
        const height = Number(match[2]);
        $('pageWidthMm').value = width;
        $('pageHeightMm').value = height;
        if (state.editorTemplate) {
            state.editorTemplate.pageWidthMm = width;
            state.editorTemplate.pageHeightMm = height;
            renderTemplateEditor(state.editorTemplate);
            renderTemplateHealth();
        }
        renderTemplateBasicsSummary();
        setStatus('leftStatus', '已应用版面预设，请保存基础信息', 'ok');
    }

    function syncPagePresetSelect(width, height) {
        const select = $('pagePresetSelect');
        if (!select) return;
        const value = Number(width || 120) + 'x' + Number(height || 80);
        const hasPreset = Array.prototype.some.call(select.options, (option) => option.value === value);
        select.value = hasPreset ? value : '';
    }

    function renderTemplateEditor(template) {
        const canvas = $('templateCanvas');
        if (!template) {
            clearCanvasMeasurementOverlay();
            canvas.innerHTML = '';
            canvas.className = 'template-canvas' + (state.canvasGridVisible ? ' canvas-grid' : '');
            $('elementInspector').innerHTML = '<div class="inspector-empty"><strong>暂无模板</strong><span>选择或创建 CONFIG_LAYOUT 模板后可维护版式。</span></div>';
            $('layerList').innerHTML = '<div class="empty-state layer-empty-state" id="layerEmptyState">暂无图层。请先选择模板并添加组件。</div>';
            renderLayerControls(0, 0);
            renderTemplateHealth();
            renderCanvasMeta(null);
            renderCanvasControls();
            renderHistoryControls();
            renderTemplateBasicsSummary();
            renderCanvasQuickInspector();
            renderModificationActionDock();
            return;
        }
        const width = Number(template.pageWidthMm || 120);
        const height = Number(template.pageHeightMm || 80);
        const scale = editorScale();
        canvas.style.width = (width * scale) + 'px';
        canvas.style.height = (height * scale) + 'px';
        canvas.style.setProperty('--grid-step', (scale * currentSnapStepMm()) + 'px');
        canvas.style.setProperty('--grid-major', (scale * currentSnapStepMm() * 10) + 'px');
        canvas.className = 'template-canvas' + (state.canvasGridVisible ? ' canvas-grid' : '');
        pruneHiddenCanvasSelection();
        const sortedElements = state.editorElements
            .slice()
            .sort((a, b) => Number(a.sortOrder || 0) - Number(b.sortOrder || 0));
        const visibleElements = visibleCanvasElements(sortedElements);
        const elementHtml = visibleElements
            .map((element) => {
                const selected = state.selectedElementIds.indexOf(element.id) >= 0;
                const handles = selected && !element.locked ? resizeHandlesHtml() : '';
                const baseClass = element.locked ? 'template-element locked' : 'template-element';
                const lockBadge = element.locked ? '<span class="element-lock-badge">L</span>' : '';
                return `<div class="${baseClass} ${editorElementClass(element)} ${selected ? 'selected' : ''}"
                    data-id="${escapeHtml(element.id)}"
                    style="${styleElementNode(element)}"><span class="element-label">${editorElementText(element)}</span>${lockBadge}${handles}</div>`;
            }).join('');
        const filterEmptyHtml = canvasElementTypeFilter() && !visibleElements.length
            ? `<div class="canvas-filter-empty">当前筛选没有 ${escapeHtml(canvasElementTypeLabel(canvasElementTypeFilter()))} 元素，可切回全部或添加对应组件。</div>`
            : '';
        canvas.innerHTML = elementHtml + filterEmptyHtml + renderAlignmentGuidesHtml() + renderCanvasMeasurementOverlayHtml() + '<div id="selectionMarquee" class="selection-marquee" hidden></div>';
        Array.prototype.forEach.call(canvas.querySelectorAll('.template-element'), (node) => {
            node.onclick = (event) => {
                event.stopPropagation();
                selectEditorElement(node.getAttribute('data-id'), event.ctrlKey || event.metaKey || event.shiftKey);
            };
            node.onpointerdown = (event) => beginElementPointerDrag(event, node.getAttribute('data-id'));
            node.onmousedown = (event) => {
                if (!window.PointerEvent) beginElementPointerDrag(event, node.getAttribute('data-id'));
            };
        });
        Array.prototype.forEach.call(canvas.querySelectorAll('.resize-handle'), (handle) => {
            handle.onpointerdown = (event) => beginElementResize(event, handle.parentNode.getAttribute('data-id'), handle.getAttribute('data-resize'));
            handle.onmousedown = (event) => {
                if (!window.PointerEvent) beginElementResize(event, handle.parentNode.getAttribute('data-id'), handle.getAttribute('data-resize'));
            };
        });
        canvas.onpointerdown = (event) => beginCanvasMarqueeSelection(event);
        canvas.onmousedown = (event) => {
            if (!window.PointerEvent) beginCanvasMarqueeSelection(event);
        };
        canvas.ondragover = (event) => {
            if (!fieldNameFromDragEvent(event)) return;
            event.preventDefault();
            if (event.dataTransfer) event.dataTransfer.dropEffect = 'copy';
            canvas.classList.add('field-drop-target');
        };
        canvas.ondragleave = (event) => {
            if (event.target === canvas) canvas.classList.remove('field-drop-target');
        };
        canvas.ondrop = (event) => runAction('middleStatus', () => handleCanvasFieldDrop(event));
        renderLayerList();
        renderElementInspector();
        renderTemplateHealth();
        renderCanvasMeta(template);
        renderCanvasControls();
        renderHistoryControls();
        renderTemplateBasicsSummary();
        renderCanvasQuickInspector();
        renderModificationActionDock();
    }

    function fitCanvasToShell() {
        if (!state.editorTemplate) return;
        const shell = document.querySelector('.canvas-shell');
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const widthScale = (((shell && shell.clientWidth) || 720) - 36) / pageWidth;
        const heightScale = (((shell && shell.clientHeight) || 520) - 36) / pageHeight;
        const nextScale = clamp(Math.floor(Math.min(widthScale, heightScale)), 4, 8);
        state.editorScale = nextScale;
        if ($('canvasZoom')) $('canvasZoom').value = String(nextScale);
        renderTemplateEditor(state.editorTemplate);
    }

    function editorElementClass(element) {
        if (element.type === 'BARCODE') return 'barcode';
        if (element.type === 'QRCODE') return 'qrcode';
        if (element.type === 'LOGO') return 'logo';
        if (element.type === 'LINE') return 'line';
        if (element.type === 'RECTANGLE') return 'rectangle';
        return 'text';
    }

    function styleElementNode(element) {
        const scale = editorScale();
        return [
            `left:${Number(element.leftMm || 0) * scale}px`,
            `top:${Number(element.topMm || 0) * scale}px`,
            `width:${Number(element.widthMm || 20) * scale}px`,
            `height:${Number(element.heightMm || 8) * scale}px`,
            `font-size:${Number(element.fontSize || 10)}px`,
            `font-weight:${element.bold ? '700' : '400'}`,
            `text-align:${element.textAlign || 'left'}`
        ].join(';');
    }

    function editorElementText(element) {
        if (element.type === 'STATIC_TEXT') return escapeHtml(element.text || '固定文本');
        if (element.type === 'FIELD_TEXT') return escapeHtml(editorFieldDisplayText(element));
        if (element.type === 'BARCODE') return 'Code128';
        if (element.type === 'QRCODE') return 'QR';
        if (element.type === 'LOGO') return 'Logo';
        if (element.type === 'LINE') return '';
        if (element.type === 'RECTANGLE') return '';
        return escapeHtml(element.type);
    }

    function editorFieldDisplayText(element) {
        const fieldName = element && element.fieldName ? element.fieldName : 'field';
        if (canvasValueMode() === 'name') return fieldName;
        if (canvasValueMode() === 'placeholder') return '${' + fieldName + '}';
        const source = fieldSourceByName(fieldName);
        return source && source.value ? source.value : ('${' + fieldName + '}');
    }

    function resizeHandlesHtml() {
        return '<span class="resize-handle resize-left" data-resize="left"></span>' +
            '<span class="resize-handle resize-top" data-resize="top"></span>' +
            '<span class="resize-handle resize-right" data-resize="right"></span>' +
            '<span class="resize-handle resize-bottom" data-resize="bottom"></span>' +
            '<span class="resize-handle resize-top-left" data-resize="top-left"></span>' +
            '<span class="resize-handle resize-top-right" data-resize="top-right"></span>' +
            '<span class="resize-handle resize-bottom-left" data-resize="bottom-left"></span>' +
            '<span class="resize-handle resize-bottom-right" data-resize="bottom-right"></span>';
    }

    function renderAlignmentGuidesHtml() {
        return (state.alignmentGuides || []).map((guide) => {
            const orientation = guide.orientation === 'horizontal' ? 'horizontal' : 'vertical';
            const positionPx = Number(guide.positionMm || 0) * editorScale();
            const style = orientation === 'vertical' ? `left:${positionPx}px` : `top:${positionPx}px`;
            return `<div class="alignment-guide ${orientation}" style="${style}" aria-hidden="true"></div>`;
        }).join('');
    }

    function measurementFromElements(elements, mode) {
        const items = (elements || []).filter((element) => !!element);
        if (!items.length) return null;
        const bounds = items.reduce((result, element) => {
            const left = Number(element.leftMm || 0);
            const top = Number(element.topMm || 0);
            const right = left + Number(element.widthMm || 1);
            const bottom = top + Number(element.heightMm || 1);
            return {
                left: Math.min(result.left, left),
                top: Math.min(result.top, top),
                right: Math.max(result.right, right),
                bottom: Math.max(result.bottom, bottom)
            };
        }, {left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity});
        if (!isFinite(bounds.left) || !isFinite(bounds.top)) return null;
        return {
            mode: mode === 'resize' ? 'resize' : 'drag',
            count: items.length,
            leftMm: roundMm(bounds.left),
            topMm: roundMm(bounds.top),
            widthMm: roundMm(bounds.right - bounds.left),
            heightMm: roundMm(bounds.bottom - bounds.top)
        };
    }

    function renderCanvasMeasurementOverlayHtml() {
        const measurement = state.canvasMeasurementOverlay;
        if (!measurement || !state.editorTemplate) return '';
        const scale = editorScale();
        const pageWidthPx = Number(state.editorTemplate.pageWidthMm || 120) * scale;
        const pageHeightPx = Number(state.editorTemplate.pageHeightMm || 80) * scale;
        const overlayWidth = 220;
        const overlayHeight = 42;
        const leftPx = clamp(Number(measurement.leftMm || 0) * scale, 4, Math.max(4, pageWidthPx - overlayWidth - 4));
        const topPx = clamp(Number(measurement.topMm || 0) * scale - overlayHeight - 6, 4, Math.max(4, pageHeightPx - overlayHeight - 4));
        const mode = measurement.mode === 'resize' ? 'resize' : 'drag';
        const title = mode === 'resize' ? '缩放尺寸' : (Number(measurement.count || 0) > 1 ? '移动选区' : '移动元素');
        const detail = `X ${measurement.leftMm}mm · Y ${measurement.topMm}mm · W ${measurement.widthMm}mm · H ${measurement.heightMm}mm`;
        const count = Number(measurement.count || 0) > 1 ? ` · ${measurement.count} 个元素` : '';
        return `<div id="canvasMeasurementOverlay" class="canvas-measurement-overlay" data-measurement-mode="${escapeHtml(mode)}" style="left:${leftPx}px;top:${topPx}px">
            <strong>${escapeHtml(title)}${escapeHtml(count)}</strong>
            <span>${escapeHtml(detail)}</span>
        </div>
        <span hidden data-measurement-mode="drag"></span><span hidden data-measurement-mode="resize"></span>`;
    }

    function setCanvasMeasurementOverlay(mode, elements) {
        state.canvasMeasurementOverlay = measurementFromElements(elements, mode);
    }

    function clearCanvasMeasurementOverlay() {
        state.canvasMeasurementOverlay = null;
    }

    function clearAlignmentGuides() {
        state.alignmentGuides = [];
    }

    function collectAlignmentTargets(excludedIds) {
        const excluded = excludedIds || [];
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const targets = {
            x: [
                {value: 0, source: 'page-left'},
                {value: pageWidth / 2, source: 'page-center'},
                {value: pageWidth, source: 'page-right'}
            ],
            y: [
                {value: 0, source: 'page-top'},
                {value: pageHeight / 2, source: 'page-middle'},
                {value: pageHeight, source: 'page-bottom'}
            ]
        };
        state.editorElements.forEach((element) => {
            if (excluded.indexOf(element.id) >= 0) return;
            const left = Number(element.leftMm || 0);
            const top = Number(element.topMm || 0);
            const width = Number(element.widthMm || 1);
            const height = Number(element.heightMm || 1);
            targets.x.push(
                {value: left, source: element.id},
                {value: left + width / 2, source: element.id},
                {value: left + width, source: element.id}
            );
            targets.y.push(
                {value: top, source: element.id},
                {value: top + height / 2, source: element.id},
                {value: top + height, source: element.id}
            );
        });
        return targets;
    }

    function groupBoundsFromUpdates(updates) {
        return updates.reduce((bounds, update) => {
            const width = Number(update.item.widthMm || 1);
            const height = Number(update.item.heightMm || 1);
            const right = Number(update.leftMm || 0) + width;
            const bottom = Number(update.topMm || 0) + height;
            return {
                left: Math.min(bounds.left, Number(update.leftMm || 0)),
                top: Math.min(bounds.top, Number(update.topMm || 0)),
                right: Math.max(bounds.right, right),
                bottom: Math.max(bounds.bottom, bottom)
            };
        }, {left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity});
    }

    function nearestAlignmentMatch(positions, targets) {
        const threshold = alignmentSnapThresholdMm();
        return positions.reduce((best, position) => {
            (targets || []).forEach((target) => {
                const delta = Number(target.value || 0) - position.value;
                const distance = Math.abs(delta);
                if (distance <= threshold && (!best || distance < best.distance)) {
                    best = {delta: delta, distance: distance, value: Number(target.value || 0)};
                }
            });
            return best;
        }, null);
    }

    function applyAlignmentSnap(updates, targets, pageWidth, pageHeight) {
        if (!updates.length) {
            clearAlignmentGuides();
            return updates;
        }
        const bounds = groupBoundsFromUpdates(updates);
        const xMatch = nearestAlignmentMatch([
            {value: bounds.left},
            {value: bounds.left + (bounds.right - bounds.left) / 2},
            {value: bounds.right}
        ], targets.x);
        const yMatch = nearestAlignmentMatch([
            {value: bounds.top},
            {value: bounds.top + (bounds.bottom - bounds.top) / 2},
            {value: bounds.bottom}
        ], targets.y);
        const rawDx = xMatch ? xMatch.delta : 0;
        const rawDy = yMatch ? yMatch.delta : 0;
        const dx = clamp(rawDx, -bounds.left, pageWidth - bounds.right);
        const dy = clamp(rawDy, -bounds.top, pageHeight - bounds.bottom);
        state.alignmentGuides = []
            .concat(xMatch && Math.abs(dx - rawDx) < 0.001 ? [{orientation: 'vertical', positionMm: xMatch.value}] : [])
            .concat(yMatch && Math.abs(dy - rawDy) < 0.001 ? [{orientation: 'horizontal', positionMm: yMatch.value}] : []);
        if (!dx && !dy) return updates;
        return updates.map((update) => {
            const maxLeft = pageWidth - Number(update.item.widthMm || 1);
            const maxTop = pageHeight - Number(update.item.heightMm || 1);
            return Object.assign({}, update, {
                leftMm: roundMm(clamp(Number(update.leftMm || 0) + dx, 0, maxLeft)),
                topMm: roundMm(clamp(Number(update.topMm || 0) + dy, 0, maxTop))
            });
        });
    }

    function canvasPointFromEvent(event, canvas) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: clamp(event.clientX - rect.left, 0, rect.width),
            y: clamp(event.clientY - rect.top, 0, rect.height)
        };
    }

    function beginFieldPaletteDrag(event, fieldName) {
        state.draggingFieldName = fieldName || '';
        if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'copy';
            event.dataTransfer.setData('application/x-boxlabel-field', state.draggingFieldName);
            event.dataTransfer.setData('text/plain', state.draggingFieldName);
        }
        document.body.classList.add('field-palette-dragging');
    }

    function endFieldPaletteDrag() {
        state.draggingFieldName = '';
        document.body.classList.remove('field-palette-dragging');
        if ($('templateCanvas')) $('templateCanvas').classList.remove('field-drop-target');
    }

    function fieldNameFromDragEvent(event) {
        if (event && event.dataTransfer) {
            const explicitField = event.dataTransfer.getData('application/x-boxlabel-field');
            if (explicitField) return explicitField;
            const plainField = event.dataTransfer.getData('text/plain');
            if (plainField && fieldContractByName(plainField)) return plainField;
        }
        return state.draggingFieldName || '';
    }

    function addFieldElementAtCanvasPoint(fieldName, point) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (fieldInsertMode() === 'label-value') {
            addFieldLabelValuePairAtCanvasPoint(fieldName, point);
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const scale = editorScale();
        const width = 50;
        const height = 8;
        const left = snapMm(clamp(Number(point.x || 0) / scale, 0, Math.max(0, pageWidth - width)));
        const top = snapMm(clamp(Number(point.y || 0) / scale, 0, Math.max(0, pageHeight - height)));
        state.inspectorTab = 'binding';
        addTemplateElement('FIELD_TEXT', fieldName, {
            leftMm: left,
            topMm: top,
            widthMm: width,
            heightMm: height
        });
        setStatus('middleStatus', `已放置字段 ${fieldDisplayName(fieldName)}，可继续拖拽调整`, 'ok');
    }

    function addFieldLabelValuePairAtCanvasPoint(fieldName, point) {
        if (!requireEditorTemplate('middleStatus')) return;
        const field = fieldContractByName(fieldName) || {fieldName: fieldName, displayName: fieldDisplayName(fieldName), required: false};
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const scale = editorScale();
        const width = 62;
        const height = 6;
        const left = snapMm(clamp(Number(point.x || 0) / scale, 0, Math.max(0, pageWidth - width)));
        const top = snapMm(clamp(Number(point.y || 0) / scale, 0, Math.max(0, pageHeight - height)));
        snapshotEditorHistory();
        const elements = createFieldLabelValueElements(field, left, top, width, height, maxElementSortOrder() + 1);
        state.editorElements = state.editorElements.concat(elements);
        state.selectedElementIds = elements.map((element) => element.id);
        state.inspectorTab = 'batch';
        state.canvasElementTypeFilter = '';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已放置 ${fieldDisplayName(fieldName)} 标题和值，可一起调整位置`, 'ok');
    }

    function handleCanvasFieldDrop(event) {
        event.preventDefault();
        const canvas = $('templateCanvas');
        const fieldName = fieldNameFromDragEvent(event);
        if (!canvas || !fieldName) return;
        const point = canvasPointFromEvent(event, canvas);
        addFieldElementAtCanvasPoint(fieldName, point);
        endFieldPaletteDrag();
    }

    function marqueeRectFromPoints(start, end) {
        return {
            left: Math.min(start.x, end.x),
            top: Math.min(start.y, end.y),
            width: Math.abs(end.x - start.x),
            height: Math.abs(end.y - start.y)
        };
    }

    function renderSelectionMarquee(rect) {
        const marquee = $('selectionMarquee');
        if (!marquee) return;
        marquee.hidden = false;
        marquee.style.left = rect.left + 'px';
        marquee.style.top = rect.top + 'px';
        marquee.style.width = rect.width + 'px';
        marquee.style.height = rect.height + 'px';
    }

    function marqueeMmFromPixels(rect) {
        const scale = editorScale();
        return {
            left: rect.left / scale,
            top: rect.top / scale,
            right: (rect.left + rect.width) / scale,
            bottom: (rect.top + rect.height) / scale
        };
    }

    function elementIntersectsMarquee(element, marquee) {
        const left = Number(element.leftMm || 0);
        const top = Number(element.topMm || 0);
        const right = left + Number(element.widthMm || 1);
        const bottom = top + Number(element.heightMm || 1);
        return right >= marquee.left && left <= marquee.right && bottom >= marquee.top && top <= marquee.bottom;
    }

    function mergeSelectionIds(currentIds, nextIds) {
        const ids = {};
        currentIds.concat(nextIds).forEach((id) => {
            if (id) ids[id] = true;
        });
        return Object.keys(ids);
    }

    function beginCanvasMarqueeSelection(event) {
        const canvas = $('templateCanvas');
        if (!state.editorTemplate || !canvas || event.button !== 0 || event.target !== canvas) return;
        event.preventDefault();
        const start = canvasPointFromEvent(event, canvas);
        const moveEventName = event.type.indexOf('pointer') === 0 ? 'pointermove' : 'mousemove';
        const upEventName = event.type.indexOf('pointer') === 0 ? 'pointerup' : 'mouseup';
        const appendSelection = event.ctrlKey || event.metaKey || event.shiftKey;
        let latest = start;
        let moved = false;
        const onMove = (moveEvent) => {
            latest = canvasPointFromEvent(moveEvent, canvas);
            const rect = marqueeRectFromPoints(start, latest);
            moved = moved || rect.width > 3 || rect.height > 3;
            if (moved) renderSelectionMarquee(rect);
        };
        const onUp = (upEvent) => {
            document.removeEventListener(moveEventName, onMove);
            document.removeEventListener(upEventName, onUp);
            latest = canvasPointFromEvent(upEvent, canvas);
            const rect = marqueeRectFromPoints(start, latest);
            const marquee = $('selectionMarquee');
            if (marquee) marquee.hidden = true;
            if (moved && (rect.width > 3 || rect.height > 3)) {
                const selection = marqueeMmFromPixels(rect);
                const nextIds = state.editorElements
                    .filter((element) => elementVisibleOnCanvas(element))
                    .filter((element) => elementIntersectsMarquee(element, selection))
                    .map((element) => element.id);
                state.selectedElementIds = appendSelection ? mergeSelectionIds(state.selectedElementIds, nextIds) : nextIds;
            } else if (!appendSelection) {
                state.selectedElementIds = [];
            }
            setRightPanelTab('properties');
            renderTemplateEditor(state.editorTemplate);
            renderFieldPalette();
        };
        document.addEventListener(moveEventName, onMove);
        document.addEventListener(upEventName, onUp);
    }

    function beginElementPointerDrag(event, elementId) {
        if (!state.editorTemplate || event.button !== 0 || event.target.className.indexOf('resize-handle') >= 0) return;
        const element = state.editorElements.find((item) => item.id === elementId);
        if (!element) return;
        if (element.locked) {
            event.stopPropagation();
            return;
        }
        event.preventDefault();
        event.stopPropagation();
        if (state.selectedElementIds.indexOf(elementId) < 0) {
            state.selectedElementIds = [elementId];
        }
        const selected = selectedEditableElements();
        if (!selected.length) return;
        const starts = selected.map((item) => ({id: item.id, leftMm: Number(item.leftMm || 0), topMm: Number(item.topMm || 0)}));
        const startX = event.clientX;
        const startY = event.clientY;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const moveEventName = event.type.indexOf('pointer') === 0 ? 'pointermove' : 'mousemove';
        const upEventName = event.type.indexOf('pointer') === 0 ? 'pointerup' : 'mouseup';
        let capturedHistory = false;
        let changed = false;
        const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / editorScale();
            const dy = (moveEvent.clientY - startY) / editorScale();
            const rawUpdates = starts.map((start) => {
                const item = state.editorElements.find((candidate) => candidate.id === start.id);
                if (!item) return null;
                return {
                    item: item,
                    leftMm: roundMm(clamp(start.leftMm + dx, 0, pageWidth - Number(item.widthMm || 1))),
                    topMm: roundMm(clamp(start.topMm + dy, 0, pageHeight - Number(item.heightMm || 1)))
                };
            }).filter((update) => update);
            const updates = applyAlignmentSnap(rawUpdates, collectAlignmentTargets(starts.map((start) => start.id)), pageWidth, pageHeight)
                .filter((update) => update.item.leftMm !== update.leftMm || update.item.topMm !== update.topMm);
            if (!updates.length) return;
            if (!capturedHistory) {
                snapshotEditorHistory();
                capturedHistory = true;
            }
            updates.forEach((update) => {
                update.item.leftMm = update.leftMm;
                update.item.topMm = update.topMm;
            });
            changed = true;
            markEditorDirty();
            setCanvasMeasurementOverlay('drag', selected);
            renderTemplateEditor(state.editorTemplate);
        };
        const onUp = () => {
            document.removeEventListener(moveEventName, onMove);
            document.removeEventListener(upEventName, onUp);
            if (changed) markEditorDirty();
            const hadMeasurement = !!state.canvasMeasurementOverlay;
            clearCanvasMeasurementOverlay();
            if (state.alignmentGuides.length || hadMeasurement) {
                clearAlignmentGuides();
                renderTemplateEditor(state.editorTemplate);
            }
        };
        document.addEventListener(moveEventName, onMove);
        document.addEventListener(upEventName, onUp);
    }

    function resizeGeometryForMode(start, mode, dx, dy, pageWidth, pageHeight) {
        const minSize = 1;
        const startLeft = Number(start.leftMm || 0);
        const startTop = Number(start.topMm || 0);
        const startWidth = Number(start.widthMm || minSize);
        const startHeight = Number(start.heightMm || minSize);
        const startRight = startLeft + startWidth;
        const startBottom = startTop + startHeight;
        const resizeMode = mode || '';
        let nextLeft = startLeft;
        let nextTop = startTop;
        let nextWidth = startWidth;
        let nextHeight = startHeight;
        if (resizeMode.indexOf('left') >= 0) {
            nextLeft = roundMm(clamp(startLeft + dx, 0, Math.max(0, startRight - minSize)));
            nextWidth = roundMm(clamp(startRight - nextLeft, minSize, pageWidth - nextLeft));
        } else if (resizeMode.indexOf('right') >= 0) {
            nextWidth = roundMm(clamp(startWidth + dx, minSize, pageWidth - startLeft));
        }
        if (resizeMode.indexOf('top') >= 0) {
            nextTop = roundMm(clamp(startTop + dy, 0, Math.max(0, startBottom - minSize)));
            nextHeight = roundMm(clamp(startBottom - nextTop, minSize, pageHeight - nextTop));
        } else if (resizeMode.indexOf('bottom') >= 0) {
            nextHeight = roundMm(clamp(startHeight + dy, minSize, pageHeight - startTop));
        }
        return {
            leftMm: nextLeft,
            topMm: nextTop,
            widthMm: roundMm(clamp(nextWidth, minSize, pageWidth - nextLeft)),
            heightMm: roundMm(clamp(nextHeight, minSize, pageHeight - nextTop))
        };
    }

    function applyElementResizeGeometry(element, geometry) {
        if (!element || !geometry) return false;
        const changed = Number(element.leftMm || 0) !== Number(geometry.leftMm || 0)
            || Number(element.topMm || 0) !== Number(geometry.topMm || 0)
            || Number(element.widthMm || 0) !== Number(geometry.widthMm || 0)
            || Number(element.heightMm || 0) !== Number(geometry.heightMm || 0);
        if (!changed) return false;
        element.leftMm = geometry.leftMm;
        element.topMm = geometry.topMm;
        element.widthMm = geometry.widthMm;
        element.heightMm = geometry.heightMm;
        return true;
    }

    function beginElementResize(event, elementId, mode) {
        if (!state.editorTemplate || event.button !== 0) return;
        const element = state.editorElements.find((item) => item.id === elementId);
        if (!element) return;
        if (element.locked) {
            event.stopPropagation();
            return;
        }
        event.preventDefault();
        event.stopPropagation();
        state.selectedElementIds = [elementId];
        const startX = event.clientX;
        const startY = event.clientY;
        const startGeometry = {
            leftMm: Number(element.leftMm || 0),
            topMm: Number(element.topMm || 0),
            widthMm: Number(element.widthMm || 1),
            heightMm: Number(element.heightMm || 1)
        };
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const moveEventName = event.type.indexOf('pointer') === 0 ? 'pointermove' : 'mousemove';
        const upEventName = event.type.indexOf('pointer') === 0 ? 'pointerup' : 'mouseup';
        let capturedHistory = false;
        let changed = false;
        const onMove = (moveEvent) => {
            const dx = (moveEvent.clientX - startX) / editorScale();
            const dy = (moveEvent.clientY - startY) / editorScale();
            const nextGeometry = resizeGeometryForMode(startGeometry, mode, dx, dy, pageWidth, pageHeight);
            const changedNow = Number(element.leftMm || 0) !== Number(nextGeometry.leftMm || 0)
                || Number(element.topMm || 0) !== Number(nextGeometry.topMm || 0)
                || Number(element.widthMm || 0) !== Number(nextGeometry.widthMm || 0)
                || Number(element.heightMm || 0) !== Number(nextGeometry.heightMm || 0);
            if (!changedNow) return;
            if (!capturedHistory) {
                snapshotEditorHistory();
                capturedHistory = true;
            }
            applyElementResizeGeometry(element, nextGeometry);
            changed = true;
            markEditorDirty();
            setCanvasMeasurementOverlay('resize', [element]);
            renderTemplateEditor(state.editorTemplate);
        };
        const onUp = () => {
            document.removeEventListener(moveEventName, onMove);
            document.removeEventListener(upEventName, onUp);
            if (changed) markEditorDirty();
            const hadMeasurement = !!state.canvasMeasurementOverlay;
            clearCanvasMeasurementOverlay();
            if (hadMeasurement) renderTemplateEditor(state.editorTemplate);
        };
        document.addEventListener(moveEventName, onMove);
        document.addEventListener(upEventName, onUp);
    }

    function layerQuickFilter() {
        const filter = ['all', 'current-type', 'issues', 'unbound', 'locked'].indexOf(state.layerQuickFilter) >= 0
            ? state.layerQuickFilter
            : 'all';
        return filter === 'current-type' && !primarySelectedElement() ? 'all' : filter;
    }

    function setLayerQuickFilter(filter) {
        state.layerQuickFilter = ['all', 'current-type', 'issues', 'unbound', 'locked'].indexOf(filter) >= 0 ? filter : 'all';
        renderLayerList();
    }

    function elementHasInvalidGeometry(element) {
        return !element
            || Number(element.widthMm || 0) <= 0
            || Number(element.heightMm || 0) <= 0
            || !isFinite(Number(element.leftMm || 0))
            || !isFinite(Number(element.topMm || 0));
    }

    function layerElementHasIssue(element) {
        if (elementHasInvalidGeometry(element)) return true;
        if (elementExceedsPage(element)) return true;
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0 && !element.fieldName) return true;
        if (element.type === 'STATIC_TEXT' && !String(element.text || '').trim()) return true;
        return false;
    }

    function elementMatchesLayerQuickFilter(element) {
        const filter = layerQuickFilter();
        if (filter === 'all') return true;
        if (filter === 'current-type') {
            const selected = primarySelectedElement();
            return selected ? element.type === selected.type : true;
        }
        if (filter === 'issues') return layerElementHasIssue(element);
        if (filter === 'unbound') return ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0 && !element.fieldName;
        if (filter === 'locked') return !!element.locked;
        return true;
    }

    function renderLayerQuickFilters() {
        const panel = $('layerQuickFilters');
        if (!panel) return;
        const active = layerQuickFilter();
        const hasCurrentType = !!primarySelectedElement();
        Array.prototype.forEach.call(panel.querySelectorAll('[data-layer-quick-filter]'), (button) => {
            const filter = button.getAttribute('data-layer-quick-filter');
            button.className = filter === active ? 'active' : '';
            button.disabled = filter === 'current-type' && !hasCurrentType;
            button.onclick = () => setLayerQuickFilter(filter);
        });
    }

    function renderLayerControls(visibleCount, totalCount) {
        if ($('layerTypeFilter')) $('layerTypeFilter').value = state.layerTypeFilter || '';
        if ($('layerSearch')) $('layerSearch').value = state.layerSearchTerm || '';
        renderLayerQuickFilters();
        if ($('layerSummary')) {
            const typeText = state.layerTypeFilter ? state.layerTypeFilter : '全部类型';
            const searchText = state.layerSearchTerm ? ` / 搜索 ${state.layerSearchTerm}` : '';
            const quickText = layerQuickFilter() === 'all' ? '' : ` / ${layerQuickFilter()}`;
            $('layerSummary').textContent = `${typeText}${searchText}${quickText} · ${visibleCount}/${totalCount} 图层`;
        }
    }

    function elementMatchesLayerFilters(element) {
        const typeFilter = state.layerTypeFilter || '';
        const term = String(state.layerSearchTerm || '').trim().toLowerCase();
        if (!elementMatchesLayerQuickFilter(element)) return false;
        if (typeFilter && element.type !== typeFilter) return false;
        if (!term) return true;
        return [element.type, element.fieldName, element.text, elementLabel(element)].some((value) =>
            String(value || '').toLowerCase().indexOf(term) >= 0
        );
    }

    function renderLayerList() {
        const totalCount = state.editorElements.length;
        const visibleLayers = state.editorElements
            .slice()
            .filter(elementMatchesLayerFilters)
            .sort((a, b) => Number(b.sortOrder || 0) - Number(a.sortOrder || 0));
        renderLayerControls(visibleLayers.length, totalCount);
        if (!totalCount) {
            $('layerList').innerHTML = '<div class="empty-state layer-empty-state" id="layerEmptyState">暂无图层。请先在画布上添加文本、字段或图形组件。</div>';
            return;
        }
        if (!visibleLayers.length) {
            $('layerList').innerHTML = '<div class="empty-state layer-empty-state" id="layerEmptyState">没有匹配的图层，清空筛选后再试。</div>';
            return;
        }
        $('layerList').innerHTML = visibleLayers
            .map((item) =>
                `<div class="layer-item ${state.selectedElementIds.indexOf(item.id) >= 0 ? 'active' : ''} ${item.locked ? 'locked' : ''}" data-id="${escapeHtml(item.id)}" role="button" tabindex="0">
                    <div class="layer-item-main">
                        <strong>${escapeHtml(item.type)} ${escapeHtml(item.fieldName || item.text || '')}${item.locked ? '<span class="layer-lock-badge">LOCK</span>' : ''}</strong>
                        <span class="muted">${escapeHtml(item.leftMm)}mm, ${escapeHtml(item.topMm)}mm / ${escapeHtml(item.widthMm)}x${escapeHtml(item.heightMm)}</span>
                    </div>
                    <div class="layerQuickActions layer-quick-actions" data-layer-action="${escapeHtml(item.id)}">
                        <button type="button" title="定位图层" data-layer-focus="${escapeHtml(item.id)}">⌖</button>
                        <button type="button" title="${item.locked ? '解锁图层' : '锁定图层'}" data-layer-lock="${escapeHtml(item.id)}">${item.locked ? '解' : '锁'}</button>
                    </div>
                </div>`
            ).join('');
        wireLayerQuickActions();
    }

    function focusLayerElement(elementId) {
        const element = state.editorElements.find((item) => item.id === elementId);
        if (!element) {
            setStatus('middleStatus', '图层元素不存在', 'error');
            renderLayerList();
            return;
        }
        selectEditorElement(elementId, false);
        scrollSelectedLayerIntoView();
        setStatus('middleStatus', '已定位图层：' + elementLabel(element), 'ok');
    }

    function toggleLayerElementLock(elementId) {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = state.editorElements.find((item) => item.id === elementId);
        if (!element) {
            setStatus('middleStatus', '图层元素不存在', 'error');
            renderLayerList();
            return;
        }
        snapshotEditorHistory();
        element.locked = !element.locked;
        state.selectedElementIds = [element.id];
        revealElementTypeOnCanvas(element.type);
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        scrollSelectedLayerIntoView();
        setStatus('middleStatus', element.locked ? '已锁定图层：' + elementLabel(element) : '已解锁图层：' + elementLabel(element), 'ok');
    }

    function scrollSelectedLayerIntoView() {
        const selectedLayer = document.querySelector('.layer-item.active');
        if (selectedLayer && selectedLayer.scrollIntoView) {
            selectedLayer.scrollIntoView({block: 'nearest'});
        }
        const selectedElement = document.querySelector('.template-element.selected');
        if (selectedElement && selectedElement.scrollIntoView) {
            selectedElement.scrollIntoView({block: 'center', inline: 'center'});
        }
    }

    function wireLayerQuickActions() {
        Array.prototype.forEach.call(document.querySelectorAll('.layer-item'), (node) => {
            node.onclick = (event) => {
                if (event.target && event.target.closest && event.target.closest('[data-layer-action]')) return;
                selectEditorElement(node.getAttribute('data-id'), false);
            };
            node.onkeydown = (event) => {
                if (event.key !== 'Enter' && event.key !== ' ') return;
                event.preventDefault();
                selectEditorElement(node.getAttribute('data-id'), false);
            };
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-layer-focus]'), (button) => {
            button.onclick = (event) => {
                event.stopPropagation();
                focusLayerElement(button.getAttribute('data-layer-focus'));
            };
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-layer-lock]'), (button) => {
            button.onclick = (event) => {
                event.stopPropagation();
                runAction('middleStatus', () => toggleLayerElementLock(button.getAttribute('data-layer-lock')));
            };
        });
    }

    function elementLabel(element) {
        if (!element) return '元素';
        if (element.type === 'FIELD_TEXT') return fieldDisplayName(element.fieldName);
        if (element.type === 'STATIC_TEXT') return element.text || '固定文本';
        return element.type || '元素';
    }

    function renderSelectionSummary(elements) {
        const selected = elements || [];
        if (!selected.length) return '';
        if (selected.length === 1) {
            const element = selected[0];
