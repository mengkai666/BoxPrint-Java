<script>
    const $ = (id) => document.getElementById(id);
    const state = {
        templates: [],
        fieldContract: [],
        sampleFieldSources: [],
        resourceTab: 'templates',
        rightPanelTab: 'properties',
        toolbarPanel: 'components',
        inspectorTab: 'layout',
        completeInspectorOpen: false,
        modificationPanelMode: 'content',
        modificationPanelElementId: '',
        quickInspectorMode: 'content',
        quickInspectorSelectionKey: '',
        templateSettingsOpen: false,
        templateHealthDetailsCollapsed: true,
        fieldLibraryView: 'quick',
        fieldAssistantMode: 'smart',
        fieldPaletteMode: 'common',
        fieldDetailsVisible: false,
        fieldDensity: 'compact',
        fieldInsertMode: 'value',
        fieldBindingSearchTerm: '',
        selectedFieldBatch: [],
        currentVisibleFieldNames: [],
        layerQuickFilter: 'all',
        layerTypeFilter: '',
        layerSearchTerm: '',
        workspaceMode: 'balanced',
        canvasFocusMode: false,
        editorScale: 6,
        snapStepMm: 0.5,
        canvasGridVisible: true,
        canvasValueMode: 'sample',
        canvasElementTypeFilter: '',
        editorTemplate: null,
        editorElements: [],
        selectedElementIds: [],
        editorClipboard: [],
        styleClipboard: null,
        draggingFieldName: '',
        alignmentGuides: [],
        canvasMeasurementOverlay: null,
        alignmentSnapThresholdMm: 1,
        undoStack: [],
        redoStack: [],
        savedElementsSignature: '',
        editorDirty: false
    };
    const commonFieldNames = ['boxLabelName', 'inventoryName', 'packageSpec', 'productBarcode', 'qrCode', 'productionDate'];
    const toolbarPanelIds = ['components', 'arrange', 'view', 'selection'];

    async function api(url, options) {
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(await response.text() || response.statusText);
        return response.json();
    }

    function escapeHtml(value) {
        return String(value == null ? '' : value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function setStatus(id, message, type) {
        const node = $(id);
        node.className = 'status' + (type ? ' ' + type : '');
        node.textContent = message;
    }

    function handleActionError(statusId, error) {
        setStatus(statusId, error && error.message ? error.message : String(error), 'error');
    }

    function setResourceTab(tab) {
        const nextTab = ['templates', 'fields', 'layers'].indexOf(tab) >= 0 ? tab : 'templates';
        state.resourceTab = nextTab;
        Array.prototype.forEach.call(document.querySelectorAll('[data-resource-tab]'), (button) => {
            button.className = button.getAttribute('data-resource-tab') === nextTab ? 'active' : '';
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-resource-panel]'), (panel) => {
            panel.className = 'tab-panel' + (panel.getAttribute('data-resource-panel') === nextTab ? ' active' : '');
        });
        if (nextTab === 'fields') renderFieldPalette();
        if (nextTab === 'layers') renderLayerList();
    }

    function setRightPanelTab(tab) {
        const nextTab = ['properties', 'preview'].indexOf(tab) >= 0 ? tab : 'properties';
        state.rightPanelTab = nextTab;
        Array.prototype.forEach.call(document.querySelectorAll('[data-right-tab]'), (button) => {
            button.className = button.getAttribute('data-right-tab') === nextTab ? 'active' : '';
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-right-panel]'), (panel) => {
            panel.className = 'tab-panel' + (panel.getAttribute('data-right-panel') === nextTab ? ' active' : '');
        });
    }

    function workspaceMode() {
        return ['balanced', 'fields', 'inspect', 'canvas'].indexOf(state.workspaceMode) >= 0
            ? state.workspaceMode
            : 'balanced';
    }

    function syncWorkspaceModeSwitcher() {
        const activeMode = workspaceMode();
        Array.prototype.forEach.call(document.querySelectorAll('[data-workspace-mode]'), (button) => {
            button.className = button.getAttribute('data-workspace-mode') === activeMode ? 'active' : '';
        });
    }

    function setWorkspaceMode(mode) {
        const nextMode = ['balanced', 'fields', 'inspect', 'canvas'].indexOf(mode) >= 0 ? mode : 'balanced';
        state.workspaceMode = nextMode;
        state.canvasFocusMode = nextMode === 'canvas';
        const workbench = document.querySelector('main.template-workbench');
        if (workbench) {
            workbench.className = 'template-workbench template-workbench-mode-' + nextMode +
                (state.canvasFocusMode ? ' template-workbench-focus' : '');
            workbench.setAttribute('data-active-workspace-mode', nextMode);
        }
        syncWorkspaceModeSwitcher();
        renderCanvasControls();
        renderModificationActionDock();
        setTimeout(() => {
            if (state.editorTemplate) fitCanvasToShell();
        }, 0);
    }

    function toolbarPanelSummary(panel) {
        if (panel === 'arrange') return '整理位置、层级、对齐、分布和字段版式。';
        if (panel === 'view') return '调整缩放、网格、样例值和画布元素筛选。';
        if (panel === 'selection') return '批量选择、复制粘贴、复制样式和锁定元素。';
        return '添加文本、字段、条码、二维码和版式辅助元素。';
    }

    function syncToolbarPanelState() {
        const activePanel = toolbarPanelIds.indexOf(state.toolbarPanel) >= 0 ? state.toolbarPanel : 'components';
        state.toolbarPanel = activePanel;
        Array.prototype.forEach.call(document.querySelectorAll('[data-toolbar-tab]'), (button) => {
            button.className = button.getAttribute('data-toolbar-tab') === activePanel ? 'active' : '';
            button.setAttribute('aria-selected', button.getAttribute('data-toolbar-tab') === activePanel ? 'true' : 'false');
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-toolbar-panel]'), (panel) => {
            const active = panel.getAttribute('data-toolbar-panel') === activePanel;
            panel.classList.toggle('toolbar-panel-active', active);
            panel.setAttribute('aria-hidden', active ? 'false' : 'true');
        });
        if ($('toolbarModeSummary')) $('toolbarModeSummary').textContent = toolbarPanelSummary(activePanel);
    }

    function setActiveToolbarPanel(panel) {
        state.toolbarPanel = toolbarPanelIds.indexOf(panel) >= 0 ? panel : 'components';
        syncToolbarPanelState();
    }

    async function runAction(statusId, action) {
        try {
            return await action();
        } catch (error) {
            handleActionError(statusId, error);
            return null;
        }
    }

    function requireEditorTemplate(statusId) {
        if (!state.editorTemplate) {
            setStatus(statusId, '请选择模板', 'error');
            return false;
        }
        if (state.editorTemplate.engine !== 'CONFIG_LAYOUT') {
            setStatus(statusId, '请选择 CONFIG_LAYOUT 模板', 'error');
            return false;
        }
        return true;
    }

    function currentSnapStepMm() {
        const step = Number(state.snapStepMm || 0.5);
        return step > 0 ? step : 0.5;
    }

    function setSnapStepMm(step) {
        const nextStep = Number(step || 0.5);
        state.snapStepMm = nextStep > 0 ? nextStep : 0.5;
        if ($('snapStepMm')) $('snapStepMm').value = String(currentSnapStepMm());
        if ($('modificationPanelStepMm')) $('modificationPanelStepMm').value = String(currentSnapStepMm());
        if ($('batchModificationPanelStepMm')) $('batchModificationPanelStepMm').value = String(currentSnapStepMm());
        renderTemplateEditor(state.editorTemplate);
    }

    function alignmentSnapThresholdMm() {
        const threshold = Number(state.alignmentSnapThresholdMm || 1);
        return threshold > 0 ? threshold : 1;
    }

    function snapMm(value) {
        const step = currentSnapStepMm();
        return Number((Math.round(Number(value || 0) / step) * step).toFixed(3));
    }

    function roundMm(value) {
        return snapMm(value);
    }

    function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
    }

    function editorScale() {
        return Number(state.editorScale || 6);
    }

    function canvasValueMode() {
        const mode = state.canvasValueMode || 'sample';
        return ['sample', 'name', 'placeholder'].indexOf(mode) >= 0 ? mode : 'sample';
    }

    function setCanvasValueMode(mode) {
        state.canvasValueMode = ['sample', 'name', 'placeholder'].indexOf(mode) >= 0 ? mode : 'sample';
        renderCanvasControls();
        renderTemplateEditor(state.editorTemplate);
    }

    function canvasElementTypeFilter() {
        const type = state.canvasElementTypeFilter || '';
        const supported = ['', 'FIELD_TEXT', 'STATIC_TEXT', 'BARCODE', 'QRCODE', 'LOGO', 'LINE', 'RECTANGLE'];
        return supported.indexOf(type) >= 0 ? type : '';
    }

    function canvasElementTypeLabel(type) {
        const labels = {
            FIELD_TEXT: '字段',
            STATIC_TEXT: '文本',
            BARCODE: '条码',
            QRCODE: '二维码',
            LOGO: 'Logo',
            LINE: '线条',
            RECTANGLE: '矩形'
        };
        return labels[type] || '全部';
    }

    function elementVisibleOnCanvas(element) {
        const filter = canvasElementTypeFilter();
        return !filter || (!!element && element.type === filter);
    }

    function visibleCanvasElements(elements) {
        return (elements || state.editorElements || []).filter((element) => elementVisibleOnCanvas(element));
    }

    function pruneHiddenCanvasSelection() {
        const elementsById = {};
        state.editorElements.forEach((element) => {
            elementsById[element.id] = element;
        });
        state.selectedElementIds = state.selectedElementIds.filter((id) => {
            const element = elementsById[id];
            return element && elementVisibleOnCanvas(element);
        });
    }

    function revealElementTypeOnCanvas(type) {
        if (canvasElementTypeFilter() && canvasElementTypeFilter() !== type) {
            state.canvasElementTypeFilter = type || '';
        }
    }

    function setCanvasElementTypeFilter(type) {
        state.canvasElementTypeFilter = ['', 'FIELD_TEXT', 'STATIC_TEXT', 'BARCODE', 'QRCODE', 'LOGO', 'LINE', 'RECTANGLE'].indexOf(type || '') >= 0 ? (type || '') : '';
        pruneHiddenCanvasSelection();
        renderCanvasControls();
        renderTemplateEditor(state.editorTemplate);
    }

    function renderCanvasFilterHint() {
        const node = $('canvasFilterHint');
        if (!node) return;
        if (!state.editorTemplate) {
            node.textContent = '';
            node.className = 'canvas-filter-hint';
            return;
        }
        const total = state.editorElements.length;
        const visible = visibleCanvasElements().length;
        const filter = canvasElementTypeFilter();
        node.textContent = filter
            ? `${canvasElementTypeLabel(filter)} ${visible}/${total}`
            : `全部 ${total}`;
        node.className = 'canvas-filter-hint' + (filter ? ' active' : '');
    }

    function normalizeTextAlign(value) {
        const normalized = String(value || 'left').toLowerCase();
        return ['left', 'center', 'right'].indexOf(normalized) >= 0 ? normalized : 'left';
    }

    function elementUsesTextStyle(element) {
        return !!element && ['STATIC_TEXT', 'FIELD_TEXT'].indexOf(element.type) >= 0;
    }

    function elementUsesFieldBinding(element) {
        return !!element && ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0;
    }

    function elementUsesContentTools(element) {
        return !!element && (elementUsesFieldBinding(element) || element.type === 'STATIC_TEXT' || elementUsesTextStyle(element));
    }

    function fieldSourceByName(fieldName) {
        return (state.sampleFieldSources || []).find((item) => item.fieldName === fieldName) || null;
    }

    function fieldContractByName(fieldName) {
        return (state.fieldContract || []).find((item) => item.fieldName === fieldName) || null;
    }

    function fieldDisplayName(fieldName) {
        const source = fieldSourceByName(fieldName);
        const contract = fieldContractByName(fieldName);
        return (source && source.displayName) || (contract && contract.displayName) || fieldName || '字段';
    }

    function defaultFieldNameForType(type) {
        if (type === 'FIELD_TEXT') return 'boxLabelName';
        if (type === 'BARCODE') return 'productBarcode';
        if (type === 'QRCODE') return 'qrCode';
        return '';
    }

    function ensureFieldBindingForType(element, nextType) {
        const defaultFieldName = defaultFieldNameForType(nextType);
        if (!defaultFieldName) {
            if (nextType !== 'FIELD_TEXT' && nextType !== 'BARCODE' && nextType !== 'QRCODE') {
                element.fieldName = '';
            }
            return;
        }
        const currentField = fieldContractByName(element.fieldName);
        if (!element.fieldName || !currentField || nextType === 'BARCODE' || nextType === 'QRCODE') {
            element.fieldName = defaultFieldName;
        }
    }

    function sourceStatusClass(source) {
        if (!source || source.fieldStatus === 'MISSING') return 'status-missing';
        if (source.fieldStatus === 'FALLBACK') return 'status-fallback';
        return 'status-ok';
    }

    function newElementId() {
        return 'draft-' + Date.now() + '-' + Math.random().toString(16).slice(2, 8);
    }

    async function loadFieldContract() {
        const data = await api('/api/box-labels/field-contract');
        const fields = Array.isArray(data) ? data : (data.fields || data.items || []);
        state.fieldContract = fields.map((item) => ({
            fieldName: item.fieldName || item.javaFieldName,
            displayName: item.displayName || item.vfpFieldName || item.javaFieldName,
            category: item.category || item.source || '',
            required: item.requiredForFrx
        })).filter((item) => item.fieldName);
        renderFieldPalette();
        renderTemplateHealth();
        renderTemplateBasicsSummary();
    }

    async function loadTemplates() {
        const params = new URLSearchParams();
        params.set('labelType', $('labelType').value);
        const data = await api('/api/label-templates?' + params.toString());
        state.templates = (data.items || []).filter((item) => !$('templateStatus').value || item.status === $('templateStatus').value);
        const currentStillVisible = state.editorTemplate && state.templates.some((item) => item.code === state.editorTemplate.code);
        if (!currentStillVisible) {
            state.editorTemplate = null;
        }
        renderTemplates();
        const preferredCode = preferredEditableTemplateCode();
        if (!state.editorTemplate && preferredCode) {
            loadTemplateIntoEditor(preferredCode);
        } else if (!preferredCode) {
            loadTemplateIntoEditor(null);
        }
    }

    function preferredEditableTemplateCode() {
        const editable = state.templates.find((item) => item.engine === 'CONFIG_LAYOUT');
        return editable ? editable.code : (state.templates[0] ? state.templates[0].code : null);
    }

    function renderTemplates() {
        $('templates').innerHTML = state.templates.map((item) =>
            `<button class="template-item ${state.editorTemplate && state.editorTemplate.code === item.code ? 'active' : ''}" data-code="${escapeHtml(item.code)}">
                <strong>${escapeHtml(item.name)}</strong>
                <span class="muted">${escapeHtml(item.code)} / ${escapeHtml(item.engine)} / ${escapeHtml(item.status)} / v${escapeHtml(item.version)}</span>
            </button>`
        ).join('');
        Array.prototype.forEach.call(document.querySelectorAll('.template-item'), (button) => {
            button.onclick = () => runAction('middleStatus', () => loadTemplateIntoEditor(button.getAttribute('data-code')));
        });
    }

    function fieldContractGroups() {
        const commonNames = commonFieldNames.reduce((names, fieldName) => {
            names[fieldName] = true;
            return names;
        }, {});
        const groups = {};
        const commonItems = state.fieldContract.filter((item) => commonNames[item.fieldName]);
        if (commonItems.length) {
            groups['常用字段'] = commonItems;
        }
        return state.fieldContract.reduce((allGroups, item) => {
            if (commonNames[item.fieldName]) return allGroups;
            const category = item.category || '未分组';
            if (!allGroups[category]) allGroups[category] = [];
            allGroups[category].push(item);
            return allGroups;
        }, groups);
    }

    function fieldSearchTerm() {
        return ($('fieldSearch') && $('fieldSearch').value || '').trim().toLowerCase();
    }

    function fieldLibraryViewMode() {
        return state.fieldLibraryView === 'list' ? 'list' : 'quick';
    }

    function setFieldLibraryViewMode(mode) {
        state.fieldLibraryView = mode === 'list' ? 'list' : 'quick';
        renderFieldPalette();
    }

    function fieldAssistantMode() {
        return ['smart', 'starter', 'packs', 'batch'].indexOf(state.fieldAssistantMode) >= 0
            ? state.fieldAssistantMode
            : 'smart';
    }

    function setFieldAssistantMode(mode) {
        state.fieldAssistantMode = ['smart', 'starter', 'packs', 'batch'].indexOf(mode) >= 0 ? mode : 'smart';
        renderFieldPalette();
    }

    function fieldAssistantModeClass() {
        const mode = fieldAssistantMode();
        if (mode === 'starter') return 'field-assistant-mode-starter';
        if (mode === 'packs') return 'field-assistant-mode-packs';
        if (mode === 'batch') return 'field-assistant-mode-batch';
        return 'field-assistant-mode-smart';
    }

    function shouldShowFieldAssistantTabs(term) {
        return fieldLibraryViewMode() === 'quick' && !term;
    }

    function shouldRenderTemplateStarterRecipes(term) {
        return shouldShowFieldAssistantTabs(term) && fieldAssistantMode() === 'starter';
    }

    function renderFieldAssistantModeTabs(term) {
        const tabs = $('fieldAssistantModeTabs');
        if (!tabs) return;
        const visible = shouldShowFieldAssistantTabs(term);
        tabs.hidden = !visible;
        if (!visible) return;
        const activeMode = fieldAssistantMode();
        Array.prototype.forEach.call(tabs.querySelectorAll('[data-field-assistant-mode]'), (button) => {
            button.className = button.getAttribute('data-field-assistant-mode') === activeMode ? 'active' : '';
            button.onclick = () => setFieldAssistantMode(button.getAttribute('data-field-assistant-mode'));
        });
    }

    function shouldShowFieldPaletteList(term) {
        return fieldLibraryViewMode() === 'list' || !!term;
    }

    function shouldShowFieldListControls(term) {
        return shouldShowFieldPaletteList(term || '');
    }

    function syncFieldListControls(term) {
        const visible = shouldShowFieldListControls(term || fieldSearchTerm());
        const mode = $('fieldPaletteMode');
        if (mode) mode.hidden = !visible;
        Array.prototype.forEach.call(document.querySelectorAll('.field-list-option'), (control) => {
            control.hidden = !visible;
        });
    }

    function fieldPaletteMode() {
        return state.fieldPaletteMode || 'common';
    }

    function fieldDensity() {
        return state.fieldDensity === 'comfortable' ? 'comfortable' : 'compact';
    }

    function setFieldDensity(density) {
        state.fieldDensity = density === 'comfortable' ? 'comfortable' : 'compact';
        renderFieldPalette();
    }

    function fieldInsertMode() {
        return state.fieldInsertMode === 'label-value' ? 'label-value' : 'value';
    }

    function setFieldInsertMode(mode) {
        state.fieldInsertMode = mode === 'label-value' ? 'label-value' : 'value';
        renderFieldPalette();
    }

    function fieldMatchesSearch(item, term) {
        if (!term) return true;
        return [item.fieldName, item.displayName, item.category].some((value) =>
            String(value || '').toLowerCase().indexOf(term) >= 0
        );
    }

    function usedFieldNames() {
        return state.editorElements.reduce((names, element) => {
            if (element.fieldName) names[element.fieldName] = true;
            return names;
        }, {});
    }

    function unusedFieldNames() {
        const usedNames = usedFieldNames();
        return (state.fieldContract || [])
            .filter((item) => item.fieldName && !usedNames[item.fieldName])
            .map((item) => item.fieldName);
    }

    function missingRequiredFieldContracts() {
        const usedNames = usedFieldNames();
        return (state.fieldContract || []).filter((item) => item.required && item.fieldName && !usedNames[item.fieldName]);
    }

    function addSmartFieldCandidate(list, seen, field, reason) {
        if (!field || !field.fieldName || seen[field.fieldName]) return;
        if (usedFieldNames()[field.fieldName]) return;
        const source = fieldSourceByName(field.fieldName);
        seen[field.fieldName] = true;
        list.push(Object.assign({}, field, {
            reason: reason || (field.required ? '必填' : '推荐'),
            sampleValue: source && source.value ? source.value : ''
        }));
    }

    function smartFieldQueueCandidates() {
        const candidates = [];
        const seen = {};
        missingRequiredFieldContracts().forEach((field) => addSmartFieldCandidate(candidates, seen, field, '缺必填'));
        commonFieldNames.forEach((fieldName) => addSmartFieldCandidate(candidates, seen, fieldContractByName(fieldName), '常用'));
        (state.sampleFieldSources || []).forEach((source) => {
            if (!source || !source.fieldName || !source.value) return;
            const field = fieldContractByName(source.fieldName) || {
                fieldName: source.fieldName,
                displayName: source.displayName || source.fieldName,
                category: source.sourceType || '',
                required: false
            };
            addSmartFieldCandidate(candidates, seen, field, '有样例');
        });
        (state.fieldContract || []).forEach((field) => addSmartFieldCandidate(candidates, seen, field, field.required ? '必填' : '未用'));
        return candidates.slice(0, 8);
    }

    function renderFieldSmartQueue() {
        const panel = $('fieldSmartQueue');
        if (!panel) return;
        const term = fieldSearchTerm();
        const visible = fieldLibraryViewMode() === 'quick' && !term && fieldAssistantMode() === 'smart';
        if (!visible) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        const candidates = smartFieldQueueCandidates();
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        if (!candidates.length) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        panel.hidden = false;
        const disabled = templateReady ? '' : 'disabled';
        panel.innerHTML = `<div class="smart-queue-head">
                <strong>推荐字段队列</strong>
                <span>${candidates.length} 个优先字段</span>
            </div>
            <div class="smart-queue-fields">
                ${candidates.map((field) => `<button type="button" class="smart-queue-field" data-smart-field="${escapeHtml(field.fieldName)}" ${disabled}>
                    <strong>${escapeHtml(field.displayName || field.fieldName)}</strong>
                    <span>${escapeHtml(field.reason || '')}</span>
                </button>`).join('')}
            </div>
            <div class="smart-queue-actions">
                <button id="smartQueueSelectBtn" type="button">加入勾选</button>
                <button id="smartQueueAddBtn" type="button" class="primary" ${disabled}>一键加入</button>
                <button id="smartQueueLayoutBtn" type="button" ${disabled}>加入并排版</button>
            </div>`;
        Array.prototype.forEach.call(panel.querySelectorAll('[data-smart-field]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyFieldPaletteSelection(button.getAttribute('data-smart-field')));
        });
        $('smartQueueSelectBtn').onclick = selectSmartFieldQueue;
        $('smartQueueAddBtn').onclick = () => runAction('middleStatus', () => addSmartFieldQueueFields(false));
        $('smartQueueLayoutBtn').onclick = () => runAction('middleStatus', () => addSmartFieldQueueFields(true));
    }

    function selectSmartFieldQueue() {
        const selected = {};
        (state.selectedFieldBatch || []).forEach((fieldName) => {
            if (fieldName) selected[fieldName] = true;
        });
        smartFieldQueueCandidates().forEach((field) => {
            selected[field.fieldName] = true;
        });
        state.selectedFieldBatch = Object.keys(selected);
        renderFieldPalette();
    }

    function addSmartFieldQueueFields(layoutAfter) {
        if (!requireEditorTemplate('middleStatus')) return;
        const candidates = smartFieldQueueCandidates();
        if (!candidates.length) {
            setStatus('middleStatus', '没有可推荐加入的字段', 'ok');
            return;
        }
        const previousInsertMode = state.fieldInsertMode;
        state.selectedFieldBatch = candidates.map((field) => field.fieldName);
        if (layoutAfter) state.fieldInsertMode = 'label-value';
        addSelectedFieldsToCanvas();
        if (layoutAfter) {
            applyFieldLayoutPreset('selected');
            state.fieldInsertMode = previousInsertMode;
            renderFieldPalette();
        }
    }

    function fieldPresetPacks() {
        return [
            {
                key: 'logistics',
                label: '常用物流',
                description: '箱贴名称、规格、条码',
                fieldNames: ['boxLabelName', 'inventoryName', 'packageSpec', 'productBarcode', 'qrCode', 'productionDate'],
                keywords: ['box', 'label', 'inventory', 'package', 'barcode', 'qr', '箱', '标签', '物流', '条码', '二维码', '规格'],
                limit: 6
            },
            {
                key: 'product',
                label: '产品规格',
                description: '品名、规格、型号',
                fieldNames: ['inventoryName', 'packageSpec', 'productName', 'productModel', 'model', 'specification', 'unit'],
                keywords: ['product', 'inventory', 'name', 'spec', 'model', 'unit', 'material', '产品', '品名', '规格', '型号', '单位', '材质'],
                limit: 6
            },
            {
                key: 'trace',
                label: '生产追溯',
                description: '日期、班次、批次',
                fieldNames: ['productionDate', 'shift', 'batchNo', 'lotNo', 'productBarcode', 'qrCode'],
                keywords: ['date', 'shift', 'batch', 'lot', 'trace', 'serial', '生产', '日期', '班次', '批次', '追溯', '序列'],
                limit: 6
            }
        ];
    }

    function fieldPresetText(field) {
        return [field.fieldName, field.displayName, field.category]
            .map((value) => String(value || '').toLowerCase())
            .join('|');
    }

    function fieldPresetPackItems(packOrKey) {
        const pack = typeof packOrKey === 'string'
            ? fieldPresetPacks().find((item) => item.key === packOrKey)
            : packOrKey;
        if (!pack) return [];
        const usedNames = usedFieldNames();
        const seen = {};
        const items = [];
        const addField = (field) => {
            if (!field || !field.fieldName || usedNames[field.fieldName] || seen[field.fieldName]) return;
            seen[field.fieldName] = true;
            items.push(field);
        };
        (pack.fieldNames || []).forEach((fieldName) => addField(fieldContractByName(fieldName)));
        (state.fieldContract || []).forEach((field) => {
            if (items.length >= (pack.limit || 6)) return;
            const haystack = fieldPresetText(field);
            if ((pack.keywords || []).some((keyword) => haystack.indexOf(String(keyword).toLowerCase()) >= 0)) {
                addField(field);
            }
        });
        if (!items.length && pack.key === 'logistics') {
            commonFieldNames.forEach((fieldName) => addField(fieldContractByName(fieldName)));
        }
        return items.slice(0, pack.limit || 6);
    }

    function fieldPresetPackAttribute(packKey) {
        if (packKey === 'logistics') return 'data-field-preset-pack="logistics"';
        if (packKey === 'product') return 'data-field-preset-pack="product"';
        if (packKey === 'trace') return 'data-field-preset-pack="trace"';
        return 'data-field-preset-pack="' + escapeHtml(packKey) + '"';
    }

    function renderFieldPresetPacks() {
        const panel = $('fieldPresetPacks');
        if (!panel) return;
        const term = fieldSearchTerm();
        const visible = fieldLibraryViewMode() === 'quick' && !term && fieldAssistantMode() === 'packs';
        if (!visible) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        const packs = fieldPresetPacks();
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const hasContract = (state.fieldContract || []).length > 0;
        if (!hasContract) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        panel.hidden = false;
        panel.innerHTML = `<div class="field-preset-head">
                <strong>字段预设包</strong>
                <span>一键加入并排版</span>
            </div>
            <div class="field-preset-grid">
                ${packs.map((pack) => {
                    const items = fieldPresetPackItems(pack);
                    const disabled = templateReady && items.length ? '' : 'disabled';
                    const names = items.slice(0, 3).map((field) => field.displayName || field.fieldName).join(' / ');
                    const hint = names || (templateReady ? '字段已全部使用' : '先选择模板');
                    return `<button type="button" class="field-preset-pack" ${fieldPresetPackAttribute(pack.key)} ${disabled}>
                        <strong>${escapeHtml(pack.label)} · ${items.length}</strong>
                        <span>${escapeHtml(hint)}</span>
                    </button>`;
                }).join('')}
            </div>`;
        Array.prototype.forEach.call(panel.querySelectorAll('[data-field-preset-pack]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyFieldPresetPack(button.getAttribute('data-field-preset-pack'), true));
        });
    }

    function applyFieldPresetPack(packKey, layoutAfter) {
        if (!requireEditorTemplate('middleStatus')) return;
        const pack = fieldPresetPacks().find((item) => item.key === packKey);
        const fields = fieldPresetPackItems(pack);
        if (!pack || !fields.length) {
            setStatus('middleStatus', '这个预设包没有可加入的新字段', 'ok');
            return;
        }
        const previousInsertMode = state.fieldInsertMode;
        state.selectedFieldBatch = fields.map((field) => field.fieldName);
        state.fieldInsertMode = 'label-value';
        addSelectedFieldsToCanvas();
        if (layoutAfter !== false) {
            applyFieldLayoutPreset('selected');
        }
        state.fieldInsertMode = previousInsertMode;
        renderFieldPalette();
        setStatus('middleStatus', `已加入${pack.label} ${fields.length} 个字段，可继续拖拽微调后保存`, 'ok');
    }

    function renderTemplateBasicsSummary() {
        const template = state.editorTemplate;
        const missingRequiredCount = template ? missingRequiredFieldContracts().length : 0;
        const issueCount = template ? validateTemplateElements().length : 0;
        if ($('templateSummaryName')) {
            $('templateSummaryName').textContent = template ? (template.name || template.code) : '请选择模板';
        }
        if ($('templateSummaryMeta')) {
            $('templateSummaryMeta').textContent = template
                ? `${template.code} / ${template.engine || 'CONFIG'} / ${template.status || 'DRAFT'} / v${template.version || 1}`
                : '选择 CONFIG_LAYOUT 模板后可编辑基础信息。';
        }
        if ($('templateSummarySize')) {
            $('templateSummarySize').textContent = template
                ? `${template.pageWidthMm || 120}x${template.pageHeightMm || 80}mm`
                : `${$('pageWidthMm') ? $('pageWidthMm').value || 120 : 120}x${$('pageHeightMm') ? $('pageHeightMm').value || 80 : 80}mm`;
        }
        if ($('templateSummaryElements')) {
            $('templateSummaryElements').textContent = template ? String(state.editorElements.length) : '0';
        }
        if ($('templateSummaryHealth')) {
            $('templateSummaryHealth').textContent = template
                ? (issueCount ? `${issueCount} 项 / 缺 ${missingRequiredCount}` : '正常')
                : '待选择';
        }
        if ($('templateSettingsPanel')) {
            $('templateSettingsPanel').className = 'template-settings-panel' + (state.templateSettingsOpen ? '' : ' collapsed');
        }
        if ($('templateBasicsToggle')) {
            $('templateBasicsToggle').textContent = state.templateSettingsOpen ? '收起设置' : '编辑设置';
            $('templateBasicsToggle').setAttribute('aria-expanded', state.templateSettingsOpen ? 'true' : 'false');
            $('templateBasicsToggle').disabled = !template;
        }
    }

    function toggleTemplateSettingsPanel(forceOpen) {
        state.templateSettingsOpen = typeof forceOpen === 'boolean' ? forceOpen : !state.templateSettingsOpen;
        renderTemplateBasicsSummary();
    }

    function syncTemplateFormFromEditor(template) {
        $('templateCode').value = template ? template.code : '';
        $('templateName').value = template ? template.name : '';
        $('pageWidthMm').value = template ? template.pageWidthMm : 120;
        $('pageHeightMm').value = template ? template.pageHeightMm : 80;
        syncPagePresetSelect($('pageWidthMm').value, $('pageHeightMm').value);
        renderTemplateBasicsSummary();
    }

    function canBindSelectedElementToField() {
        const selected = selectedEditorElements();
        return selected.length === 1 && !selected[0].locked && ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(selected[0].type) >= 0;
    }

    function updateFieldQuickActionHint() {
        if (!$('fieldQuickActionHint')) return;
        $('fieldQuickActionHint').textContent = canBindSelectedElementToField()
            ? '字段动作：点击绑定选中元素；拖到画布可新建字段'
            : (fieldInsertMode() === 'label-value'
                ? '字段动作：点击或拖拽会新增“标题+值”两个元素'
                : '字段动作：点击新增字段；拖到画布按位置放置');
    }

    function selectedFieldBatchItems() {
        const byName = state.fieldContract.reduce((map, item) => {
            map[item.fieldName] = item;
            return map;
        }, {});
        return (state.selectedFieldBatch || []).map((fieldName) => byName[fieldName]).filter((item) => item);
    }

    function renderFieldBatchTray() {
        const tray = $('fieldBatchTray');
        if (!tray) return;
        const selectedCount = (state.selectedFieldBatch || []).length;
        const term = fieldSearchTerm();
        const visible = shouldShowFieldPaletteList(term)
            || !!selectedCount
            || (fieldLibraryViewMode() === 'quick' && !term && fieldAssistantMode() === 'batch');
        tray.hidden = !visible;
        if (!visible) {
            tray.innerHTML = '';
            return;
        }
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const usedNames = usedFieldNames();
        const addableCount = selectedFieldBatchItems().filter((field) => !usedNames[field.fieldName]).length;
        const insertModeText = fieldInsertMode() === 'label-value' ? '标题+值' : '字段值';
        tray.innerHTML = `<div id="selectedFieldBatchSummary" class="field-batch-summary">
                ${selectedCount ? `已选 ${selectedCount} 个字段，${addableCount} 个可加入画布 · ${insertModeText}` : `勾选字段后可一次加入画布，当前插入 ${insertModeText}`}
            </div>
            <div class="actions">
                <button id="selectVisibleFieldsBtn" type="button" ${state.currentVisibleFieldNames.length ? '' : 'disabled'}>选择当前</button>
                <button id="clearSelectedFieldsBtn" type="button" ${selectedCount ? '' : 'disabled'}>清空</button>
                <button id="addSelectedFieldsBtn" type="button" class="primary" ${templateReady && addableCount ? '' : 'disabled'}>加入画布</button>
            </div>`;
        $('selectVisibleFieldsBtn').onclick = () => selectVisibleFieldBatch();
        $('clearSelectedFieldsBtn').onclick = () => clearSelectedFieldBatch();
        $('addSelectedFieldsBtn').onclick = () => runAction('middleStatus', addSelectedFieldsToCanvas);
    }

    function toggleFieldBatchSelection(fieldName, forceValue) {
        if (!fieldName) return;
        const selected = state.selectedFieldBatch || [];
        const exists = selected.indexOf(fieldName) >= 0;
        const shouldSelect = typeof forceValue === 'boolean' ? forceValue : !exists;
        state.selectedFieldBatch = shouldSelect
            ? (exists ? selected : selected.concat([fieldName]))
            : selected.filter((item) => item !== fieldName);
        renderFieldPalette();
    }

    function clearSelectedFieldBatch() {
        state.selectedFieldBatch = [];
        renderFieldPalette();
    }

    function selectVisibleFieldBatch() {
        const selected = {};
        (state.selectedFieldBatch || []).concat(state.currentVisibleFieldNames || []).forEach((fieldName) => {
            if (fieldName) selected[fieldName] = true;
        });
        state.selectedFieldBatch = Object.keys(selected);
        renderFieldPalette();
    }

    function addFieldFromPalette(fieldName) {
        if (fieldInsertMode() !== 'label-value') {
            addTemplateElement('FIELD_TEXT', fieldName);
            return;
        }
        if (!requireEditorTemplate('middleStatus')) return;
        const field = fieldContractByName(fieldName) || {fieldName: fieldName, displayName: fieldDisplayName(fieldName), required: false};
        snapshotEditorHistory();
        const elements = createFieldElementsAtGridSlot(field, 0, maxElementSortOrder() + 1);
        state.editorElements = state.editorElements.concat(elements);
        state.selectedElementIds = elements.map((element) => element.id);
        state.inspectorTab = 'batch';
        state.canvasElementTypeFilter = '';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已加入 ${fieldDisplayName(fieldName)} 标题和值`, 'ok');
    }

    function applyFieldPaletteSelection(fieldName) {
        if (canBindSelectedElementToField()) {
            const element = primarySelectedElement();
            snapshotEditorHistory();
            element.fieldName = fieldName;
            markEditorDirty();
            setRightPanelTab('properties');
            renderTemplateEditor(state.editorTemplate);
            renderFieldPalette();
            return;
        }
        addFieldFromPalette(fieldName);
    }

    function fieldMatchesPaletteMode(item, term, usedNames) {
        if (fieldPaletteMode() === 'unused') return !usedNames[item.fieldName];
        if (term) return true;
        if (fieldPaletteMode() === 'all') return true;
        if (fieldPaletteMode() === 'used') return !!usedNames[item.fieldName];
        return commonFieldNames.indexOf(item.fieldName) >= 0 || !!usedNames[item.fieldName];
    }

    function setFieldPaletteMode(mode) {
        state.fieldPaletteMode = ['common', 'used', 'unused', 'all'].indexOf(mode) >= 0 ? mode : 'common';
        renderFieldPalette();
    }

    function toggleFieldDetails() {
        state.fieldDetailsVisible = !!($('fieldDetailsToggle') && $('fieldDetailsToggle').checked);
        renderFieldPalette();
    }

    function shouldOpenFieldGroup(category, items, term) {
        if (category === '常用字段') return true;
        if (fieldPaletteMode() === 'used' || fieldPaletteMode() === 'unused') return true;
        return !!term && (items || []).some((item) => fieldMatchesSearch(item, term));
    }

    function renderFieldSearch() {
        renderFieldPalette();
    }

    function renderFieldLibraryViewControls(term) {
        const activeView = fieldLibraryViewMode();
        Array.prototype.forEach.call(document.querySelectorAll('[data-field-library-view]'), (button) => {
            button.className = button.getAttribute('data-field-library-view') === activeView ? 'active' : '';
        });

        if (support) {
            const listVisible = shouldShowFieldPaletteList(term || fieldSearchTerm());
            const controlsHidden = shouldShowFieldListControls(term || fieldSearchTerm()) ? '' : ' field-library-list-controls-hidden';
            support.className = 'support-panel field-library-view-' + activeView + ' ' + fieldAssistantModeClass() + (listVisible ? ' field-library-list-visible' : '') + controlsHidden;
        }
        syncFieldListControls(term || fieldSearchTerm());
    }

    function renderFieldLibraryQuickPanel(term) {
        const panel = $('fieldLibraryQuickPanel');
        if (!panel) return;
        const quickVisible = fieldLibraryViewMode() === 'quick' && !term;
        if (!quickVisible) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        const usedCount = Object.keys(usedFieldNames()).length;

            .map((fieldName) => fieldContractByName(fieldName))
            .filter((field) => field && !usedFieldNames()[field.fieldName]);
        panel.hidden = false;
        panel.innerHTML = `<div class="field-library-quick-metrics">
                <span>未用<strong>${Math.max(0, totalCount - usedCount)}</strong></span>
                <span>必填<strong>${requiredFields.length}</strong></span>
                <span>已选<strong>${(state.selectedFieldBatch || []).length}</strong></span>
            </div>
            <div class="field-library-quick-actions">
                <button id="quickSelectRequiredFieldsBtn" type="button" ${requiredFields.length ? '' : 'disabled'}>选必填</button>
                <button id="quickSelectCommonFieldsBtn" type="button" ${commonFields.length ? '' : 'disabled'}>选常用</button>
                <button id="quickOpenFieldListBtn" type="button">清单</button>
            </div>`;

    function mergeFieldBatchSelection(fieldNames) {
        const selected = {};
        (state.selectedFieldBatch || []).forEach((fieldName) => {
            if (fieldName) selected[fieldName] = true;
        });
        (fieldNames || []).forEach((fieldName) => {
            if (fieldName) selected[fieldName] = true;
        });
        state.selectedFieldBatch = Object.keys(selected);
    }

    function quickSelectRequiredFields() {
        const fields = missingRequiredFieldContracts();
        if (!fields.length) {
            setStatus('middleStatus', '没有缺失的必填字段', 'ok');
            return;
        }
        mergeFieldBatchSelection(fields.map((field) => field.fieldName));
        renderFieldPalette();
    }

    function quickSelectCommonFields() {
        const usedNames = usedFieldNames();
        const fields = commonFieldNames
            .map((fieldName) => fieldContractByName(fieldName))
            .filter((field) => field && !usedNames[field.fieldName]);
        if (!fields.length) {
            setStatus('middleStatus', '常用字段都已在模板中', 'ok');
            return;
        }
        mergeFieldBatchSelection(fields.map((field) => field.fieldName));
        renderFieldPalette();
    }

    function unboundFieldElements() {
        return (state.editorElements || []).filter((element) =>
            ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0 && !element.fieldName
        );
    }

    function fieldUsageDigestStats() {
        const total = (state.fieldContract || []).length;
        const usedCount = Object.keys(usedFieldNames()).length;
        const requiredTotal = (state.fieldContract || []).filter((field) => !!field.required).length;
        const missingRequiredCount = missingRequiredFieldContracts().length;
        const unusedCount = Math.max(0, total - usedCount);
        const unboundCount = unboundFieldElements().length;
        return {
            total: total,
            usedCount: usedCount,
            unusedCount: unusedCount,
            requiredTotal: requiredTotal,
            missingRequiredCount: missingRequiredCount,
            unboundCount: unboundCount,
            coverage: total ? Math.min(100, Math.round((usedCount / total) * 100)) : 0
        };
    }

    function renderFieldUsageDigest(term) {
        const panel = $('fieldUsageDigest');
        if (!panel) return;
        const visible = fieldLibraryViewMode() === 'quick' && !term;
        if (!visible) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        const stats = fieldUsageDigestStats();
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const addDisabled = templateReady && stats.missingRequiredCount ? '' : 'disabled';
        const unusedDisabled = stats.unusedCount ? '' : 'disabled';
        const unboundDisabled = templateReady && stats.unboundCount ? '' : 'disabled';
        panel.hidden = false;
        panel.innerHTML = `<div class="field-usage-head">
                <strong>字段使用摘要</strong>
                <span>${escapeHtml(stats.coverage)}%</span>
            </div>
            <div class="fieldCoverageMeter field-coverage-meter" id="fieldCoverageMeter"><span style="width:${escapeHtml(stats.coverage)}%"></span></div>
            <div class="field-usage-metrics">
                <span>已用<strong>${escapeHtml(stats.usedCount)}/${escapeHtml(stats.total)}</strong></span>
                <span>缺必填<strong>${escapeHtml(stats.missingRequiredCount)}/${escapeHtml(stats.requiredTotal)}</strong></span>
                <span>未绑定<strong>${escapeHtml(stats.unboundCount)}</strong></span>
            </div>
            <div class="field-usage-actions">
                <button id="quickAddRequiredAndLayoutBtn" type="button" ${addDisabled}>补齐排版</button>
                <button id="quickShowUnusedFieldsBtn" type="button" ${unusedDisabled}>只看未用</button>
                <button id="quickSelectUnboundElementsBtn" type="button" ${unboundDisabled}>定位未绑</button>
            </div>`;
        $('quickAddRequiredAndLayoutBtn').onclick = () => runAction('middleStatus', addMissingRequiredFieldsAndLayout);
        $('quickShowUnusedFieldsBtn').onclick = () => runAction('middleStatus', showUnusedFieldLibrary);
        $('quickSelectUnboundElementsBtn').onclick = () => runAction('middleStatus', quickSelectUnboundElements);

    function showUnusedFieldLibrary() {
        state.fieldLibraryView = 'list';
        state.fieldPaletteMode = 'unused';
        if ($('fieldSearch')) $('fieldSearch').value = '';
        renderFieldPalette();
        setStatus('middleStatus', '已切到未使用字段清单，可按需加入画布', 'ok');
    }

    function quickSelectUnboundElements() {
        state.canvasElementTypeFilter = '';
        return selectUnboundEditorElements();
    }

    function addMissingRequiredFieldsAndLayout() {
        if (!requireEditorTemplate('middleStatus')) return;
        const missingFields = missingRequiredFieldContracts();
        if (!missingFields.length) {
            setStatus('middleStatus', '没有缺失的必填字段', 'ok');
            return;
        }
        snapshotEditorHistory();
        let nextSortOrder = maxElementSortOrder() + 1;
        const pairs = missingFields.map((field, index) => {
            const base = createFieldElementAtGridSlot(field, index, nextSortOrder);
            const elements = createFieldLabelValueElements(field, base.leftMm, base.topMm, Math.max(52, Number(base.widthMm || 52)), base.heightMm, nextSortOrder);
            nextSortOrder += elements.length;
            return {label: elements[0], value: elements[1]};
        });
        const arranged = applyLayoutPresetToFieldPairs(pairs, currentLayoutPreset());
        state.editorElements = state.editorElements.concat(arranged);
        state.selectedElementIds = arranged.map((element) => element.id);
        state.selectedFieldBatch = [];
        state.inspectorTab = 'batch';
        state.canvasElementTypeFilter = '';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已补齐并排版 ${missingFields.length} 个必填字段 / ${arranged.length} 个元素`, 'ok');
    }

    function templateStarterRecipes() {
        return [
            {
                key: 'logistics-basic',
                label: '物流箱贴',
                description: '标题、物流字段、条码、二维码',
                title: '物流箱贴',
                limit: 6,
                fieldSlots: [
                    ['boxLabelName', 'labelName', 'templateName'],
                    ['inventoryName', 'productName', 'materialName'],
                    ['packageSpec', 'specification', 'spec', 'model'],
                    ['productionDate', 'manufactureDate', 'date'],
                    ['productBarcode', 'barcode', 'barCode'],
                    ['qrCode', 'traceCode', 'serialNo']
                ],
                barcodeFields: ['productBarcode', 'barcode', 'barCode'],
                qrFields: ['qrCode', 'traceCode', 'serialNo']
            },
            {
                key: 'traceability',
                label: '追溯标签',
                description: '批次、日期、班次、追溯码',
                title: '生产追溯标签',
                limit: 6,
                fieldSlots: [
                    ['inventoryName', 'productName', 'materialName'],
                    ['batchNo', 'lotNo', 'batch', 'lot'],
                    ['productionDate', 'manufactureDate', 'date'],
                    ['shift', 'workShift', 'className'],
                    ['productBarcode', 'barcode', 'barCode'],

                ],
                barcodeFields: ['productBarcode', 'barcode', 'batchNo', 'lotNo'],
                qrFields: ['qrCode', 'traceCode', 'serialNo', 'productBarcode']
            }
        ];
    }

    function templateStarterRecipeByKey(recipeOrKey) {
        if (typeof recipeOrKey !== 'string') return recipeOrKey || null;
        return templateStarterRecipes().find((recipe) => recipe.key === recipeOrKey) || null;
    }

    function templateStarterRecipeAttribute(recipeKey) {
        if (recipeKey === 'logistics-basic') return 'data-template-starter-recipe="logistics-basic"';
        if (recipeKey === 'traceability') return 'data-template-starter-recipe="traceability"';
        return 'data-template-starter-recipe="' + escapeHtml(recipeKey) + '"';
    }

    function starterRecipeText(field) {
        return [field.fieldName, field.displayName, field.category]
            .map((value) => String(value || '').toLowerCase())
            .join('|');
    }

    function starterRecipeFindField(aliases) {
        const names = (aliases || []).filter((item) => item);
        for (let i = 0; i < names.length; i += 1) {
            const exact = fieldContractByName(names[i]);
            if (exact) return exact;
        }
        const lowerNames = names.map((name) => String(name).toLowerCase());
        return (state.fieldContract || []).find((field) => {
            const text = starterRecipeText(field);
            return lowerNames.some((name) => text.indexOf(name) >= 0);
        }) || null;
    }

    function starterRecipeFieldContracts(recipeOrKey) {
        const recipe = templateStarterRecipeByKey(recipeOrKey);
        if (!recipe) return [];
        const seen = {};
        const fields = [];
        const addField = (field) => {
            if (!field || !field.fieldName || seen[field.fieldName]) return;
            seen[field.fieldName] = true;
            fields.push(field);
        };
        (recipe.fieldSlots || []).forEach((aliases) => addField(starterRecipeFindField(aliases)));
        commonFieldNames.forEach((fieldName) => addField(fieldContractByName(fieldName)));
        (state.fieldContract || []).forEach(addField);
        return fields.slice(0, recipe.limit || 6);
    }

    function starterRecipeFieldNameFromAliases(aliases, fallback) {
        const field = starterRecipeFindField(aliases || []);
        return field && field.fieldName ? field.fieldName : fallback;
    }

    function createStarterFieldPair(field, leftMm, topMm, widthMm, heightMm, sortOrder) {
        const pair = createFieldLabelValueElements(field, leftMm, topMm, widthMm, heightMm, sortOrder);
        pair.forEach((element) => {
            element.fontSize = 7.5;
            element.locked = false;
            if (field.required) element.bold = true;
        });
        return pair;
    }

    function createStarterRecipeElements(recipeKey) {
        const recipe = templateStarterRecipeByKey(recipeKey);
        if (!recipe) return [];
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const margin = pageWidth >= 90 ? 6 : 4;
        const elements = [];
        let sortOrder = maxElementSortOrder() + 1;
        const addElement = (element) => {
            element.sortOrder = sortOrder;
            sortOrder += 1;
            fitElementInsidePage(element);
            elements.push(element);
        };
        addElement({
            id: newElementId(),
            type: 'RECTANGLE',
            fieldName: '',
            text: '',
            leftMm: margin / 2,
            topMm: margin / 2,
            widthMm: Math.max(1, pageWidth - margin),
            heightMm: Math.max(1, pageHeight - margin),
            fontSize: 8,
            bold: false,
            textAlign: 'left',
            locked: false
        });
        addElement({
            id: newElementId(),
            type: 'STATIC_TEXT',
            fieldName: '',
            text: recipe.title || recipe.label,
            leftMm: margin,
            topMm: 6,
            widthMm: Math.max(24, pageWidth - margin * 2),
            heightMm: 8,
            fontSize: pageWidth >= 100 ? 13 : 11,
            bold: true,
            textAlign: 'center',
            locked: false
        });
        addElement({
            id: newElementId(),
            type: 'LINE',
            fieldName: '',
            text: '',
            leftMm: margin,
            topMm: 15,
            widthMm: Math.max(12, pageWidth - margin * 2),
            heightMm: 1,
            fontSize: 8,
            bold: false,
            textAlign: 'left',
            locked: false
        });
        const fields = starterRecipeFieldContracts(recipe);
        const columns = pageWidth >= 105 ? 2 : 1;
        const gapX = columns > 1 ? 4 : 0;
        const rowHeight = pageHeight >= 70 ? 7 : 6;
        const fieldsTop = pageHeight >= 70 ? 20 : 18;
        const qrSize = roundMm(clamp(Math.min(20, pageHeight / 4), 12, 22));
        const mediaTop = roundMm(clamp(pageHeight - qrSize - margin, fieldsTop + rowHeight, Math.max(fieldsTop + rowHeight, pageHeight - qrSize - 2)));
        const fieldsBottom = Math.max(fieldsTop + rowHeight, mediaTop - 3);
        const maxRows = Math.max(1, Math.floor((fieldsBottom - fieldsTop) / rowHeight));
        const maxFields = Math.min(fields.length, maxRows * columns, recipe.limit || 6);
        const pairWidth = roundMm((pageWidth - margin * 2 - gapX * (columns - 1)) / columns);
        fields.slice(0, maxFields).forEach((field, index) => {
            const column = index % columns;
            const row = Math.floor(index / columns);
            const left = roundMm(margin + column * (pairWidth + gapX));
            const top = roundMm(fieldsTop + row * rowHeight);
            const pair = createStarterFieldPair(field, left, top, pairWidth, 5.6, sortOrder);
            pair.forEach((element) => {
                sortOrder = Math.max(sortOrder, Number(element.sortOrder || sortOrder) + 1);
                fitElementInsidePage(element);
                elements.push(element);
            });
        });
        const barcodeFieldName = starterRecipeFieldNameFromAliases(recipe.barcodeFields, defaultFieldNameForType('BARCODE'));
        const qrFieldName = starterRecipeFieldNameFromAliases(recipe.qrFields, defaultFieldNameForType('QRCODE'));
        const qrLeft = roundMm(Math.max(margin, pageWidth - margin - qrSize));
        const barcodeWidth = roundMm(clamp(pageWidth - margin * 3 - qrSize, 34, Math.max(34, pageWidth - margin * 2)));
        const barcodeHeight = roundMm(clamp(qrSize * 0.62, 10, 15));
        addElement({
            id: newElementId(),
            type: 'BARCODE',
            fieldName: barcodeFieldName,
            text: '',
            leftMm: margin,
            topMm: roundMm(mediaTop + Math.max(0, (qrSize - barcodeHeight) / 2)),
            widthMm: barcodeWidth,
            heightMm: barcodeHeight,
            fontSize: 8,
            bold: false,
            textAlign: 'left',
            locked: false
        });
        if (pageWidth >= 70) {
            addElement({
                id: newElementId(),
                type: 'QRCODE',
                fieldName: qrFieldName,
                text: '',
                leftMm: qrLeft,
                topMm: mediaTop,
                widthMm: qrSize,
                heightMm: qrSize,
                fontSize: 8,
                bold: false,
                textAlign: 'left',
                locked: false
            });
        }
        return elements;
    }

    function wireTemplateStarterRecipeButtons(root) {
        const scope = root || document;
        Array.prototype.forEach.call(scope.querySelectorAll('[data-template-starter-recipe]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyTemplateStarterRecipe(button.getAttribute('data-template-starter-recipe')));
        });

    function renderTemplateStarterRecipes(term) {
        const panel = $('templateStarterRecipes');
        if (!panel) return;
        const visible = shouldRenderTemplateStarterRecipes(term);
        if (!visible) {
            panel.hidden = true;
            panel.innerHTML = '';
            return;
        }
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const disabled = templateReady ? '' : 'disabled';
        panel.hidden = false;
        panel.innerHTML = `<div class="template-starter-head">
                <strong>模板起步方案</strong>
                <span>一键生成可编辑骨架</span>
            </div>
            <div class="template-starter-grid">
                ${templateStarterRecipes().map((recipe) => {
                    const fields = starterRecipeFieldContracts(recipe);
                    const hint = fields.length ? fields.slice(0, 3).map((field) => field.displayName || field.fieldName).join(' / ') : '先加载字段';
                    return `<button type="button" class="template-starter-recipe" ${templateStarterRecipeAttribute(recipe.key)} ${disabled}>
                        <strong>${escapeHtml(recipe.label)}</strong>
                        <span>${escapeHtml(hint)}</span>
                    </button>`;
                }).join('')}
            </div>`;
        wireTemplateStarterRecipeButtons(panel);

    function applyTemplateStarterRecipe(recipeKey) {
        if (!requireEditorTemplate('middleStatus')) return;
        const recipe = templateStarterRecipeByKey(recipeKey);
        if (!recipe) {
            setStatus('middleStatus', '未找到模板起步方案', 'error');
            return;
        }
        const created = createStarterRecipeElements(recipe.key);
        if (!created.length) {
            setStatus('middleStatus', '起步方案没有可生成的元素', 'error');
            return;
        }
        const beforeCount = state.editorElements.length;
        snapshotEditorHistory();
        state.editorElements = state.editorElements.concat(created);
        state.selectedElementIds = created.map((element) => element.id);
        state.selectedFieldBatch = [];
        state.inspectorTab = 'batch';
        state.canvasElementTypeFilter = '';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `${beforeCount ? '已追加' : '已生成'}${recipe.label}骨架：${created.length} 个元素，可拖拽微调后保存`, 'ok');
    }

    function renderFieldPaletteModeControls() {
        Array.prototype.forEach.call(document.querySelectorAll('[data-field-mode]'), (button) => {
            button.className = button.getAttribute('data-field-mode') === fieldPaletteMode() ? 'active' : '';
        });
        if ($('fieldDetailsToggle')) {
            $('fieldDetailsToggle').checked = !!state.fieldDetailsVisible;
        }
        if ($('fieldDensitySelect')) {
            $('fieldDensitySelect').value = fieldDensity();
        }
        if ($('fieldInsertModeSelect')) {
            $('fieldInsertModeSelect').value = fieldInsertMode();
        }
    }

    function renderFieldPaletteSummary(visibleCount, totalCount, usedCount) {
        if (!$('fieldPaletteSummary')) return;
        const modeText = fieldPaletteMode() === 'used'
            ? '已使用'
            : (fieldPaletteMode() === 'unused' ? '未使用字段' : (fieldPaletteMode() === 'all' ? '全部' : '常用'));
        const unusedCount = Math.max(0, totalCount - usedCount);
        $('fieldPaletteSummary').textContent = `${modeText} ${visibleCount}/${totalCount} · 已用 ${usedCount} · 未用 ${unusedCount}`;
    }

    function fieldPaletteEmptyMessage(term) {
        if (term) return '未找到字段。请换个关键词继续查找。';
        if (fieldPaletteMode() === 'unused') return '字段都已放入画布。可切换“全部”或“已使用”继续查看。';
        if (fieldPaletteMode() === 'used') return '当前模板还没有使用字段。可切换“常用”添加字段。';
        return '未找到字段。切换“全部”或输入关键词继续查找。';
    }

    function renderFieldPalette() {
        const groups = fieldContractGroups();
        const term = fieldSearchTerm();
        const showFieldList = shouldShowFieldPaletteList(term);
        const usedNames = usedFieldNames();
        const selectedField = primarySelectedElement() ? primarySelectedElement().fieldName : '';
        const bindToSelected = canBindSelectedElementToField();
        const usedCount = Object.keys(usedNames).length;
        const selectedBatch = (state.selectedFieldBatch || []).reduce((map, fieldName) => {
            map[fieldName] = true;
            return map;
        }, {});
        const visibleFieldNames = [];
        let visibleCount = 0;
        $('fieldPalette').hidden = !showFieldList;
        $('fieldPalette').className = 'field-contract-groups field-density-' + fieldDensity();
        $('fieldPalette').innerHTML = Object.keys(groups).map((category) => {
            const visibleItems = groups[category].filter((item) =>
                fieldMatchesSearch(item, term) && fieldMatchesPaletteMode(item, term, usedNames)
            );
            if (!visibleItems.length) return '';
            visibleCount += visibleItems.length;
            const rows = visibleItems.map((item) => {
                visibleFieldNames.push(item.fieldName);
                const source = fieldSourceByName(item.fieldName);
                const sample = source && source.value ? source.value : '暂无样例值';
                const status = source && source.fieldStatus ? source.fieldStatus : (item.required ? 'REQUIRED' : 'OPTIONAL');
                const details = state.fieldDetailsVisible ? `
                    <span class="sample-value">${escapeHtml(sample)}</span>
                    <span class="source-status ${sourceStatusClass(source)}">${escapeHtml(status)}</span>
                ` : '';
                const itemClass = (item.fieldName === selectedField ? 'field-item active compact-field-item' : 'field-item compact-field-item') +
                    (bindToSelected ? ' bind-target' : '');
                const checked = selectedBatch[item.fieldName] ? 'checked' : '';
                const selectedClass = selectedBatch[item.fieldName] ? ' field-batch-selected' : '';
                return `<div class="batchFieldSelection${selectedClass}">
                    <label class="batch-field-check" title="加入批量选择">
                        <input type="checkbox" data-field-select="${escapeHtml(item.fieldName)}" ${checked}>
                    </label>
                    <button class="${itemClass}" data-field="${escapeHtml(item.fieldName)}" data-field-drag="${escapeHtml(item.fieldName)}" draggable="true">
                        <strong>${escapeHtml(item.displayName || item.fieldName)}</strong>
                        <span class="field-meta"><span class="muted">${escapeHtml(item.fieldName)} / ${escapeHtml(item.category)}</span></span>
                        ${details}
                    </button>
                </div>`;
            }).join('');
            return `<details class="field-group" ${shouldOpenFieldGroup(category, visibleItems, term) ? 'open' : ''}>
                <summary>${escapeHtml(category)} / ${visibleItems.length} 项</summary>
                ${rows}
            </details>`;
        }).join('') || `<div class="empty-state">${escapeHtml(fieldPaletteEmptyMessage(term))}</div>`;
        state.currentVisibleFieldNames = showFieldList ? visibleFieldNames : [];
        renderFieldLibraryViewControls(term);
        renderFieldAssistantModeTabs(term);
        renderFieldUsageDigest(term);
        renderFieldLibraryQuickPanel(term);
        renderTemplateStarterRecipes(term);
        renderFieldPaletteModeControls();
        renderFieldPaletteSummary(visibleCount, state.fieldContract.length, usedCount);
        updateFieldQuickActionHint();
        renderFieldPresetPacks();
        renderFieldSmartQueue();
        renderFieldBatchTray();
        Array.prototype.forEach.call(document.querySelectorAll('[data-field-select]'), (checkbox) => {
            checkbox.onchange = () => toggleFieldBatchSelection(checkbox.getAttribute('data-field-select'), checkbox.checked);
            checkbox.onclick = (event) => event.stopPropagation();
        });
        Array.prototype.forEach.call(document.querySelectorAll('.field-item'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyFieldPaletteSelection(button.getAttribute('data-field')));
            button.ondragstart = (event) => beginFieldPaletteDrag(event, button.getAttribute('data-field-drag'));
            button.ondragend = endFieldPaletteDrag;
        });
    }

    function loadTemplateIntoEditor(code) {
        const template = state.templates.find((item) => item.code === code);
        state.editorTemplate = template;
        state.editorElements = normalizeEditorElements(template && template.elements ? template.elements : []);
        state.selectedElementIds = [];
        syncTemplateFormFromEditor(template);
        resetEditorHistory();
        renderTemplates();
        renderTemplateEditor(template);
        renderFieldPalette();
    }

    function selectedEditorElements() {
        return state.editorElements.filter((item) => state.selectedElementIds.indexOf(item.id) >= 0);
    }

    function selectedEditableElements() {
        return selectedEditorElements().filter((item) => !item.locked);
    }

    function primarySelectedElement() {
        const selected = selectedEditorElements();
        return selected.length ? selected[0] : null;
    }

    function copyEditorElements() {
        return state.editorElements.map((item, index) => Object.assign({}, item, {sortOrder: index + 1}));
    }

    function cloneEditorElements(elements) {
        return (elements || []).map((item) => Object.assign({}, item));
    }

    function editorClipboardCount() {
        return (state.editorClipboard || []).length;
    }

    function copySelectedElementStyle() {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = primarySelectedElement();
        if (!element) {
            setStatus('middleStatus', '请先选择一个元素复制样式', 'error');
            return;
        }
        state.styleClipboard = {
            widthMm: Number(element.widthMm || 20),
            heightMm: Number(element.heightMm || 8),
            fontSize: Number(element.fontSize || 10),
            bold: !!element.bold,
            textAlign: normalizeTextAlign(element.textAlign)
        };
        renderSelectionQuickBar();
        setStatus('middleStatus', `已复制 ${elementLabel(element)} 的样式`, 'ok');
    }

    function pasteStyleToSelectedElements() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!state.styleClipboard) {
            setStatus('middleStatus', '还没有复制样式', 'error');
            return;
        }
        const selected = selectedEditableElements();
        if (!selected.length) {
            setStatus('middleStatus', '请选择未锁定元素后粘贴样式', 'error');
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        snapshotEditorHistory();
        selected.forEach((element) => {
            const maxWidth = Math.max(1, pageWidth - Number(element.leftMm || 0));
            const maxHeight = Math.max(1, pageHeight - Number(element.topMm || 0));
            element.widthMm = roundMm(clamp(Number(state.styleClipboard.widthMm || element.widthMm || 20), 1, maxWidth));
            element.heightMm = roundMm(clamp(Number(state.styleClipboard.heightMm || element.heightMm || 8), 1, maxHeight));
            if (elementUsesTextStyle(element)) {
                element.fontSize = Number(state.styleClipboard.fontSize || element.fontSize || 10);
                element.bold = !!state.styleClipboard.bold;
                element.textAlign = normalizeTextAlign(state.styleClipboard.textAlign);
            }
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', `已粘贴样式到 ${selected.length} 个元素`, 'ok');
    }

    function normalizeEditorElements(elements) {
        return (elements || []).map((item, index) =>
            Object.assign({id: item.id || newElementId(), sortOrder: index + 1, bold: false, textAlign: 'left', locked: false}, item, {
                textAlign: normalizeTextAlign(item.textAlign),
                locked: !!item.locked
            })
        );
    }

    function elementsSignature(elements) {
        return JSON.stringify(cloneEditorElements(elements || []).map((item, index) => Object.assign({}, item, {sortOrder: index + 1})));
    }

    function editorHistorySnapshot() {
        const elements = copyEditorElements();
        return {
            elements: cloneEditorElements(elements),
            selectedElementIds: state.selectedElementIds.slice(),
            signature: elementsSignature(elements)
        };
    }

    function snapshotEditorHistory() {
        if (!state.editorTemplate) return;
        const snapshot = editorHistorySnapshot();
        const previous = state.undoStack[state.undoStack.length - 1];
        if (previous && previous.signature === snapshot.signature) return;
        state.undoStack.push(snapshot);
        if (state.undoStack.length > 50) state.undoStack.shift();
        state.redoStack = [];
        renderHistoryControls();
    }

    function restoreEditorHistory(snapshot) {
        if (!snapshot) return;
        state.editorElements = normalizeEditorElements(snapshot.elements || []);
        const existingIds = state.editorElements.reduce((ids, item) => {
            ids[item.id] = true;
            return ids;
        }, {});
        state.selectedElementIds = (snapshot.selectedElementIds || []).filter((id) => existingIds[id]);
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        markEditorDirty();
    }

    function undoEditorChange() {
        if (!state.undoStack.length) return;
        state.redoStack.push(editorHistorySnapshot());
        restoreEditorHistory(state.undoStack.pop());
        renderHistoryControls();
    }

    function redoEditorChange() {
        if (!state.redoStack.length) return;
        state.undoStack.push(editorHistorySnapshot());
        restoreEditorHistory(state.redoStack.pop());
        renderHistoryControls();
    }

    function resetEditorHistory() {
        state.undoStack = [];
        state.redoStack = [];
        state.savedElementsSignature = elementsSignature(state.editorElements);
        markEditorDirty();
    }

    function markEditorDirty() {
        state.editorDirty = !!state.editorTemplate && elementsSignature(state.editorElements) !== state.savedElementsSignature;
        renderHistoryControls();
    }

    function renderHistoryControls() {
        if ($('undoElementBtn')) $('undoElementBtn').disabled = !state.editorTemplate || !state.undoStack.length;
        if ($('redoElementBtn')) $('redoElementBtn').disabled = !state.editorTemplate || !state.redoStack.length;
        if ($('dirtyBadge')) {
            $('dirtyBadge').className = 'dirty-badge' + (state.editorDirty ? ' dirty' : ' clean');
            $('dirtyBadge').textContent = state.editorTemplate ? (state.editorDirty ? '未保存' : '已保存') : '';
        }
        if ($('editorCommitStatus')) {
            if (!state.editorTemplate) {
                $('editorCommitStatus').textContent = '选择 CONFIG_LAYOUT 模板后可编辑并保存元素';
            } else if (state.editorDirty) {
                $('editorCommitStatus').textContent = '版式有未保存修改，保存后预览和打印会使用新配置';
            } else {
                $('editorCommitStatus').textContent = '版式已保存，可继续调整或生成样张预览';
            }
        }
        renderSaveReadinessStrip();
        renderSelectionQuickBar();
    }

    function renderSaveReadinessStrip() {
        const panel = $('saveReadinessStrip');
        if (!panel) return;
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const readiness = !templateReady ? 'none' : (state.editorDirty ? 'dirty' : 'clean');
        panel.setAttribute('data-save-readiness', readiness);
        if ($('saveReadinessStatus')) {
            $('saveReadinessStatus').textContent = !templateReady
                ? '未选择模板'
                : (state.editorDirty ? '有未保存修改' : '版式已保存');
        }
        if ($('saveReadinessDetail')) {
            $('saveReadinessDetail').textContent = !templateReady
                ? '选择 CONFIG_LAYOUT 模板后可保存版式。'
                : (state.editorDirty ? '保存后预览和打印会使用新配置。' : '可以继续调整，或直接生成样张预览。');
        }
        if ($('saveReadinessSaveBtn')) $('saveReadinessSaveBtn').disabled = !templateReady;
        if ($('saveAndPreviewBtn')) $('saveAndPreviewBtn').disabled = !templateReady;
    }

    function renderCanvasMeta(template) {
        if (!$('canvasMeta')) return;
        if (!template) {
            $('canvasMeta').textContent = '未选择模板';
            return;
        }
        const selectedCount = state.selectedElementIds.length;
        const lockedCount = state.editorElements.filter((item) => item.locked).length;
        $('canvasMeta').textContent = `${template.code} · ${template.pageWidthMm || 120}x${template.pageHeightMm || 80}mm · ${state.editorElements.length} 元素 · ${selectedCount} 选中 · ${lockedCount} 锁定`;
    }

    function renderSelectionQuickBar() {
        if (!$('selectionQuickBar')) return;
        const selectedCount = state.selectedElementIds.length;
        const editableCount = selectedEditableElements().length;
        const clipboardCount = editorClipboardCount();
        const hasStyleClipboard = !!state.styleClipboard;
        const totalCount = state.editorElements.length;
        const editableTotalCount = state.editorElements.filter((item) => !item.locked).length;
        const lockedCount = state.editorElements.filter((item) => item.locked).length;
        const unboundCount = state.editorElements.filter((item) =>
            ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(item.type) >= 0 && !item.fieldName
        ).length;
        const visibleLayerCount = state.editorElements.filter((item) =>
            elementVisibleOnCanvas(item) && elementMatchesLayerFilters(item)
        ).length;
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        if ($('selectionQuickSummary')) {
            $('selectionQuickSummary').textContent = templateReady
                ? `${selectedCount} 选中 / ${editableCount} 可编辑 / 元素剪贴板 ${clipboardCount} / 样式 ${hasStyleClipboard ? '已复制' : '未复制'} / 共 ${totalCount} 元素`
                : '选择 CONFIG_LAYOUT 模板后可编辑元素。';
        }
        if ($('selectAllElementsBtn')) $('selectAllElementsBtn').disabled = !templateReady || !totalCount;
        if ($('selectionTypeFilter')) $('selectionTypeFilter').disabled = !templateReady || !totalCount;
        if ($('selectByTypeBtn')) $('selectByTypeBtn').disabled = !templateReady || !totalCount;
        if ($('selectVisibleLayerElementsBtn')) $('selectVisibleLayerElementsBtn').disabled = !templateReady || !visibleLayerCount;
        if ($('selectEditableElementsBtn')) $('selectEditableElementsBtn').disabled = !templateReady || !editableTotalCount;
        if ($('selectLockedElementsBtn')) $('selectLockedElementsBtn').disabled = !templateReady || !lockedCount;
        if ($('selectUnboundElementsBtn')) $('selectUnboundElementsBtn').disabled = !templateReady || !unboundCount;
        if ($('invertElementSelectionBtn')) $('invertElementSelectionBtn').disabled = !templateReady || !totalCount;
        if ($('clearElementSelectionBtn')) $('clearElementSelectionBtn').disabled = !templateReady || !selectedCount;
        if ($('copyElementsBtn')) $('copyElementsBtn').disabled = !templateReady || !editableCount;
        if ($('pasteElementsBtn')) $('pasteElementsBtn').disabled = !templateReady || !clipboardCount;
        if ($('copyStyleBtn')) $('copyStyleBtn').disabled = !templateReady || selectedCount !== 1;
        if ($('pasteStyleBtn')) $('pasteStyleBtn').disabled = !templateReady || !editableCount || !hasStyleClipboard;
        if ($('lockSelectionBtn')) $('lockSelectionBtn').disabled = !templateReady || !selectedCount;
        if ($('unlockSelectionBtn')) $('unlockSelectionBtn').disabled = !templateReady || !selectedCount;
        if ($('matchWidthBtn')) $('matchWidthBtn').disabled = !templateReady || editableCount < 2;
        if ($('matchHeightBtn')) $('matchHeightBtn').disabled = !templateReady || editableCount < 2;
        if ($('matchSizeBtn')) $('matchSizeBtn').disabled = !templateReady || editableCount < 2;
        if ($('templateAuditBtn')) $('templateAuditBtn').disabled = !templateReady;
        if ($('exportElementsBtn')) $('exportElementsBtn').disabled = !templateReady || !totalCount;
        if ($('importElementsBtn')) $('importElementsBtn').disabled = !templateReady;
        if ($('commitSaveAllBtn')) $('commitSaveAllBtn').disabled = !templateReady;
        if ($('saveAllTemplateBtn')) $('saveAllTemplateBtn').disabled = !templateReady;
        renderLayoutAssistantHint();
        renderPreviewControls();
    }

    function renderPreviewControls() {
