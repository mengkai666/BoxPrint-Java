    }

    function looksLikeFieldLabel(element) {
        return !!element && element.type === 'STATIC_TEXT' && /[:：]\s*$/.test(String(element.text || ''));
    }

    function elementsShareLayoutRow(a, b) {
        if (!a || !b) return false;
        return Math.abs(Number(a.topMm || 0) - Number(b.topMm || 0)) <= Math.max(1, Number(a.heightMm || b.heightMm || 1) / 2);
    }

    function fieldLabelElementForValue(valueElement, includeLocked) {
        if (!valueElement || valueElement.type !== 'FIELD_TEXT') return null;
        const valueSortOrder = Number(valueElement.sortOrder || 0);
        const valueLeft = Number(valueElement.leftMm || 0);
        const candidates = state.editorElements.filter((element) => {
            if (!looksLikeFieldLabel(element) || (!includeLocked && element.locked)) return false;
            const labelRight = Number(element.leftMm || 0) + Number(element.widthMm || 0);
            return elementsShareLayoutRow(element, valueElement) && labelRight <= valueLeft + 3;
        });
        return candidates.find((element) => Number(element.sortOrder || 0) === valueSortOrder - 1)
            || candidates.sort((a, b) => {
                const aGap = Math.abs(valueLeft - (Number(a.leftMm || 0) + Number(a.widthMm || 0)));
                const bGap = Math.abs(valueLeft - (Number(b.leftMm || 0) + Number(b.widthMm || 0)));
                return aGap - bGap;
            })[0]
            || null;
    }

    function fieldValueElementForLabel(labelElement) {
        if (!looksLikeFieldLabel(labelElement)) return null;
        const labelSortOrder = Number(labelElement.sortOrder || 0);
        const labelRight = Number(labelElement.leftMm || 0) + Number(labelElement.widthMm || 0);
        const candidates = state.editorElements.filter((element) => {
            if (!element || element.type !== 'FIELD_TEXT' || element.locked) return false;
            return elementsShareLayoutRow(labelElement, element) && Number(element.leftMm || 0) >= labelRight - 3;
        });
        return candidates.find((element) => Number(element.sortOrder || 0) === labelSortOrder + 1)
            || candidates.sort((a, b) => Math.abs(Number(a.leftMm || 0) - labelRight) - Math.abs(Number(b.leftMm || 0) - labelRight))[0]
            || null;
    }

    function fieldValuePairForElement(element) {
        if (!element) return null;
        if (element.type === 'FIELD_TEXT' && !element.locked) {
            const label = fieldLabelElementForValue(element);
            return {value: element, label: label && !label.locked ? label : null};
        }
        if (looksLikeFieldLabel(element)) {
            const value = fieldValueElementForLabel(element);
            if (!value || value.locked) return null;
            return {value: value, label: element.locked ? null : element};
        }
        return null;
    }

    function selectedLayoutTargetPairs(scope) {
        if (!state.editorTemplate || state.editorTemplate.engine !== 'CONFIG_LAYOUT') return [];
        const source = scope === 'all' ? state.editorElements : selectedEditorElements();
        const byValueId = {};
        source.forEach((element) => {
            const pair = fieldValuePairForElement(element);
            if (pair && pair.value && !byValueId[pair.value.id]) {
                byValueId[pair.value.id] = pair;
            }
        });
        return Object.keys(byValueId)
            .map((id) => byValueId[id])
            .sort((a, b) => Number(a.value.sortOrder || 0) - Number(b.value.sortOrder || 0));
    }

    function selectedLayoutTargetElements(scope) {
        return selectedLayoutTargetPairs(scope).map((pair) => pair.value);
    }

    function layoutPresetMetrics(preset, count) {
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const normalized = ['single-column', 'footer-grid'].indexOf(preset) >= 0 ? preset : 'two-column';
        const columns = normalized === 'single-column' ? 1 : (normalized === 'footer-grid' && pageWidth >= 110 ? 3 : (pageWidth >= 96 ? 2 : 1));
        const margin = normalized === 'single-column' ? 5 : 4;
        const gapX = 2;
        const gapY = normalized === 'single-column' ? 1.5 : 1;
        const height = normalized === 'single-column' ? 6 : (normalized === 'footer-grid' ? 5 : 5.5);
        const fontSize = normalized === 'footer-grid' ? 7 : (normalized === 'single-column' ? 9 : 8);
        const textAlign = normalized === 'footer-grid' ? 'center' : 'left';
        const width = roundMm(clamp((pageWidth - margin * 2 - gapX * (columns - 1)) / columns, 18, pageWidth - margin * 2));
        const rows = Math.max(1, Math.ceil(Math.max(1, count || 1) / columns));
        const contentHeight = rows * height + (rows - 1) * gapY;
        const top = normalized === 'footer-grid' ? Math.max(margin, pageHeight - margin - contentHeight) : margin;
        return {
            preset: normalized,
            pageWidth: pageWidth,
            pageHeight: pageHeight,
            columns: columns,
            margin: margin,
            gapX: gapX,
            gapY: gapY,
            rowHeight: height + gapY,
            width: width,
            height: height,
            top: top,
            fontSize: fontSize,
            textAlign: textAlign
        };
    }

    function applyLayoutPresetToElements(elements, preset) {
        const ordered = (elements || []).slice().sort((a, b) => Number(a.sortOrder || 0) - Number(b.sortOrder || 0));
        const metrics = layoutPresetMetrics(preset, ordered.length);
        ordered.forEach((element, index) => {
            const column = index % metrics.columns;
            const row = Math.floor(index / metrics.columns);
            const left = metrics.margin + column * (metrics.width + metrics.gapX);
            const top = metrics.top + row * metrics.rowHeight;
            element.widthMm = roundMm(clamp(metrics.width, 1, metrics.pageWidth - metrics.margin));
            element.heightMm = roundMm(clamp(metrics.height, 1, metrics.pageHeight - metrics.margin));
            element.leftMm = roundMm(clamp(left, 0, Math.max(0, metrics.pageWidth - Number(element.widthMm || 1))));
            element.topMm = roundMm(clamp(top, 0, Math.max(0, metrics.pageHeight - Number(element.heightMm || 1))));
            element.fontSize = metrics.fontSize;
            element.textAlign = metrics.textAlign;
        });
        return ordered;
    }

    function applyLayoutPresetToFieldPairs(pairs, preset) {
        const ordered = (pairs || []).slice().sort((a, b) => Number(a.value.sortOrder || 0) - Number(b.value.sortOrder || 0));
        const metrics = layoutPresetMetrics(preset, ordered.length);
        return ordered.reduce((arranged, pair, index) => {
            const column = index % metrics.columns;
            const row = Math.floor(index / metrics.columns);
            const left = roundMm(metrics.margin + column * (metrics.width + metrics.gapX));
            const top = roundMm(metrics.top + row * metrics.rowHeight);
            const hasLabel = !!pair.label;
            const labelWidth = hasLabel ? roundMm(clamp(Math.min(24, Math.max(13, metrics.width * 0.38)), 10, metrics.width - 14)) : 0;
            const labelGap = hasLabel ? 1.5 : 0;
            const valueWidth = roundMm(clamp(metrics.width - labelWidth - labelGap, 12, metrics.width));
            if (hasLabel) {
                pair.label.leftMm = roundMm(clamp(left, 0, Math.max(0, metrics.pageWidth - labelWidth)));
                pair.label.topMm = roundMm(clamp(top, 0, Math.max(0, metrics.pageHeight - metrics.height)));
                pair.label.widthMm = labelWidth;
                pair.label.heightMm = roundMm(clamp(metrics.height, 1, metrics.pageHeight - metrics.margin));
                pair.label.fontSize = metrics.fontSize;
                pair.label.textAlign = 'right';
                arranged.push(pair.label);
            }
            pair.value.leftMm = roundMm(clamp(left + labelWidth + labelGap, 0, Math.max(0, metrics.pageWidth - valueWidth)));
            pair.value.topMm = roundMm(clamp(top, 0, Math.max(0, metrics.pageHeight - metrics.height)));
            pair.value.widthMm = valueWidth;
            pair.value.heightMm = roundMm(clamp(metrics.height, 1, metrics.pageHeight - metrics.margin));
            pair.value.fontSize = metrics.fontSize;
            pair.value.textAlign = hasLabel ? 'left' : metrics.textAlign;
            arranged.push(pair.value);
            return arranged;
        }, []);
    }

    function renderLayoutAssistantHint() {
        const templateReady = !!state.editorTemplate && state.editorTemplate.engine === 'CONFIG_LAYOUT';
        const selectedCount = selectedLayoutTargetPairs('selected').length;
        const allCount = selectedLayoutTargetPairs('all').length;
        if ($('tidySelectedFieldsBtn')) $('tidySelectedFieldsBtn').disabled = !templateReady || !selectedCount;
        if ($('tidyAllFieldsBtn')) $('tidyAllFieldsBtn').disabled = !templateReady || !allCount;
        if ($('layoutPresetSelect')) $('layoutPresetSelect').disabled = !templateReady;
        if (!$('layoutAssistantHint')) return;
        if (!templateReady) {
            $('layoutAssistantHint').textContent = '选择 CONFIG_LAYOUT 模板后可一键整理字段版式。';
        } else if (selectedCount) {
            $('layoutAssistantHint').textContent = `可整理 ${selectedCount} 组选中字段，或整理全部 ${allCount} 组字段。`;
        } else {
            $('layoutAssistantHint').textContent = allCount ? `未选字段时可直接整理全部 ${allCount} 组字段。` : '画布中暂无可整理的字段文本。';
        }
    }

    function applyFieldLayoutPreset(scope) {
        if (!requireEditorTemplate('middleStatus')) return;
        const pairs = selectedLayoutTargetPairs(scope);
        if (!pairs.length) {
            setStatus('middleStatus', scope === 'all' ? '当前模板没有可整理的未锁定字段' : '请选择未锁定的字段文本元素', 'error');
            return;
        }
        snapshotEditorHistory();
        const arranged = applyLayoutPresetToFieldPairs(pairs, currentLayoutPreset());
        state.selectedElementIds = arranged.map((element) => element.id);
        state.inspectorTab = arranged.length > 1 ? 'batch' : 'layout';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已按版式整理 ${pairs.length} 组字段 / ${arranged.length} 个元素，请保存后预览`, 'ok');
    }

    function maxElementSortOrder() {
        return state.editorElements.reduce((max, element) => Math.max(max, Number(element.sortOrder || 0)), 0);
    }

    function createFieldLabelValueElements(field, leftMm, topMm, widthMm, heightMm, sortOrder) {
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const totalWidth = roundMm(clamp(widthMm || 58, 36, Math.max(36, pageWidth - Number(leftMm || 0))));
        const gap = 1.5;
        const labelWidth = roundMm(clamp(Math.min(24, Math.max(15, totalWidth * 0.38)), 12, totalWidth - 18));
        const valueWidth = roundMm(Math.max(18, totalWidth - labelWidth - gap));
        const safeLeft = roundMm(clamp(leftMm || 0, 0, Math.max(0, pageWidth - totalWidth)));
        const safeTop = roundMm(clamp(topMm || 0, 0, Math.max(0, pageHeight - (heightMm || 6))));
        const baseSortOrder = Number(sortOrder || (maxElementSortOrder() + 1));
        const labelText = (field.displayName || fieldDisplayName(field.fieldName) || field.fieldName || '字段') + '：';
        return [
            {
                id: newElementId(),
                type: 'STATIC_TEXT',
                fieldName: '',
                text: labelText,
                leftMm: safeLeft,
                topMm: safeTop,
                widthMm: labelWidth,
                heightMm: heightMm || 5.5,
                fontSize: 8,
                bold: !!field.required,
                textAlign: 'right',
                locked: false,
                sortOrder: baseSortOrder
            },
            {
                id: newElementId(),
                type: 'FIELD_TEXT',
                fieldName: field.fieldName,
                text: '',
                leftMm: roundMm(clamp(safeLeft + labelWidth + gap, 0, Math.max(0, pageWidth - valueWidth))),
                topMm: safeTop,
                widthMm: valueWidth,
                heightMm: heightMm || 5.5,
                fontSize: 8,
                bold: !!field.required,
                textAlign: 'left',
                locked: false,
                sortOrder: baseSortOrder + 1
            }
        ];
    }

    function createFieldElementAtGridSlot(field, index, sortOrder) {
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const columns = pageWidth >= 100 ? 2 : 1;
        const gap = 2;
        const margin = 4;
        const rowHeight = 6;
        const height = 5.5;
        const colWidth = (pageWidth - margin * 2 - gap * (columns - 1)) / columns;
        const width = roundMm(clamp(Math.min(52, colWidth), 18, Math.max(18, pageWidth - margin * 2)));
        const rowCount = Math.max(1, Math.floor((pageHeight - margin * 2 - height) / rowHeight) + 1);
        const startRow = Math.floor(state.editorElements.length / columns) % rowCount;
        const row = (startRow + Math.floor(index / columns)) % rowCount;
        const col = index % columns;
        const maxLeft = Math.max(0, pageWidth - width);
        const maxTop = Math.max(0, pageHeight - height);
        return {
            id: newElementId(),
            type: 'FIELD_TEXT',
            fieldName: field.fieldName,
            text: '',
            leftMm: roundMm(clamp(margin + col * (colWidth + gap), 0, maxLeft)),
            topMm: roundMm(clamp(margin + row * rowHeight, 0, maxTop)),
            widthMm: width,
            heightMm: height,
            fontSize: 8,
            bold: !!field.required,
            textAlign: 'left',
            locked: false,
            sortOrder: sortOrder || (maxElementSortOrder() + index + 1)
        };
    }

    function createFieldElementsAtGridSlot(field, index, sortOrder) {
        const base = createFieldElementAtGridSlot(field, index, sortOrder);
        if (fieldInsertMode() !== 'label-value') return [base];
        return createFieldLabelValueElements(field, base.leftMm, base.topMm, Math.max(52, Number(base.widthMm || 52)), base.heightMm, sortOrder || base.sortOrder);
    }

    function createRequiredFieldElement(field, index) {
        return createFieldElementAtGridSlot(field, index);
    }

    function addSelectedFieldsToCanvas() {
        if (!requireEditorTemplate('middleStatus')) return;
        const usedNames = usedFieldNames();
        const fields = selectedFieldBatchItems().filter((field) => !usedNames[field.fieldName]);
        if (!fields.length) {
            setStatus('middleStatus', '选中的字段已经在模板中，或还没有选择字段', 'error');
            return;
        }
        snapshotEditorHistory();
        let nextSortOrder = maxElementSortOrder() + 1;
        const elements = fields.reduce((created, field, index) => {
            const fieldElements = createFieldElementsAtGridSlot(field, index, nextSortOrder);
            nextSortOrder += fieldElements.length;
            return created.concat(fieldElements);
        }, []);
        state.editorElements = state.editorElements.concat(elements);
        state.selectedElementIds = elements.map((element) => element.id);
        state.selectedFieldBatch = [];
        state.inspectorTab = elements.length > 1 ? 'batch' : 'binding';
        if (fieldInsertMode() === 'label-value') state.canvasElementTypeFilter = '';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已加入 ${fields.length} 个字段 / ${elements.length} 个元素，拖拽微调后保存`, 'ok');
    }

    function addMissingRequiredFields() {
        if (!requireEditorTemplate('middleStatus')) return;
        const missingFields = missingRequiredFieldContracts();
        if (!missingFields.length) {
            setStatus('middleStatus', '没有缺失的必填字段', 'ok');
            return;
        }
        snapshotEditorHistory();
        const elements = missingFields.map(createRequiredFieldElement);
        state.editorElements = state.editorElements.concat(elements);
        state.selectedElementIds = elements.map((element) => element.id);
        state.inspectorTab = 'binding';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已补齐 ${elements.length} 个必填字段，请拖拽调整位置后保存`, 'ok');
    }

    function addTemplateElement(type, fieldName, overrides) {
        if (!requireEditorTemplate('middleStatus')) return;
        snapshotEditorHistory();
        const element = {
            id: newElementId(),
            type: type,
            fieldName: fieldName || defaultFieldNameForType(type),
            text: type === 'STATIC_TEXT' ? '固定文本' : '',
            leftMm: 6,
            topMm: 6 + state.editorElements.length * 4,
            widthMm: type === 'QRCODE' ? 20 : 50,
            heightMm: type === 'QRCODE' ? 20 : 8,
            fontSize: 10,
            bold: false,
            textAlign: 'left',
            locked: false,
            sortOrder: state.editorElements.length + 1
        };
        if (type === 'BARCODE') {
            element.widthMm = 65;
            element.heightMm = 16;
        }
        if (type === 'LOGO') {
            element.widthMm = 28;
            element.heightMm = 14;
        }
        if (type === 'LINE') {
            element.widthMm = Number(state.editorTemplate.pageWidthMm || 120) - 12;
            element.heightMm = 1;
        }
        if (type === 'RECTANGLE') {
            element.leftMm = 4;
            element.topMm = 4;
            element.widthMm = Number(state.editorTemplate.pageWidthMm || 120) - 8;
            element.heightMm = Number(state.editorTemplate.pageHeightMm || 80) - 8;
        }
        Object.assign(element, overrides || {});
        state.editorElements.push(element);
        state.selectedElementIds = [element.id];
        revealElementTypeOnCanvas(element.type);
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
    }

    function selectEditorElement(id, append) {
        const selectedElement = state.editorElements.find((element) => element.id === id);
        if (selectedElement) revealElementTypeOnCanvas(selectedElement.type);
        if (append) {
            if (state.selectedElementIds.indexOf(id) >= 0) {
                state.selectedElementIds = state.selectedElementIds.filter((item) => item !== id);
            } else {
                state.selectedElementIds.push(id);
            }
        } else {
            state.selectedElementIds = [id];
        }
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
    }

    function toggleSelectedElementLock(forceValue) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        const selected = selectedEditorElements();
        const nextLocked = typeof forceValue === 'boolean' ? forceValue : !selected.every((element) => element.locked);
        snapshotEditorHistory();
        selected.forEach((element) => {
            element.locked = nextLocked;
        });
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', nextLocked ? '已锁定选中元素' : '已解锁选中元素', 'ok');
    }

    function activeElementInside(id) {
        const root = $(id);
        return !!(root && document.activeElement && root.contains(document.activeElement));
    }

    function applyElementFieldValue(element, field, value) {
        if (!element) return;
        if (['leftMm', 'topMm', 'widthMm', 'heightMm'].indexOf(field) >= 0) {
            const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
            const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
            const numeric = roundMm(value);
            if (field === 'leftMm') element.leftMm = roundMm(clamp(numeric, 0, pageWidth - Number(element.widthMm || 1)));
            if (field === 'topMm') element.topMm = roundMm(clamp(numeric, 0, pageHeight - Number(element.heightMm || 1)));
            if (field === 'widthMm') element.widthMm = roundMm(clamp(numeric, 1, pageWidth - Number(element.leftMm || 0)));
            if (field === 'heightMm') element.heightMm = roundMm(clamp(numeric, 1, pageHeight - Number(element.topMm || 0)));
        } else if (field === 'fontSize') {
            element.fontSize = Math.max(6, parseInt(value, 10) || 10);
        } else if (field === 'bold') {
            element.bold = !!value;
        } else if (field === 'textAlign') {
            element.textAlign = normalizeTextAlign(value);
        } else if (field === 'type') {
            element.type = value;
            ensureFieldBindingForType(element, value);
        } else {
            element[field] = value;
        }
    }

    function refreshSelectedElementPreview(element) {
        if (!element) return;
        const nodes = document.querySelectorAll('.template-element');
        let node = null;
        Array.prototype.some.call(nodes, (candidate) => {
            if (candidate.getAttribute('data-id') === element.id) {
                node = candidate;
                return true;
            }
            return false;
        });
        if (!node) return;
        const selected = state.selectedElementIds.indexOf(element.id) >= 0;
        const baseClass = element.locked ? 'template-element locked' : 'template-element';
        node.className = `${baseClass} ${editorElementClass(element)} ${selected ? 'selected' : ''}`;
        node.setAttribute('style', styleElementNode(element));
        const label = node.querySelector('.element-label');
        if (label) label.innerHTML = editorElementText(element);
    }

    function syncCompactInspectorSummary(element) {
        const summary = $('compactInspectorSummary');
        if (!summary || activeElementInside('compactInspectorSummary')) return;
        summary.outerHTML = renderCompactInspectorSummary(element);
    }

    function updateSelectedElementFieldLive(field, value) {
        const element = primarySelectedElement();
        if (!element) return;
        if (element.locked) {
            setStatus('middleStatus', '元素已锁定，先解锁再修改属性', 'error');
            renderElementInspector();
            return;
        }
        snapshotEditorHistory();
        applyElementFieldValue(element, field, value);
        markEditorDirty();
        refreshSelectedElementPreview(element);
        syncCompactInspectorSummary(element);
        renderLayerList();
        renderCanvasMeta(state.editorTemplate);
        renderTemplateBasicsSummary();
        renderPreviewControls();
        if (!activeElementInside('canvasQuickInspector')) {
            renderCanvasQuickInspector();
        }
        if (!activeElementInside('modificationActionDock')) {
            renderModificationActionDock();
        }
        if (field === 'fieldName' || field === 'type') {
            renderFieldPalette();
        }
    }

    function updateSelectedElement() {
        const element = primarySelectedElement();
        if (!element) return;
        if (element.locked) {
            setStatus('middleStatus', '元素已锁定，先解锁再修改属性', 'error');
            renderElementInspector();
            return;
        }
        snapshotEditorHistory();
        const nextType = $('elementType').value;
        element.type = nextType;
        element.fieldName = $('fieldName').value;
        ensureFieldBindingForType(element, nextType);
        element.leftMm = roundMm($('leftMm').value);
        element.topMm = roundMm($('topMm').value);
        element.widthMm = roundMm($('widthMm').value);
        element.heightMm = roundMm($('heightMm').value);
        element.fontSize = Number($('fontSize').value || 10);
        element.textAlign = normalizeTextAlign($('textAlign').value);
        element.bold = $('elementBold') ? $('elementBold').checked : !!element.bold;
        element.text = $('elementText').value;
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
    }

    function updateSelectedElementField(field, value) {
        const element = primarySelectedElement();
        if (!element) return;
        if (element.locked) {
            setStatus('middleStatus', '元素已锁定，先解锁再修改属性', 'error');
            renderElementInspector();
            return;
        }
        snapshotEditorHistory();
        applyElementFieldValue(element, field, value);
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        if (field === 'fieldName' || field === 'type') {
            renderFieldPalette();
        }
    }

    function optionalNumberInput(id) {
        if (!$(id)) return null;
        const value = String($(id).value || '').trim();
        if (!value) return null;
        const numeric = Number(value);
        return isFinite(numeric) ? numeric : null;
    }

    function applyBatchElementChanges() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再批量修改')) return;
        const widthMm = optionalNumberInput('multiWidthMm');
        const heightMm = optionalNumberInput('multiHeightMm');
        const fontSize = optionalNumberInput('multiFontSize');
        const textAlign = $('multiTextAlign') ? $('multiTextAlign').value : '';
        const boldState = $('multiBoldState') ? $('multiBoldState').value : '';
        if (widthMm == null && heightMm == null && fontSize == null && !textAlign && !boldState) {
            setStatus('middleStatus', '请填写需要批量修改的属性', 'error');
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        snapshotEditorHistory();
        selectedEditableElements().forEach((element) => {
            if (widthMm != null) {
                element.widthMm = roundMm(clamp(widthMm, 1, pageWidth - Number(element.leftMm || 0)));
            }
            if (heightMm != null) {
                element.heightMm = roundMm(clamp(heightMm, 1, pageHeight - Number(element.topMm || 0)));
            }
            if (elementUsesTextStyle(element)) {
                if (fontSize != null) element.fontSize = Math.max(6, parseInt(fontSize, 10) || 10);
                if (textAlign) element.textAlign = normalizeTextAlign(textAlign);
                if (boldState) element.bold = boldState === 'bold';
            }
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已应用批量属性', 'ok');
    }

    function primaryEditableSelectedElement() {
        const selected = selectedEditableElements();
        return selected.length ? selected[0] : null;
    }

    function matchSelectedElementSize(mode) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 2, '请选择至少两个元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 2, '请选择至少两个未锁定元素')) return;
        const anchor = primaryEditableSelectedElement();
        const selected = selectedEditableElements();
        if (!anchor || selected.length < 2) return;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const targetWidth = Number(anchor.widthMm || 1);
        const targetHeight = Number(anchor.heightMm || 1);
        const changes = selected.slice(1).map((element) => {
            let widthMm = element.widthMm;
            let heightMm = element.heightMm;
            if (mode === 'width' || mode === 'size') {
                widthMm = roundMm(clamp(targetWidth, 1, pageWidth - Number(element.leftMm || 0)));
            }
            if (mode === 'height' || mode === 'size') {
                heightMm = roundMm(clamp(targetHeight, 1, pageHeight - Number(element.topMm || 0)));
            }
            return {element: element, widthMm: widthMm, heightMm: heightMm};
        }).filter((change) => change.element.widthMm !== change.widthMm || change.element.heightMm !== change.heightMm);
        if (!changes.length) return;
        snapshotEditorHistory();
        changes.forEach((change) => {
            change.element.widthMm = change.widthMm;
            change.element.heightMm = change.heightMm;
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', mode === 'width' ? '已统一宽度' : (mode === 'height' ? '已统一高度' : '已统一宽高'), 'ok');
    }

    function requireSelectedElements(statusId, minCount, message) {
        if (state.selectedElementIds.length >= minCount) return true;
        setStatus(statusId, message, 'error');
        return false;
    }

    function requireSelectedEditableElements(statusId, minCount, message) {
        if (selectedEditableElements().length >= minCount) return true;
        setStatus(statusId, message || '选中元素已锁定，先解锁再修改', 'error');
        return false;
    }

    function selectAllEditorElements() {
        if (!requireEditorTemplate('middleStatus')) return;
        const elements = visibleCanvasElements();
        state.selectedElementIds = elements.map((element) => element.id);
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已选择 ${state.selectedElementIds.length} 个元素`, 'ok');
    }

    function selectEditorElementsByType(type) {
        if (!requireEditorTemplate('middleStatus')) return;
        const selectedType = type || ($('selectionTypeFilter') ? $('selectionTypeFilter').value : '');
        if (!selectedType) {
            setStatus('middleStatus', '请选择需要批量选中的元素类型', 'error');
            return;
        }
        state.canvasElementTypeFilter = selectedType;
        const ids = state.editorElements
            .filter((element) => element.type === selectedType)
            .map((element) => element.id);
        if (!ids.length) {
            setStatus('middleStatus', '当前模板没有该类型元素', 'error');
            return;
        }
        state.selectedElementIds = ids;
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已选择 ${ids.length} 个 ${selectedType} 元素`, 'ok');
    }

    function selectEditorElementsByPredicate(predicate, emptyMessage, okMessage) {
        if (!requireEditorTemplate('middleStatus')) return;
        const ids = state.editorElements
            .filter((element) => elementVisibleOnCanvas(element) && predicate(element))
            .map((element) => element.id);
        if (!ids.length) {
            setStatus('middleStatus', emptyMessage || '没有匹配的元素', 'error');
            return;
        }
        state.selectedElementIds = ids;
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        const text = typeof okMessage === 'function' ? okMessage(ids.length) : okMessage;
        setStatus('middleStatus', text || `已选择 ${ids.length} 个元素`, 'ok');
    }

    function selectVisibleLayerElements() {
        return selectEditorElementsByPredicate(
            (element) => elementMatchesLayerFilters(element),
            '当前图层筛选没有可选元素',
            (count) => `已选择 ${count} 个图层筛选结果`
        );
    }

    function selectEditableEditorElements() {
        return selectEditorElementsByPredicate(
            (element) => !element.locked,
            '当前画布没有可编辑元素',
            (count) => `已选择 ${count} 个可编辑元素`
        );
    }

    function selectLockedEditorElements() {
        return selectEditorElementsByPredicate(
            (element) => !!element.locked,
            '当前画布没有锁定元素',
            (count) => `已选择 ${count} 个锁定元素`
        );
    }

    function selectUnboundEditorElements() {
        return selectEditorElementsByPredicate(
            (element) => ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0 && !element.fieldName,
            '当前画布没有未绑定的字段类元素',
            (count) => `已选择 ${count} 个未绑定元素`
        );
    }

    function invertEditorSelection() {
        if (!requireEditorTemplate('middleStatus')) return;
        const selectedLookup = state.selectedElementIds.reduce((lookup, id) => {
            lookup[id] = true;
            return lookup;
        }, {});
        state.selectedElementIds = visibleCanvasElements()
            .filter((element) => !selectedLookup[element.id])
            .map((element) => element.id);
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已反选 ${state.selectedElementIds.length} 个可见元素`, 'ok');
    }

    function clearEditorSelection() {
        if (!requireEditorTemplate('middleStatus')) return;
        state.selectedElementIds = [];
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', '已清空元素选择', 'ok');
    }

    function copySelectedElementsToClipboard() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再复制')) return;
        state.editorClipboard = cloneEditorElements(selectedEditableElements()).map((element) => {
            const copy = Object.assign({}, element);
            copy.locked = false;
            return copy;
        });
        setStatus('middleStatus', `已复制 ${editorClipboardCount()} 个元素`, 'ok');
    }

    function fitElementInsidePage(element) {
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        element.widthMm = roundMm(clamp(Number(element.widthMm || 1), 1, pageWidth));
        element.heightMm = roundMm(clamp(Number(element.heightMm || 1), 1, pageHeight));
        element.leftMm = roundMm(clamp(Number(element.leftMm || 0), 0, Math.max(0, pageWidth - Number(element.widthMm || 1))));
        element.topMm = roundMm(clamp(Number(element.topMm || 0), 0, Math.max(0, pageHeight - Number(element.heightMm || 1))));
        return element;
    }

    function fitSelectedElementsInsidePage() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        const selected = selectedEditableElements();
        if (!selected.length) {
            setStatus('middleStatus', '选中元素已锁定，先解锁再校正位置', 'error');
            return;
        }
        snapshotEditorHistory();
        let changed = false;
        selected.forEach((element) => {
            const before = [element.leftMm, element.topMm, element.widthMm, element.heightMm].join('|');
            fitElementInsidePage(element);
            changed = changed || before !== [element.leftMm, element.topMm, element.widthMm, element.heightMm].join('|');
        });
        if (!changed) {
            state.undoStack.pop();
            setStatus('middleStatus', '选中元素已在页面范围内', 'ok');
            renderTemplateEditor(state.editorTemplate);
            return;
        }
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已将选中元素放回页面范围内', 'ok');
    }

    function clampPastedElementToPage(element) {
        return fitElementInsidePage(element);
    }

    function pasteClipboardElements() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!editorClipboardCount()) {
            setStatus('middleStatus', '剪贴板暂无元素', 'error');
            return;
        }
        snapshotEditorHistory();
        const pasted = state.editorClipboard.map((element, index) => clampPastedElementToPage(Object.assign({}, element, {
            id: newElementId(),
            sortOrder: state.editorElements.length + index + 1,
            leftMm: roundMm(Number(element.leftMm || 0) + 2),
            topMm: roundMm(Number(element.topMm || 0) + 2),
            locked: false
        })));
        state.editorElements = state.editorElements.concat(pasted);
        state.selectedElementIds = pasted.map((element) => element.id);
        state.editorClipboard = cloneEditorElements(pasted);
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已粘贴 ${pasted.length} 个元素`, 'ok');
    }

    function deleteSelectedElement() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再删除')) return;
        snapshotEditorHistory();
        const editableIds = selectedEditableElements().reduce((ids, item) => {
            ids[item.id] = true;
            return ids;
        }, {});
        state.editorElements = state.editorElements.filter((item) => !editableIds[item.id]);
        state.selectedElementIds = state.selectedElementIds.filter((id) => !editableIds[id]);
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
    }

    function duplicateSelectedElements() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再复制')) return;
        snapshotEditorHistory();
        const selected = selectedEditableElements();
        const copies = selected.map((element, index) => Object.assign({}, element, {
            id: newElementId(),
            sortOrder: state.editorElements.length + index + 1,
            leftMm: roundMm(element.leftMm + 2),
            topMm: roundMm(element.topMm + 2),
            locked: false
        }));
        state.editorElements = state.editorElements.concat(copies);
        state.selectedElementIds = copies.map((item) => item.id);
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function alignSelectedElements(mode) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 2, '请选择至少两个元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 2, '请选择至少两个未锁定元素')) return;
        snapshotEditorHistory();
        const selected = selectedEditableElements();
        const anchor = selected[0];
        selected.slice(1).forEach((element) => {
            if (mode === 'left') element.leftMm = anchor.leftMm;
            if (mode === 'right') element.leftMm = roundMm(anchor.leftMm + anchor.widthMm - element.widthMm);
            if (mode === 'top') element.topMm = anchor.topMm;
            if (mode === 'bottom') element.topMm = roundMm(anchor.topMm + anchor.heightMm - element.heightMm);
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function centerSelectedElement(axis) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再居中')) return;
        const element = selectedEditableElements()[0];
        if (!element) return;
        snapshotEditorHistory();
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        if (axis === 'horizontal') {
            element.leftMm = roundMm(clamp((pageWidth - Number(element.widthMm || 1)) / 2, 0, pageWidth - Number(element.widthMm || 1)));
        }
        if (axis === 'vertical') {
            element.topMm = roundMm(clamp((pageHeight - Number(element.heightMm || 1)) / 2, 0, pageHeight - Number(element.heightMm || 1)));
        }
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function centerSelectedElementsOnPage() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再居中')) return;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        snapshotEditorHistory();
        selectedEditableElements().forEach((element) => {
            const width = Number(element.widthMm || 1);
            const height = Number(element.heightMm || 1);
            element.leftMm = roundMm(clamp((pageWidth - width) / 2, 0, Math.max(0, pageWidth - width)));
            element.topMm = roundMm(clamp((pageHeight - height) / 2, 0, Math.max(0, pageHeight - height)));
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已将选中元素居中到页面', 'ok');
    }

    function alignSelectedToPage(mode) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再贴齐')) return;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        snapshotEditorHistory();
        selectedEditableElements().forEach((element) => {
            const width = Number(element.widthMm || 1);
            const height = Number(element.heightMm || 1);
            const maxLeft = Math.max(0, pageWidth - width);
            const maxTop = Math.max(0, pageHeight - height);
            if (mode === 'left') element.leftMm = 0;
            if (mode === 'center') element.leftMm = roundMm(clamp((pageWidth - width) / 2, 0, maxLeft));
            if (mode === 'right') element.leftMm = roundMm(clamp(pageWidth - width, 0, maxLeft));
            if (mode === 'top') element.topMm = 0;
            if (mode === 'middle') element.topMm = roundMm(clamp((pageHeight - height) / 2, 0, maxTop));
            if (mode === 'bottom') element.topMm = roundMm(clamp(pageHeight - height, 0, maxTop));
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已按页面贴齐选中元素', 'ok');
    }

    function distributeSelectedElements(axis) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 3, '请选择至少三个元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 3, '请选择至少三个未锁定元素')) return;
        const selected = selectedEditableElements().slice().sort((a, b) =>
            axis === 'horizontal'
                ? Number(a.leftMm || 0) - Number(b.leftMm || 0)
                : Number(a.topMm || 0) - Number(b.topMm || 0)
        );
        const sizeField = axis === 'horizontal' ? 'widthMm' : 'heightMm';
        const positionField = axis === 'horizontal' ? 'leftMm' : 'topMm';
        const first = selected[0];
        const last = selected[selected.length - 1];
        const start = Number(first[positionField] || 0);
        const end = Number(last[positionField] || 0) + Number(last[sizeField] || 1);
        const totalSize = selected.reduce((sum, element) => sum + Number(element[sizeField] || 1), 0);
        const gap = (end - start - totalSize) / (selected.length - 1);
        snapshotEditorHistory();
        let cursor = start;
        selected.forEach((element, index) => {
            if (index > 0 && index < selected.length - 1) {
                element[positionField] = roundMm(cursor);
            }
            cursor += Number(element[sizeField] || 1) + gap;
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function moveSelectedLayer(mode) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        if (!requireSelectedEditableElements('middleStatus', 1, '选中元素已锁定，先解锁再调整层级')) return;
        snapshotEditorHistory();
        const selectedIds = selectedEditableElements().map((item) => item.id);
        const sorted = state.editorElements.slice().sort((a, b) => Number(a.sortOrder || 0) - Number(b.sortOrder || 0));
        selectedIds.forEach((id) => {
            const index = sorted.findIndex((item) => item.id === id);
            if (index < 0) return;
            if (mode === 'up' && index < sorted.length - 1) {
                const next = sorted[index + 1];
                sorted[index + 1] = sorted[index];
                sorted[index] = next;
            }
            if (mode === 'down' && index > 0) {
                const prev = sorted[index - 1];
                sorted[index - 1] = sorted[index];
                sorted[index] = prev;
            }
            if (mode === 'top') {
                const item = sorted.splice(index, 1)[0];
                sorted.push(item);
            }
            if (mode === 'bottom') {
                const item = sorted.splice(index, 1)[0];
                sorted.unshift(item);
            }
        });
        state.editorElements = sorted.map((item, index) => Object.assign({}, item, {sortOrder: index + 1}));
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function isFormEditingTarget(target) {
        const tag = target && target.tagName ? target.tagName.toLowerCase() : '';
        return tag === 'input' || tag === 'textarea' || tag === 'select' || !!(target && target.isContentEditable);
    }

    function nudgeSelectedElements(deltaLeft, deltaTop) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!state.selectedElementIds.length) return;
        const selected = selectedEditableElements();
        if (!selected.length) return;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const updates = selected.map((element) => ({
            element: element,
            leftMm: roundMm(clamp(Number(element.leftMm || 0) + deltaLeft, 0, pageWidth - Number(element.widthMm || 1))),
            topMm: roundMm(clamp(Number(element.topMm || 0) + deltaTop, 0, pageHeight - Number(element.heightMm || 1)))
        })).filter((update) => update.element.leftMm !== update.leftMm || update.element.topMm !== update.topMm);
        if (!updates.length) return;
        snapshotEditorHistory();
        updates.forEach((update) => {
            update.element.leftMm = update.leftMm;
            update.element.topMm = update.topMm;
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function resizeSelectedElementsBy(deltaWidth, deltaHeight) {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        const selected = selectedEditableElements();
        if (!selected.length) {
            setStatus('middleStatus', '选中元素已锁定，先解锁再调整尺寸', 'error');
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const updates = selected.map((element) => {
            const maxWidth = Math.max(1, pageWidth - Number(element.leftMm || 0));
            const maxHeight = Math.max(1, pageHeight - Number(element.topMm || 0));
            const widthMm = roundMm(clamp(Number(element.widthMm || 1) + deltaWidth, 1, maxWidth));
            const heightMm = roundMm(clamp(Number(element.heightMm || 1) + deltaHeight, 1, maxHeight));
            return {
                element: element,
                widthMm: widthMm,
                heightMm: heightMm
            };
        }).filter((update) => update.element.widthMm !== update.widthMm || update.element.heightMm !== update.heightMm);
        if (!updates.length) return;
        snapshotEditorHistory();
        updates.forEach((update) => {
            update.element.widthMm = update.widthMm;
            update.element.heightMm = update.heightMm;
        });
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
    }

    function nudgeSelectedElementFromInspector(direction) {
        const step = currentSnapStepMm();
        const offsets = {
            up: [0, -step],
            down: [0, step],
            left: [-step, 0],
            right: [step, 0]
        };
        const offset = offsets[direction];
        if (!offset) return;
        nudgeSelectedElements(offset[0], offset[1]);
    }

    function moveSelectedElementsByKeyboard(event) {
        const key = String(event.key || '').toLowerCase();
        const commandKey = event.ctrlKey || event.metaKey;
        if (commandKey && key === 's') {
            event.preventDefault();
            runAction('middleStatus', saveEditorFromShortcut);
            return;
        }
        if (isFormEditingTarget(event.target)) return;
        if (commandKey && key === 'z') {
            event.preventDefault();
            if (event.shiftKey) {
                redoEditorChange();
            } else {
                undoEditorChange();
            }
            return;
        }
        if (commandKey && key === 'y') {
            event.preventDefault();
            redoEditorChange();
            return;
        }
        if (commandKey && key === 'a') {
            event.preventDefault();
            selectAllEditorElements();
            return;
        }
        if (commandKey && event.shiftKey && key === 'c') {
            event.preventDefault();
            copySelectedElementStyle();
            return;
        }
        if (commandKey && event.shiftKey && key === 'v') {
            event.preventDefault();
            pasteStyleToSelectedElements();
            return;
        }
        if (commandKey && key === 'c') {
            event.preventDefault();
            copySelectedElementsToClipboard();
            return;
        }
        if (commandKey && key === 'v') {
            event.preventDefault();
            pasteClipboardElements();
            return;
        }
        if ((key === 'delete' || key === 'backspace') && state.selectedElementIds.length) {
            event.preventDefault();
            deleteSelectedElement();
            return;
        }
        const arrows = {
            arrowleft: [-1, 0],
            arrowright: [1, 0],
            arrowup: [0, -1],
            arrowdown: [0, 1]
        };
        if (!arrows[key] || !state.selectedElementIds.length) return;
        event.preventDefault();
        const step = event.shiftKey ? 5 : currentSnapStepMm();
        nudgeSelectedElements(arrows[key][0] * step, arrows[key][1] * step);
    }

    function exportTemplateJson() {
        if (!requireEditorTemplate('middleStatus')) return;
        const payload = {
            code: state.editorTemplate.code,
            name: state.editorTemplate.name,
            pageWidthMm: state.editorTemplate.pageWidthMm,
            pageHeightMm: state.editorTemplate.pageHeightMm,
            elements: copyEditorElements()
        };
        const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = (state.editorTemplate.code || 'template') + '-elements.json';
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(() => URL.revokeObjectURL(url), 0);
        setStatus('middleStatus', '已导出当前模板元素 JSON', 'ok');
    }

    function importTemplateJson() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!$('importElementsFile')) return;
        $('importElementsFile').value = '';
        $('importElementsFile').click();
    }

    function importTemplateJsonFromFile(file) {
        if (!file) return;
        if (!requireEditorTemplate('middleStatus')) return;
        const reader = new FileReader();
        reader.onload = () => runAction('middleStatus', () => applyImportedTemplateElements(JSON.parse(reader.result || '{}')));
        reader.onerror = () => setStatus('middleStatus', '读取 JSON 文件失败', 'error');
        reader.readAsText(file, 'utf-8');
    }

    function applyImportedTemplateElements(payload) {
        if (!requireEditorTemplate('middleStatus')) return;
        const sourceElements = Array.isArray(payload) ? payload : payload.elements;
        if (!Array.isArray(sourceElements)) throw new Error('JSON 中没有 elements 数组');
        const validTypes = ['STATIC_TEXT', 'FIELD_TEXT', 'BARCODE', 'QRCODE', 'LOGO', 'LINE', 'RECTANGLE'];
        snapshotEditorHistory();
        state.editorElements = normalizeEditorElements(sourceElements.map((item, index) => {
            const source = item || {};
            const type = validTypes.indexOf(source.type) >= 0 ? source.type : 'STATIC_TEXT';
            const element = Object.assign({
                id: newElementId(),
                type: type,
                fieldName: '',
                text: '',
                leftMm: 6,
                topMm: 6 + index * 4,
                widthMm: type === 'QRCODE' ? 20 : 50,
                heightMm: type === 'QRCODE' ? 20 : 8,
                fontSize: 10,
                bold: false,
                textAlign: 'left',
                locked: false,
                sortOrder: index + 1
            }, source, {
                id: newElementId(),
                type: type,
                sortOrder: index + 1
            });
            if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(type) >= 0 && !element.fieldName) {
                ensureFieldBindingForType(element, type);
            }
            if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(type) < 0) {
                element.fieldName = '';
            }
            return clampPastedElementToPage(element);
        }));
        state.selectedElementIds = [];
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', `已导入 ${state.editorElements.length} 个元素，检查后保存`, 'ok');
    }

    async function saveTemplate() {
        const data = await api('/api/label-templates', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                code: $('templateCode').value,
                name: $('templateName').value,
                labelType: $('labelType').value,
                pageWidthMm: Number($('pageWidthMm').value || 120),
                pageHeightMm: Number($('pageHeightMm').value || 80)
            })
        });
        setStatus('leftStatus', `已保存 ${data.code}`, 'ok');
        state.editorTemplate = data;
        await loadTemplates();
        renderTemplateBasicsSummary();
        return data;
    }

    async function saveElements() {
        if (!requireEditorTemplate('middleStatus')) return;
        renderTemplateHealth();
        const errors = validateTemplateElements().filter((issue) => issue.severity === 'error');
        if (errors.length) {
            setRightPanelTab('properties');
            setStatus('middleStatus', `模板体检发现 ${errors.length} 个错误，请修复后保存`, 'error');
            return;
        }
        const data = await api('/api/label-templates/' + encodeURIComponent(state.editorTemplate.code) + '/elements', {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({elements: copyEditorElements()})
        });
        setStatus('middleStatus', `已保存元素，版本 ${data.version}`, 'ok');
        state.editorTemplate = data;
        state.editorElements = normalizeEditorElements(data.elements || []);
        state.savedElementsSignature = elementsSignature(state.editorElements);
        markEditorDirty();
        renderTemplateEditor(data);
        renderTemplateBasicsSummary();
        return data;
    }

    function saveEditorFromShortcut() {
        syncActiveInspectorControlForSave();
        return saveElements();
    }

    async function saveAllTemplateChanges() {
        if (!requireEditorTemplate('middleStatus')) return;
        syncActiveInspectorControlForSave();
        const savedTemplate = await saveTemplate();
        if (!savedTemplate) return;
        const savedElements = await saveElements();
        if (!savedElements) return;
        setStatus('leftStatus', `已保存全部 ${savedElements.code}`, 'ok');
        setStatus('middleStatus', `已保存全部，版本 ${savedElements.version}`, 'ok');
        renderTemplateBasicsSummary();
    }

    function makeCopyCode(code) {
        return (code || 'template') + '-copy-' + Date.now().toString().slice(-6);
    }

    async function copySelectedTemplate() {
        if (!requireEditorTemplate('leftStatus')) return;
        const code = makeCopyCode($('templateCode').value);
        const name = $('templateName').value + ' Copy';
        const data = await api('/api/label-templates/' + encodeURIComponent(state.editorTemplate.code) + '/copy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: code, name: name})
        });
        setStatus('leftStatus', `已复制 ${data.code}`, 'ok');
        state.editorTemplate = data;
        await loadTemplates();
        loadTemplateIntoEditor(data.code);
    }

    async function loadSampleProducts() {
        const data = await api('/api/name-conversions/products?keyword=DEMO');
        $('sampleProductId').innerHTML = (data.items || []).map((item) =>
            `<option value="${escapeHtml(item.productConfigId)}">${escapeHtml(item.inventoryName)} / ${escapeHtml(item.productConfigId)}</option>`
        ).join('');
        await loadSampleFieldSources();
    }

    async function loadSampleFieldSources() {
        const sampleProduct = $('sampleProductId') ? $('sampleProductId').value : '';
        if (!sampleProduct) {
            state.sampleFieldSources = [];
        } else {
            const data = await api('/api/name-conversions/' + encodeURIComponent(sampleProduct));
            state.sampleFieldSources = data.fieldSources || [];
        }
        renderFieldPalette();
        renderTemplateEditor(state.editorTemplate);
    }

    function shouldAutoSaveBeforePreview() {
        return !$('previewAutoSaveToggle') || $('previewAutoSaveToggle').checked;
    }

    async function saveAndPreviewTemplate() {
        if (!requireEditorTemplate('rightStatus')) return;
        syncActiveInspectorControlForSave();
        if (state.editorDirty) {
            setStatus('rightStatus', '正在保存版式元素...', '');
            const saved = await saveElements();
            if (!saved) {
                setStatus('rightStatus', '元素未保存，已停止预览', 'error');
                return;
            }
        }
        setRightPanelTab('preview');
        return previewTemplateWithSample();
    }

    async function ensurePreviewUsesSavedTemplate() {
        syncActiveInspectorControlForSave();
        if (!state.editorDirty || !shouldAutoSaveBeforePreview()) {
            return true;
        }
        setStatus('rightStatus', '正在保存未保存元素...', '');
        const saved = await saveElements();
        if (!saved) {
            setStatus('rightStatus', '元素未保存，已停止预览', 'error');
            return false;
        }
        setStatus('rightStatus', '元素已保存，正在生成预览', 'ok');
        return true;
    }

    async function previewTemplateWithSample() {
        if (!requireEditorTemplate('rightStatus')) return;
        if (!$('sampleProductId').value) {
            setStatus('rightStatus', '请选择样例产品', 'error');
            return;
        }
        const ready = await ensurePreviewUsesSavedTemplate();
        if (!ready) return;
        setRightPanelTab('preview');
        const data = await api('/api/label-templates/' + encodeURIComponent(state.editorTemplate.code) + '/preview', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                productConfigId: $('sampleProductId').value,
                productionDate: $('productionDate').value || '2026-06-08',
                shift: $('shift').value || 'A',
                labelType: state.editorTemplate.labelType,
                format: 'PNG'
            })
        });
        $('outputPane').innerHTML = `<img alt="模板预览" src="${escapeHtml(data.previewUrl)}">`;
        setStatus('rightStatus', `${data.templateCode} / ${data.format} / ${data.sizeBytes} bytes`, 'ok');
    }

    async function importLegacyTemplate() {
        const data = await api('/api/template-imports/from-legacy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({labelType: $('labelType').value, legacyTemplateId: '00000', legacyTemplateName: 'Legacy Box Template'})
        });
        setStatus('leftStatus', `旧模板草稿 ${data.code}`, 'ok');
        await loadTemplates();
    }

    async function importImageTemplate() {
        const data = await api('/api/template-imports/from-image', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({labelType: $('labelType').value, sampleName: 'box-sample.png'})
        });
        setStatus('leftStatus', `样张草稿 ${data.code}`, 'ok');
        await loadTemplates();
    }

    $('reloadTemplatesBtn').onclick = () => runAction('leftStatus', loadTemplates);
    $('labelType').onchange = () => runAction('leftStatus', async () => {
        state.editorTemplate = null;
        await loadTemplates();
    });
    $('templateStatus').onchange = () => runAction('leftStatus', loadTemplates);
    $('saveTemplateBtn').onclick = () => runAction('leftStatus', saveTemplate);
    $('saveAllTemplateBtn').onclick = () => runAction('middleStatus', saveAllTemplateChanges);
    $('templateBasicsToggle').onclick = () => toggleTemplateSettingsPanel();
    $('copyTemplateBtn').onclick = () => runAction('leftStatus', copySelectedTemplate);
    $('applyPagePresetBtn').onclick = () => runAction('leftStatus', applyPagePreset);
    ['templateCode', 'templateName', 'pageWidthMm', 'pageHeightMm'].forEach((id) => {
        if ($(id)) $(id).oninput = renderTemplateBasicsSummary;
    });
    $('saveElementsBtn').onclick = () => runAction('middleStatus', saveEditorFromShortcut);
    $('saveReadinessSaveBtn').onclick = () => runAction('middleStatus', saveEditorFromShortcut);
    $('saveAndPreviewBtn').onclick = () => runAction('rightStatus', saveAndPreviewTemplate);
    $('commitSaveAllBtn').onclick = () => runAction('middleStatus', saveAllTemplateChanges);
    $('templateAuditBtn').onclick = () => runAction('middleStatus', runTemplateAudit);
    $('exportElementsBtn').onclick = () => runAction('middleStatus', exportTemplateJson);
    $('importElementsBtn').onclick = () => runAction('middleStatus', importTemplateJson);
    $('importElementsFile').onchange = () => runAction('middleStatus', () => importTemplateJsonFromFile($('importElementsFile').files[0]));
    $('legacyImportBtn').onclick = () => runAction('leftStatus', importLegacyTemplate);
    $('imageImportBtn').onclick = () => runAction('leftStatus', importImageTemplate);
    $('addTextBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('STATIC_TEXT'));
    $('addMultilineBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('STATIC_TEXT', '', {text: '多行文本', heightMm: 16, widthMm: 60}));
    $('addFieldBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('FIELD_TEXT'));
    $('addBarcodeBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('BARCODE'));
    $('addQrBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('QRCODE'));
    $('addLogoBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('LOGO'));
    $('addLineBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('LINE'));
    $('addRectangleBtn').onclick = () => runAction('middleStatus', () => addTemplateElement('RECTANGLE'));
    $('undoElementBtn').onclick = () => runAction('middleStatus', undoEditorChange);
    $('redoElementBtn').onclick = () => runAction('middleStatus', redoEditorChange);
    $('deleteElementBtn').onclick = () => runAction('middleStatus', deleteSelectedElement);
    $('duplicateElementBtn').onclick = () => runAction('middleStatus', duplicateSelectedElements);
    $('alignLeftBtn').onclick = () => runAction('middleStatus', () => alignSelectedElements('left'));
    $('alignRightBtn').onclick = () => runAction('middleStatus', () => alignSelectedElements('right'));
    $('alignTopBtn').onclick = () => runAction('middleStatus', () => alignSelectedElements('top'));
    $('alignBottomBtn').onclick = () => runAction('middleStatus', () => alignSelectedElements('bottom'));
    $('distributeHorizontalBtn').onclick = () => runAction('middleStatus', () => distributeSelectedElements('horizontal'));
    $('distributeVerticalBtn').onclick = () => runAction('middleStatus', () => distributeSelectedElements('vertical'));
    $('matchWidthBtn').onclick = () => runAction('middleStatus', () => matchSelectedElementSize('width'));
    $('matchHeightBtn').onclick = () => runAction('middleStatus', () => matchSelectedElementSize('height'));
    $('matchSizeBtn').onclick = () => runAction('middleStatus', () => matchSelectedElementSize('size'));
    $('tidySelectedFieldsBtn').onclick = () => runAction('middleStatus', () => applyFieldLayoutPreset('selected'));
    $('tidyAllFieldsBtn').onclick = () => runAction('middleStatus', () => applyFieldLayoutPreset('all'));
    $('layoutPresetSelect').onchange = renderLayoutAssistantHint;
    $('layerUpBtn').onclick = () => runAction('middleStatus', () => moveSelectedLayer('up'));
    $('layerDownBtn').onclick = () => runAction('middleStatus', () => moveSelectedLayer('down'));
    $('layerTopBtn').onclick = () => runAction('middleStatus', () => moveSelectedLayer('top'));
    $('layerBottomBtn').onclick = () => runAction('middleStatus', () => moveSelectedLayer('bottom'));
    $('templatePreviewBtn').onclick = () => runAction('rightStatus', previewTemplateWithSample);
    $('previewAutoSaveToggle').onchange = renderPreviewControls;
    $('sampleProductId').onchange = () => runAction('rightStatus', loadSampleFieldSources);
    Array.prototype.forEach.call(document.querySelectorAll('[data-resource-tab]'), (button) => {
        button.onclick = () => setResourceTab(button.getAttribute('data-resource-tab'));
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-right-tab]'), (button) => {
        button.onclick = () => setRightPanelTab(button.getAttribute('data-right-tab'));
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-workspace-mode]'), (button) => {
        button.onclick = () => setWorkspaceMode(button.getAttribute('data-workspace-mode'));
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-toolbar-tab]'), (button) => {
        button.onclick = () => setActiveToolbarPanel(button.getAttribute('data-toolbar-tab'));
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-field-mode]'), (button) => {
        button.onclick = () => setFieldPaletteMode(button.getAttribute('data-field-mode'));
    });
    Array.prototype.forEach.call(document.querySelectorAll('[data-field-library-view]'), (button) => {
        button.onclick = () => setFieldLibraryViewMode(button.getAttribute('data-field-library-view'));
    });
    $('fieldDetailsToggle').onchange = toggleFieldDetails;
    $('fieldDensitySelect').onchange = () => setFieldDensity($('fieldDensitySelect').value);
    $('fieldInsertModeSelect').onchange = () => setFieldInsertMode($('fieldInsertModeSelect').value);
    $('fitCanvasBtn').onclick = fitCanvasToShell;
    $('focusCanvasBtn').onclick = () => setCanvasFocusMode(!state.canvasFocusMode);
    $('gridToggle').onchange = () => {
        state.canvasGridVisible = $('gridToggle').checked;
        renderTemplateEditor(state.editorTemplate);
    };
    $('snapStepMm').onchange = () => {
        setSnapStepMm($('snapStepMm').value);
    };
    $('canvasZoom').onchange = () => {
        state.editorScale = Number($('canvasZoom').value || 6);
        renderTemplateEditor(state.editorTemplate);
    };
    $('canvasValueMode').onchange = () => setCanvasValueMode($('canvasValueMode').value);
    $('canvasElementTypeFilter').onchange = () => setCanvasElementTypeFilter($('canvasElementTypeFilter').value);
    $('fieldSearch').oninput = renderFieldSearch;
    $('layerTypeFilter').onchange = () => {
        state.layerTypeFilter = $('layerTypeFilter').value || '';
        renderLayerList();
    };
    $('layerSearch').oninput = () => {
        state.layerSearchTerm = $('layerSearch').value || '';
        renderLayerList();
    };
    $('selectAllElementsBtn').onclick = () => runAction('middleStatus', selectAllEditorElements);
    $('selectByTypeBtn').onclick = () => runAction('middleStatus', () => selectEditorElementsByType());
    $('selectVisibleLayerElementsBtn').onclick = () => runAction('middleStatus', selectVisibleLayerElements);
    $('selectEditableElementsBtn').onclick = () => runAction('middleStatus', selectEditableEditorElements);
    $('selectLockedElementsBtn').onclick = () => runAction('middleStatus', selectLockedEditorElements);
    $('selectUnboundElementsBtn').onclick = () => runAction('middleStatus', selectUnboundEditorElements);
    $('invertElementSelectionBtn').onclick = () => runAction('middleStatus', invertEditorSelection);
    $('clearElementSelectionBtn').onclick = () => runAction('middleStatus', clearEditorSelection);
    $('copyElementsBtn').onclick = () => runAction('middleStatus', copySelectedElementsToClipboard);
    $('pasteElementsBtn').onclick = () => runAction('middleStatus', pasteClipboardElements);
    $('copyStyleBtn').onclick = () => runAction('middleStatus', copySelectedElementStyle);
    $('pasteStyleBtn').onclick = () => runAction('middleStatus', pasteStyleToSelectedElements);
    $('lockSelectionBtn').onclick = () => runAction('middleStatus', () => toggleSelectedElementLock(true));
    $('unlockSelectionBtn').onclick = () => runAction('middleStatus', () => toggleSelectedElementLock(false));
    document.addEventListener('keydown', moveSelectedElementsByKeyboard);
    window.addEventListener('beforeunload', (event) => {
        if (!state.editorDirty) return;
        event.preventDefault();
        event.returnValue = '';
    });
    renderHistoryControls();
    renderTemplateBasicsSummary();
    setResourceTab(state.resourceTab);
    setRightPanelTab(state.rightPanelTab);
    syncWorkspaceModeSwitcher();
    syncToolbarPanelState();

    Promise.all([loadFieldContract(), loadTemplates(), loadSampleProducts()])
        .catch((error) => setStatus('leftStatus', error.message, 'error'));
</script>
</body>
</html>
