            const lockState = element.locked ? '<span class="lock-state">已锁定</span>' : '';
            return `<div class="selection-summary" id="selectionSummary">
                <strong>${escapeHtml(elementLabel(element))}</strong>
                <span class="muted">${escapeHtml(element.type)} / ${escapeHtml(element.leftMm)}mm, ${escapeHtml(element.topMm)}mm / ${escapeHtml(element.widthMm)}x${escapeHtml(element.heightMm)}mm</span>
                ${lockState}
            </div>`;
        }
        const lockedCount = selected.filter((item) => item.locked).length;
        return `<div class="selection-summary" id="selectionSummary">
            <strong>已选择 ${selected.length} 个元素</strong>
            <span class="muted">可批量移动、复制、删除、对齐和调整层级。${lockedCount ? lockedCount + ' 个已锁定。' : ''}</span>
        </div>`;
    }

    function renderInspectorSaveStrip() {
        return `<div class="inspector-save-strip" id="inspectorSaveStrip">
            <span class="save-shortcut-hint" id="saveShortcutHint">Ctrl+S 保存当前版式</span>
            <button id="inspectorSaveBtn" type="button" class="primary">保存版式</button>
        </div>`;
    }

    function defaultInspectorTabForElement(element) {
        if (!element) return 'layout';
        if (element.type === 'FIELD_TEXT') return 'binding';
        if (element.type === 'STATIC_TEXT') return 'content';
        return 'layout';
    }

    function inspectorTabsForElement(element) {
        const tabs = [
            {id: 'basic', label: '基础'},
            {id: 'layout', label: '位置'}
        ];
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0) {
            tabs.push({id: 'binding', label: '绑定'});
        }
        if (element.type === 'STATIC_TEXT') {
            tabs.push({id: 'content', label: '内容'});
        }
        if (elementUsesTextStyle(element)) {
            tabs.push({id: 'style', label: '文字'});
        }
        return tabs;
    }

    function activeInspectorTabForElement(element) {
        const tabs = inspectorTabsForElement(element).map((tab) => tab.id);
        if (tabs.indexOf(state.inspectorTab) >= 0) return state.inspectorTab;
        const fallback = defaultInspectorTabForElement(element);
        return tabs.indexOf(fallback) >= 0 ? fallback : 'layout';
    }

    function renderInspectorModeTabs(element, activeTab) {
        const tabs = inspectorTabsForElement(element);
        return `<div class="inspector-mode-tabs" id="inspectorModeTabs">
            ${tabs.map((tab) => `<button type="button" class="${tab.id === activeTab ? 'active' : ''}" data-inspector-tab="${escapeHtml(tab.id)}">${escapeHtml(tab.label)}</button>`).join('')}
        </div>`;
    }

    function inspectorSectionAttrs(sectionId, activeTab) {
        return `data-inspector-section="${escapeHtml(sectionId)}" ${sectionId === activeTab ? '' : 'hidden'}`;
    }

    function setElementInspectorTab(tab) {
        state.inspectorTab = tab || 'layout';
        state.completeInspectorOpen = true;
        renderElementInspector();
    }

    function componentPresetsForElement(element) {
        if (!element) return [];
        const pageWidth = Number(state.editorTemplate && state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate && state.editorTemplate.pageHeightMm || 80);
        const wideWidth = Math.max(36, pageWidth - 16);
        const type = element.type || '';
        const presets = {
            STATIC_TEXT: [
                {key: 'textCaptionPreset', label: '说明文本', description: '34 x 6mm / 8号', widthMm: 34, heightMm: 6, fontSize: 8, bold: false, textAlign: 'left'},
                {key: 'textTitlePreset', label: '标题文本', description: '70 x 8mm / 居中加粗', widthMm: Math.min(70, wideWidth), heightMm: 8, fontSize: 14, bold: true, textAlign: 'center'}
            ],
            FIELD_TEXT: [
                {key: 'fieldValuePreset', label: '字段值', description: '40 x 6mm / 常规', widthMm: 40, heightMm: 6, fontSize: 8, bold: false, textAlign: 'left'},
                {key: 'fieldWidePreset', label: '长字段', description: '70 x 8mm / 9号', widthMm: Math.min(70, wideWidth), heightMm: 8, fontSize: 9, bold: false, textAlign: 'left'}
            ],
            BARCODE: [
                {key: 'barcodeCompactPreset', label: '紧凑条码', description: '52 x 14mm', widthMm: 52, heightMm: 14},
                {key: 'barcodeWidePreset', label: '宽条码', description: '70 x 18mm', widthMm: Math.min(70, wideWidth), heightMm: 18}
            ],
            QRCODE: [
                {key: 'qrSquarePreset', label: '标准二维码', description: '20 x 20mm', widthMm: 20, heightMm: 20},
                {key: 'qrLargePreset', label: '大二维码', description: '26 x 26mm', widthMm: 26, heightMm: 26}
            ],
            LOGO: [
                {key: 'logoStandardPreset', label: '横版 Logo', description: '24 x 12mm', widthMm: 24, heightMm: 12},
                {key: 'logoSquarePreset', label: '方形 Logo', description: '18 x 18mm', widthMm: 18, heightMm: 18}
            ],
            LINE: [
                {key: 'lineDividerPreset', label: '分隔线', description: '铺满内容宽度', widthMm: wideWidth, heightMm: 1},
                {key: 'lineShortPreset', label: '短分隔线', description: '50 x 1mm', widthMm: 50, heightMm: 1}
            ],
            RECTANGLE: [
                {key: 'rectangleFramePreset', label: '内容框', description: '40 x 18mm', widthMm: 40, heightMm: 18},
                {key: 'rectanglePageFramePreset', label: '页边框', description: '贴近页面边缘', leftMm: 4, topMm: 4, widthMm: Math.max(1, pageWidth - 8), heightMm: Math.max(1, pageHeight - 8)}
            ]
        };
        return presets[type] || [];
    }

    function renderComponentPresetPanel(element, disabled) {
        const presets = componentPresetsForElement(element);
        if (!presets.length) return '';
        const disabledAttr = disabled ? 'disabled' : '';
        return `<div class="component-preset-panel" id="componentPresetPanel">
            <div class="component-preset-title">常用预设<span>一键套用尺寸和样式</span></div>
            <div class="component-preset-grid">
                ${presets.map((preset) => `<button type="button" data-component-preset="${escapeHtml(preset.key)}" ${disabledAttr}>
                    <strong>${escapeHtml(preset.label)}</strong>
                    <span>${escapeHtml(preset.description)}</span>
                </button>`).join('')}
            </div>
        </div>`;
    }

    function applyComponentPreset(presetKey) {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = primarySelectedElement();
        if (!element) {
            setStatus('middleStatus', '请选择元素', 'error');
            return;
        }
        if (element.locked) {
            setStatus('middleStatus', '元素已锁定，先解锁再套用预设', 'error');
            renderElementInspector();
            return;
        }
        const preset = componentPresetsForElement(element).find((item) => item.key === presetKey);
        if (!preset) {
            setStatus('middleStatus', '当前组件没有这个预设', 'error');
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        snapshotEditorHistory();
        if (preset.leftMm != null) element.leftMm = roundMm(clamp(preset.leftMm, 0, pageWidth - Number(element.widthMm || 1)));
        if (preset.topMm != null) element.topMm = roundMm(clamp(preset.topMm, 0, pageHeight - Number(element.heightMm || 1)));
        if (preset.widthMm != null) element.widthMm = roundMm(clamp(preset.widthMm, 1, pageWidth - Number(element.leftMm || 0)));
        if (preset.heightMm != null) element.heightMm = roundMm(clamp(preset.heightMm, 1, pageHeight - Number(element.topMm || 0)));
        if (elementUsesTextStyle(element)) {
            if (preset.fontSize != null) element.fontSize = Math.max(6, parseInt(preset.fontSize, 10) || 10);
            if (preset.bold != null) element.bold = !!preset.bold;
            if (preset.textAlign) element.textAlign = normalizeTextAlign(preset.textAlign);
        }
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已套用组件预设：' + preset.label, 'ok');
    }

    function commonElementValue(elements, field, filter) {
        const candidates = (elements || []).filter((item) => !filter || filter(item));
        if (!candidates.length) return '';
        const first = candidates[0][field];
        const same = candidates.every((item) => String(item[field] == null ? '' : item[field]) === String(first == null ? '' : first));
        return same && first != null ? first : '';
    }

    function commonBoldState(elements) {
        const candidates = (elements || []).filter(elementUsesTextStyle);
        if (!candidates.length) return '';
        const first = !!candidates[0].bold;
        return candidates.every((item) => !!item.bold === first) ? (first ? 'bold' : 'normal') : '';
    }

    function modificationPanelElementMeta(element) {
        if (!element) {
            return {
                label: '未选择元素',
                subtitle: '请选择画布元素',
                badge: '未选择',
                badgeClass: '',
                binding: '暂无',
                geometry: '暂无',
                style: '暂无'
            };
        }
        const geometry = `${Number(element.leftMm || 0)}mm, ${Number(element.topMm || 0)}mm / ${Number(element.widthMm || 0)}x${Number(element.heightMm || 0)}mm`;
        let binding = element.type || '元素';
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0) {
            const source = fieldSourceByName(element.fieldName);
            binding = element.fieldName
                ? `${fieldDisplayName(element.fieldName)} / ${element.fieldName}`
                : '未绑定字段';
            if (source && source.value) binding += ` / ${source.value}`;
        } else if (element.type === 'STATIC_TEXT') {
            binding = element.text || '固定文本';
        }
        let style = element.type || '组件';
        if (elementUsesTextStyle(element)) {
            const alignLabels = {left: '左对齐', center: '居中', right: '右对齐'};
            style = `${Number(element.fontSize || 10)}号 / ${alignLabels[normalizeTextAlign(element.textAlign)] || '左对齐'} / ${element.bold ? '加粗' : '常规'}`;
        } else if (element.type === 'LINE') {
            style = '线条 / 用尺寸控制粗细';
        } else if (element.type === 'RECTANGLE') {
            style = '矩形 / 用尺寸控制边框';
        }
        return {
            label: elementLabel(element),
            subtitle: element.type || 'ELEMENT',
            badge: element.locked ? '已锁定' : '可编辑',
            badgeClass: element.locked ? ' locked' : '',
            binding: binding,
            geometry: geometry,
            style: style
        };
    }

    function renderModificationUtilitySummary(element) {
        const meta = modificationPanelElementMeta(element);
        return `<div class="modificationUtilitySummary modification-utility-summary" id="modificationUtilitySummary">
            <div class="modification-utility-heading">
                <div>
                    <strong>${escapeHtml(meta.label)}</strong>
                    <span>${escapeHtml(meta.subtitle)}</span>
                </div>
                <em class="modification-utility-badge${meta.badgeClass}">${escapeHtml(meta.badge)}</em>
            </div>
            <div class="modification-utility-metrics">
                <span><small>绑定/内容</small><strong>${escapeHtml(meta.binding)}</strong></span>
                <span><small>位置尺寸</small><strong>${escapeHtml(meta.geometry)}</strong></span>
                <span><small>样式</small><strong>${escapeHtml(meta.style)}</strong></span>
            </div>
        </div>`;
    }

    function renderBatchModificationUtilitySummary(elements) {
        const selected = elements || [];
        const editableCount = selected.filter((item) => !item.locked).length;
        const lockedCount = selected.length - editableCount;
        const unboundCount = selected.filter((item) =>
            ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(item.type) >= 0 && !item.fieldName
        ).length;
        const typeCounts = selected.reduce((counts, item) => {
            const type = item.type || 'ELEMENT';
            counts[type] = (counts[type] || 0) + 1;
            return counts;
        }, {});
        const typeSummary = Object.keys(typeCounts).slice(0, 4).map((type) => `${typeCounts[type]} ${type}`).join(' / ') || '暂无';
        let bounds = '暂无';
        if (selected.length) {
            const left = Math.min.apply(null, selected.map((item) => Number(item.leftMm || 0)));
            const top = Math.min.apply(null, selected.map((item) => Number(item.topMm || 0)));
            const right = Math.max.apply(null, selected.map((item) => Number(item.leftMm || 0) + Number(item.widthMm || 0)));
            const bottom = Math.max.apply(null, selected.map((item) => Number(item.topMm || 0) + Number(item.heightMm || 0)));
            bounds = `${roundMm(left)}mm, ${roundMm(top)}mm / ${roundMm(right - left)}x${roundMm(bottom - top)}mm`;
        }
        return `<div class="batchModificationUtilitySummary modification-utility-summary batch-modification-utility-summary" id="batchModificationUtilitySummary">
            <div class="modification-utility-heading">
                <div>
                    <strong>批量选择概览</strong>
                    <span>${escapeHtml(typeSummary)}</span>
                </div>
                <em class="modification-utility-badge">${escapeHtml(editableCount)} 可编辑</em>
            </div>
            <div class="modification-utility-metrics">
                <span><small>范围</small><strong>${escapeHtml(bounds)}</strong></span>
                <span><small>状态</small><strong>${escapeHtml(lockedCount)} 锁定 / ${escapeHtml(unboundCount)} 未绑定</strong></span>
            </div>
        </div>`;

    function handleTemplateBatchModificationAction(action) {
        const dockActions = {
            'nudge-left': true,
            'nudge-right': true,
            'nudge-up': true,
            'nudge-down': true,
            'shrink-width': true,
            'grow-width': true,
            'shrink-height': true,
            'grow-height': true,
            duplicate: true,
            delete: true,
            save: true
        };
        if (dockActions[action]) return handleModifierDockAction(action);
        if (action === 'save-preview') return saveAndPreviewTemplate();
        if (action === 'fit-page') return fitSelectedElementsInsidePage();
        const pageActions = {
            'page-left': 'left',
            'page-center': 'center',
            'page-right': 'right',
            'page-top': 'top',
            'page-middle': 'middle',
            'page-bottom': 'bottom'
        };
        if (pageActions[action]) return alignSelectedToPage(pageActions[action]);
        const sizeActions = {
            'match-width': 'width',
            'match-height': 'height',
            'match-size': 'size'
        };
        if (sizeActions[action]) return matchSelectedElementSize(sizeActions[action]);
        if (action === 'distribute-horizontal') return distributeSelectedElements('horizontal');
        if (action === 'distribute-vertical') return distributeSelectedElements('vertical');
        if (action === 'align-left') return alignSelectedElements('left');
        if (action === 'create-field-labels-selected') return createFieldLabelsForScope('selected');
        if (action === 'create-field-labels-all') return createFieldLabelsForScope('all');
        if (action === 'lock') return toggleSelectedElementLock(true);
        if (action === 'unlock') return toggleSelectedElementLock(false);
        if (action === 'layer-top') return moveSelectedLayer('top');
        setStatus('middleStatus', '未知批量修改操作', 'error');
        return null;
    }

    function elementExceedsPage(element) {
        if (!element || !state.editorTemplate) return false;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const left = Number(element.leftMm || 0);
        const top = Number(element.topMm || 0);
        const width = Number(element.widthMm || 1);
        const height = Number(element.heightMm || 1);
        return left < 0 || top < 0 || width < 1 || height < 1 || left + width > pageWidth || top + height > pageHeight;
    }

    function bindableFieldNameForElement(element) {
        if (!element || ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) < 0) return '';
        const usedNames = usedFieldNames();
        const candidates = [];
        missingRequiredFieldContracts().forEach((field) => candidates.push(field));
        const defaultName = defaultFieldNameForType(element.type);
        if (defaultName) candidates.push(fieldContractByName(defaultName) || {fieldName: defaultName});
        commonFieldNames.forEach((fieldName) => candidates.push(fieldContractByName(fieldName)));
        (state.fieldContract || []).forEach((field) => candidates.push(field));
        for (let i = 0; i < candidates.length; i++) {
            const field = candidates[i];
            if (field && field.fieldName && (!usedNames[field.fieldName] || field.fieldName === defaultName)) {
                return field.fieldName;
            }
        }
        return defaultName || '';
    }

    function modificationBindingCandidates(element) {
        if (!element || ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) < 0) return [];
        const candidates = [];
        const seen = {};
        const addCandidate = (fieldName, reason) => {
            if (!fieldName || seen[fieldName]) return;
            const contract = fieldContractByName(fieldName);
            const source = fieldSourceByName(fieldName);
            if (!contract && !source && fieldName !== element.fieldName) return;
            seen[fieldName] = true;
            candidates.push({
                fieldName: fieldName,
                displayName: (source && source.displayName) || (contract && contract.displayName) || fieldName,
                required: !!(contract && contract.required),
                category: (contract && contract.category) || (source && source.sourceType) || '',
                reason: reason || (contract && contract.required ? '必填' : '推荐'),
                value: source && source.value || '',
                status: source && source.fieldStatus || (contract && contract.required ? 'REQUIRED' : 'OPTIONAL')
            });
        };
        addCandidate(element.fieldName, '当前');
        addCandidate(defaultFieldNameForType(element.type), '默认');
        missingRequiredFieldContracts().forEach((field) => addCandidate(field.fieldName, '必填'));
        commonFieldNames.forEach((fieldName) => addCandidate(fieldName, '常用'));
        (state.sampleFieldSources || []).forEach((source) => {
            if (source && source.value) addCandidate(source.fieldName, '样例');
        });
        return candidates.slice(0, 6);
    }

    function renderModificationBindingQuickChips(element, disabled) {

        const disabledAttr = disabled ? 'disabled' : '';
        return `<div class="modificationBindingChips modification-binding-chips" id="modificationBindingChips">
            ${candidates.map((item) => {
                const active = element && item.fieldName === element.fieldName;
                const source = fieldSourceByName(item.fieldName);
                const sample = item.value || item.category || item.fieldName;
                const statusClass = source ? sourceStatusClass(source) : (item.required ? 'status-fallback' : '');
                return `<button type="button" class="modification-binding-chip ${active ? 'active' : ''}" data-mod-panel-bind-field="${escapeHtml(item.fieldName)}" ${disabledAttr}>
                    <strong>${escapeHtml(item.displayName || item.fieldName)}</strong>
                    <span class="source-status ${statusClass}">${escapeHtml(item.reason || item.status)}</span>
                    <small>${escapeHtml(item.fieldName)} / ${escapeHtml(sample)}</small>
                </button>`;
            }).join('')}
        </div>`;
    }

    function canCreateFieldLabelForElement(element) {
        if (!state.editorTemplate || state.editorTemplate.engine !== 'CONFIG_LAYOUT') return false;
        if (!element || element.type !== 'FIELD_TEXT' || element.locked || !element.fieldName) return false;
        return !fieldLabelElementForValue(element, true);
    }

    function modificationPanelModeOptions() {
        return [
            {mode: 'content', label: '内容'},
            {mode: 'nudge', label: '位置'},
            {mode: 'arrange', label: '排列'},
            {mode: 'select', label: '选择'}
        ];
    }

    function suggestedModificationPanelMode(element) {
        return elementUsesContentTools(element) ? 'content' : 'nudge';
    }

    function syncModificationPanelModeForElement(element) {
        const elementId = element && element.id ? element.id : '';
        const availableModes = modificationPanelModeOptions().map((item) => item.mode);
        if (state.modificationPanelElementId !== elementId) {
            state.modificationPanelElementId = elementId;
            state.modificationPanelMode = suggestedModificationPanelMode(element);
            return;
        }
        if (availableModes.indexOf(state.modificationPanelMode) < 0) {
            state.modificationPanelMode = suggestedModificationPanelMode(element);
        }
        if (state.modificationPanelMode === 'content' && !elementUsesContentTools(element)) {
            state.modificationPanelMode = 'nudge';
        }
    }

    function modificationContentDigest(element) {
        if (!element) return '选择元素后可编辑字段、文本、位置和层级。';
        if (elementUsesFieldBinding(element)) {
            const source = fieldSourceByName(element.fieldName);
            const fieldText = element.fieldName
                ? `${fieldDisplayName(element.fieldName)} / ${element.fieldName}`
                : '未绑定字段';
            const sampleText = source && source.value ? source.value : '暂无样例值';
            return `${fieldText} · ${sampleText}`;
        }
        if (element.type === 'STATIC_TEXT') {
            const text = String(element.text || '').trim();
            return text ? `固定文本 · ${text}` : '固定文本 · 可直接输入内容';
        }
        if (element.type === 'RECTANGLE') return '矩形组件 · 调整位置、尺寸和层级';
        if (element.type === 'LINE') return '线条组件 · 用高度控制线条粗细';
        if (element.type === 'LOGO') return 'Logo 组件 · 调整尺寸和摆放位置';
        return `${element.type || '元素'} · 调整位置、尺寸和层级`;
    }

    function renderModificationFocusCard(element, activeMode) {
        const meta = modificationPanelElementMeta(element);
        return `<div class="modificationFocusCard modification-focus-card" id="modificationFocusCard">
            <div class="modification-focus-head">
                <div class="modification-focus-title">
                    <strong>${escapeHtml(meta.label)}</strong>
                    <span>${escapeHtml(meta.geometry)}</span>
                </div>
                <em class="modification-focus-state${meta.badgeClass}">${escapeHtml(meta.badge)}</em>
            </div>
            <div class="modification-focus-digest">${escapeHtml(modificationContentDigest(element))}</div>
            ${renderModificationModeTabs(activeMode)}
        </div>`;
    }

    function modificationWorkbenchStatus(element) {
        if (!element) {
            return {
                title: '先选元素',
                detail: '点选画布元素后可直接修改内容、位置和样式',
                label: '待选择',
                severity: ''
            };
        }
        if (element.locked) {
            return {
                title: '元素已锁定',
                detail: '先解锁，再继续拖拽、绑定或调整尺寸',
                label: '锁定',
                severity: 'warn'
            };
        }
        if (elementExceedsPage(element)) {
            return {
                title: '先修正页面范围',
                detail: '当前元素超出标签区域，预览或打印可能被裁切',
                label: '越界',
                severity: 'error'
            };
        }
        if (elementUsesFieldBinding(element) && !element.fieldName) {
            return {
                title: '先绑定字段',
                detail: '绑定后画布、预览和最终打印才能显示真实值',
                label: '未绑定',
                severity: 'warn'
            };
        }
        if (element.type === 'FIELD_TEXT' && element.fieldName && !fieldLabelElementForValue(element, true)) {
            return {
                title: '补标题并成行',
                detail: '给字段值生成标题，再自动整理成标签常用行',
                label: '可整理',
                severity: ''
            };
        }
        if (elementUsesTextStyle(element)) {
            return {
                title: '调整内容呈现',
                detail: '按样例适配宽度，也可以继续切到内容或位置工具',
                label: '文本',
                severity: ''
            };
        }
        return {
            title: '调整位置尺寸',
            detail: '当前组件主要通过位置、尺寸、层级来完成落版',
            label: '组件',
            severity: ''
        };
    }

    function modificationWorkbenchActions(element) {
        if (!element) return [];
        const actions = [];
        const seen = {};
        const add = (action, title, detail, primary) => {
            if (!action || seen[action] || actions.length >= 4) return;
            seen[action] = true;
            actions.push({
                action: action,
                title: title,
                detail: detail,
                primary: primary || actions.length === 0
            });
        };
        if (element.locked) {
            add('lock', '解锁', '继续编辑', true);
            add('save-preview', '保存预览', '查看效果', false);
            return actions;
        }
        if (elementExceedsPage(element)) {
            add('fit-page', '页面内', '修正越界', true);
            add('page-center-middle', '居中', '快速归位', false);
            add('open-position-tools', '位置', '看数值', false);
        } else if (elementUsesFieldBinding(element) && !element.fieldName) {
            add('bind-first-required', '绑定字段', '优先必填', true);
            add('open-content-tools', '内容', '手动选择', false);
            add('open-position-tools', '位置', '调整落点', false);
        } else if (element.type === 'FIELD_TEXT' && element.fieldName) {
            add('create-field-row', '字段成行', '标题+值', true);
            add('fit-content-width', '适配内容', '按样例宽', false);
            add('open-content-tools', '内容', '换字段', false);
        } else if (elementUsesTextStyle(element)) {
            add('fit-content-width', '适配内容', '按文本宽', true);
            add('open-content-tools', '内容', '改文字', false);
            add('open-position-tools', '位置', '改尺寸', false);
        } else {
            add('open-position-tools', '位置', '改尺寸', true);
            add('fit-page', '页面内', '防裁切', false);
        }
        add('save-preview', '保存预览', '看结果', false);
        return actions;
    }

    function renderModificationWorkbenchBar(element, disabled) {
        if (!element) return '';
        const status = modificationWorkbenchStatus(element);
        const actions = modificationWorkbenchActions(element);
        return `<div class="modificationWorkbenchBar modification-workbench-bar" id="modificationWorkbenchBar">

                    const lockedDisabled = disabled && item.action !== 'lock' && item.action !== 'save-preview';

                    const actionAttr = item.action === 'open-content-tools'

                            : `data-mod-panel-action="${escapeHtml(item.action)}"`);

                        <strong>${escapeHtml(item.title)}</strong>
                        <span>${escapeHtml(item.detail)}</span>
                    </button>`;
                }).join('')}
            </div>
        </div>`;

    function renderModificationFieldPairTools(element, disabled) {
        if (!element || element.type !== 'FIELD_TEXT') return '';
        const existingLabel = fieldLabelElementForValue(element, true);
        const createDisabledAttr = disabled || !canCreateFieldLabelForElement(element) ? 'disabled' : '';
        const selectedMissingCount = fieldTextElementsMissingLabels('selected').length;
        const allMissingCount = fieldTextElementsMissingLabels('all').length;
        const selectedDisabledAttr = selectedMissingCount ? '' : 'disabled';
        const allDisabledAttr = allMissingCount ? '' : 'disabled';
        const tidyDisabledAttr = disabled || !selectedLayoutTargetPairs('selected').length ? 'disabled' : '';
        const labelState = existingLabel ? '已有标题' : (element.fieldName ? '可补标题' : '先绑定字段');
        return `<div class="modificationFieldPairTools modification-field-pair-tools" id="modificationFieldPairTools">
            <div class="modification-field-pair-head">
                <strong>字段成组</strong>
                <span>${escapeHtml(labelState)} / 缺 ${escapeHtml(allMissingCount)}</span>
            </div>
            <div class="modification-field-pair-actions">
                <button type="button" class="primary" data-mod-panel-action="create-field-label" ${createDisabledAttr}>补当前标题</button>

                <button type="button" data-mod-panel-action="create-field-labels-all" ${allDisabledAttr}>补全部标题</button>

    function renderModificationLayoutRecipes(element, disabled) {

            : '少填数值，直接落版';
        const fieldRowDisabledAttr = disabled || !hasFieldValue ? 'disabled' : '';
        const fitDisabledAttr = disabled || !hasTextContent ? 'disabled' : '';
        const duplicateDisabledAttr = disabled ? 'disabled' : '';
        const normalizeDisabledAttr = disabled || !hasPreset ? 'disabled' : '';
        return `<div class="modificationLayoutRecipes modification-layout-recipes" id="modificationLayoutRecipes">
            <div class="modification-layout-recipes-head">
                <strong>快速布局</strong>
                <span>${escapeHtml(recipeDigest)}</span>

                <button type="button" class="primary" data-mod-panel-recipe="field-row" ${fieldRowDisabledAttr}>

                <button type="button" data-mod-panel-recipe="fit-content" ${fitDisabledAttr}>

                </button>
                <button type="button" data-mod-panel-recipe="normalize" ${normalizeDisabledAttr}>
                    <strong>推荐规格</strong>
                    <span>统一尺寸样式</span>
                </button>

        </div>`;
    }

    function renderTemplateModificationPanel(element, disabled) {
        syncModificationPanelModeForElement(element);
        const disabledAttr = disabled ? 'disabled' : '';
        const lockText = element.locked ? '解锁' : '锁定';
        const align = normalizeTextAlign(element.textAlign);

                    <button type="button" class="${align === 'center' ? 'active' : ''}" data-mod-panel-action="text-center" ${disabledAttr}>中</button>

                ${renderModificationTextStyleStrip(element, disabled)}

                ${renderModificationElementChecklist(element, disabled)}

            <div ${modificationSectionAttrs('nudge', activeMode)}>

                <div class="template-modification-row">

                    <div class="template-modification-pad" aria-label="位置微调">
                        <span></span>

                        <span></span>
                        <button type="button" data-mod-panel-action="nudge-left" title="左移" ${disabledAttr}>&#8592;</button>

                <div class="template-modification-row">

                        <button type="button" data-mod-panel-action="grow-width" ${disabledAttr}>W+</button>
                        <button type="button" data-mod-panel-action="shrink-height" ${disabledAttr}>H-</button>
                        <button type="button" data-mod-panel-action="grow-height" ${disabledAttr}>H+</button>
                        <button type="button" data-mod-panel-action="fit-page" ${disabledAttr}>页面内</button>
                    </div>
                </div>
                <div class="template-modification-row">
                    <span class="template-modification-label">贴边</span>
                    <div class="template-modification-grid">
                        <button type="button" data-mod-panel-action="page-left" ${disabledAttr}>左</button>
                        <button type="button" data-mod-panel-action="page-center" ${disabledAttr}>水平</button>
                        <button type="button" data-mod-panel-action="page-right" ${disabledAttr}>右</button>

                        <button type="button" data-mod-panel-action="layer-down" ${disabledAttr}>下移</button>
                        <button type="button" data-mod-panel-action="layer-top" ${disabledAttr}>置顶</button>
                        <button type="button" data-mod-panel-action="layer-bottom" ${disabledAttr}>置底</button>

                        <button type="button" data-mod-panel-action="duplicate" ${disabledAttr}>复制</button>
                        <button type="button" data-mod-panel-action="delete" ${disabledAttr}>删除</button>
                        <button type="button" class="${element.locked ? 'active' : ''}" data-mod-panel-action="lock">${lockText}</button>
                        <button type="button" class="primary" data-mod-panel-action="save">保存</button>
                    </div>

    function handleTemplateModificationAction(action) {
        const dockActions = {
            'nudge-left': true,
            'nudge-right': true,
            'nudge-up': true,
            'nudge-down': true,
            'shrink-width': true,
            'grow-width': true,
            'shrink-height': true,
            'grow-height': true,
            duplicate: true,
            delete: true,
            lock: true,
            save: true
        };
        if (dockActions[action]) return handleModifierDockAction(action);
        if (action === 'open-content-tools') return setModificationPanelMode('content');
        if (action === 'open-position-tools') return setModificationPanelMode('nudge');
        if (action === 'save-preview') return saveAndPreviewTemplate();
        if (action === 'fit-page') return fitSelectedElementsInsidePage();
        if (action === 'page-center-middle') return centerSelectedElementsOnPage();
        if (action === 'tidy-selected-fields') return applyFieldLayoutPreset('selected');
        if (action === 'copy-style') {
            copySelectedElementStyle();
            renderElementInspector();
            return null;
        }
        if (action === 'paste-style') {
            pasteStyleToSelectedElements();
            renderElementInspector();
            return null;
        }
        if (action === 'bind-first-required') return bindSelectedElementToFirstRequiredField();
        if (action === 'font-size-10') return setSelectedElementFontSize(10);
        if (action === 'fit-content-width') return fitSelectedElementToContent();
        if (action === 'normalize-component') return normalizeSelectedElement();
        if (action === 'duplicate-below') return duplicateSelectedElementBelow();
        if (action === 'create-field-row') return applySelectedFieldRowRecipe();
        if (action === 'create-field-label') return createFieldLabelForSelectedElement();
        if (action === 'create-field-labels-selected') return createFieldLabelsForScope('selected');
        if (action === 'create-field-labels-all') return createFieldLabelsForScope('all');
        const pageActions = {
            'page-left': 'left',
            'page-center': 'center',
            'page-right': 'right',
            'page-top': 'top',
            'page-middle': 'middle',
            'page-bottom': 'bottom'
        };
        if (pageActions[action]) return alignSelectedToPage(pageActions[action]);
        const textActions = {
            'text-left': 'left',
            'text-center': 'center',
            'text-right': 'right'
        };
        if (textActions[action]) return quickSetElementTextAlign(textActions[action]);
        const layerActions = {
            'layer-up': 'up',
            'layer-down': 'down',
            'layer-top': 'top',
            'layer-bottom': 'bottom'
        };
        if (layerActions[action]) return quickMoveSelectedLayer(layerActions[action]);
        if (action === 'select-same-type') {
            const element = primarySelectedElement();
            if (!element) {
                setStatus('middleStatus', '请先选择一个元素', 'error');
                return null;
            }
            return selectEditorElementsByType(element.type);
        }
        if (action === 'select-same-field') {
            const element = primarySelectedElement();
            if (!element || !element.fieldName) {
                setStatus('middleStatus', '当前元素没有绑定字段', 'error');
                return null;
            }
            return selectEditorElementsByPredicate(
                (candidate) => candidate.fieldName === element.fieldName,
                '没有找到同字段元素',
                (count) => `已选择 ${count} 个 ${element.fieldName} 元素`
            );
        }
        if (action === 'select-unbound') return selectUnboundEditorElements();
        if (action === 'clear-selection') return clearEditorSelection();
        setStatus('middleStatus', '未知模板修改操作', 'error');
        return null;
    }

    function bindSelectedElementToFirstRequiredField() {
        const element = primarySelectedElement();
        if (!element || ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) < 0) {
            setStatus('middleStatus', '请选择字段文本、条码或二维码元素', 'error');
            return;
        }
        const fieldName = bindableFieldNameForElement(element);
        if (!fieldName) {
            setStatus('middleStatus', '当前没有可绑定字段', 'error');
            return;
        }
        updateSelectedElementField('fieldName', fieldName);
        setStatus('middleStatus', '已绑定字段：' + fieldDisplayName(fieldName), 'ok');
    }

    function fieldTextElementsMissingLabels(scope) {
        if (!state.editorTemplate || state.editorTemplate.engine !== 'CONFIG_LAYOUT') return [];
        const source = scope === 'all' ? state.editorElements : selectedEditorElements();
        const seen = {};
        return (source || []).filter((element) => {
            if (!element || element.type !== 'FIELD_TEXT' || element.locked || !element.fieldName) return false;
            if (seen[element.id]) return false;
            seen[element.id] = true;
            return !fieldLabelElementForValue(element, true);
        });
    }

    function createFieldLabelForValueElement(element) {
        if (!state.editorTemplate || state.editorTemplate.engine !== 'CONFIG_LAYOUT') return null;
        if (!element || element.type !== 'FIELD_TEXT' || element.locked || !element.fieldName) return null;
        if (fieldLabelElementForValue(element, true)) return null;
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const fontSize = Math.max(6, Number(element.fontSize || 10));
        const labelText = (fieldDisplayName(element.fieldName) || element.fieldName || '字段') + '：';
        const gap = Math.max(1, currentSnapStepMm());
        const maxLabelWidth = Math.max(8, pageWidth - gap - 10);
        const labelWidth = roundMm(clamp(textWidthWeight(labelText) * fontSize * 0.34 + 2, 8, Math.min(28, maxLabelWidth)));
        const valueTop = roundMm(clamp(Number(element.topMm || 0), 0, Math.max(0, pageHeight - Number(element.heightMm || 5.5))));
        let labelLeft = roundMm(Number(element.leftMm || 0) - labelWidth - gap);
        let nextValueLeft = Number(element.leftMm || 0);
        if (labelLeft < 0) {
            labelLeft = roundMm(clamp(Number(element.leftMm || 0), 0, Math.max(0, pageWidth - labelWidth)));
            nextValueLeft = roundMm(clamp(labelLeft + labelWidth + gap, 0, Math.max(0, pageWidth - 1)));
        }
        const maxValueWidth = Math.max(1, pageWidth - nextValueLeft);
        const minValueWidth = Math.min(8, maxValueWidth);
        const nextValueWidth = roundMm(clamp(Number(element.widthMm || 18), minValueWidth, maxValueWidth));
        const field = fieldContractByName(element.fieldName);
        const label = {
            id: newElementId(),
            type: 'STATIC_TEXT',
            fieldName: '',
            text: labelText,
            leftMm: labelLeft,
            topMm: valueTop,
            widthMm: labelWidth,
            heightMm: roundMm(clamp(Number(element.heightMm || 5.5), 3, Math.max(3, pageHeight - valueTop))),
            fontSize: fontSize,
            bold: !!(field && field.required),
            textAlign: 'right',
            locked: false,
            sortOrder: Number(element.sortOrder || maxElementSortOrder()) - 0.25
        };
        element.leftMm = roundMm(nextValueLeft);
        element.topMm = valueTop;
        element.widthMm = nextValueWidth;
        element.textAlign = normalizeTextAlign(element.textAlign || 'left');
        return label;
    }

    function createFieldLabelsForScope(scope) {
        if (!requireEditorTemplate('middleStatus')) return;
        const normalizedScope = scope === 'all' ? 'all' : 'selected';
        const values = fieldTextElementsMissingLabels(normalizedScope);
        if (!values.length) {
            setStatus('middleStatus', normalizedScope === 'all' ? '全部字段都已有标题或不可补标题' : '选中字段都已有标题或不可补标题', 'ok');
            return;
        }
        snapshotEditorHistory();
        const createdPairs = [];
        values.forEach((element) => {
            const label = createFieldLabelForValueElement(element);
            if (label) createdPairs.push({label: label, value: element});
        });
        if (!createdPairs.length) {
            setStatus('middleStatus', '没有可补标题的字段', 'ok');
            return;
        }
        state.editorElements = state.editorElements
            .concat(createdPairs.map((pair) => pair.label))
            .sort((a, b) => Number(a.sortOrder || 0) - Number(b.sortOrder || 0));
        state.editorElements.forEach((item, index) => {
            item.sortOrder = index + 1;
        });
        state.selectedElementIds = createdPairs.reduce((ids, pair) => {
            ids.push(pair.label.id);
            ids.push(pair.value.id);
            return ids;
        }, []);
        state.inspectorTab = 'batch';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已为${normalizedScope === 'all' ? '全部' : '选中'}字段补标题 ${createdPairs.length} 个，可继续整理字段组或保存预览`, 'ok');
    }

    function createFieldLabelForSelectedElement() {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = primarySelectedElement();
        if (!element || element.type !== 'FIELD_TEXT') {
            setStatus('middleStatus', '请选择字段文本元素', 'error');
            return;
        }
        if (element.locked) {
            setStatus('middleStatus', '字段值已锁定，先解锁再补标题', 'error');
            renderElementInspector();
            return;
        }
        if (!element.fieldName) {
            setStatus('middleStatus', '请先给字段值绑定字段', 'error');
            return;
        }
        const existingLabel = fieldLabelElementForValue(element, true);
        if (existingLabel) {
            state.selectedElementIds = [existingLabel.id, element.id];
            state.inspectorTab = 'batch';
            renderTemplateEditor(state.editorTemplate);
            setStatus('middleStatus', '已选中字段标题和值，可继续整理本组', 'ok');
            return;
        }

        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const fontSize = Math.max(6, Number(element.fontSize || 10));
        const labelText = (fieldDisplayName(element.fieldName) || element.fieldName || '字段') + '：';
        const gap = Math.max(1, currentSnapStepMm());
        const maxLabelWidth = Math.max(8, pageWidth - gap - 10);
        const labelWidth = roundMm(clamp(textWidthWeight(labelText) * fontSize * 0.34 + 2, 8, Math.min(28, maxLabelWidth)));
        const valueTop = roundMm(clamp(Number(element.topMm || 0), 0, Math.max(0, pageHeight - Number(element.heightMm || 5.5))));
        let labelLeft = roundMm(Number(element.leftMm || 0) - labelWidth - gap);
        let nextValueLeft = Number(element.leftMm || 0);
        if (labelLeft < 0) {
            labelLeft = roundMm(clamp(Number(element.leftMm || 0), 0, Math.max(0, pageWidth - labelWidth)));
            nextValueLeft = roundMm(clamp(labelLeft + labelWidth + gap, 0, Math.max(0, pageWidth - 1)));
        }
        const maxValueWidth = Math.max(1, pageWidth - nextValueLeft);
        const minValueWidth = Math.min(8, maxValueWidth);
        const nextValueWidth = roundMm(clamp(Number(element.widthMm || 18), minValueWidth, maxValueWidth));
        const field = fieldContractByName(element.fieldName);
        const label = {
            id: newElementId(),
            type: 'STATIC_TEXT',
            fieldName: '',
            text: labelText,
            leftMm: labelLeft,
            topMm: valueTop,
            widthMm: labelWidth,
            heightMm: roundMm(clamp(Number(element.heightMm || 5.5), 3, Math.max(3, pageHeight - valueTop))),
            fontSize: fontSize,
            bold: !!(field && field.required),
            textAlign: 'right',
            locked: false,
            sortOrder: Number(element.sortOrder || maxElementSortOrder()) - 0.25
        };
        snapshotEditorHistory();
        element.leftMm = roundMm(nextValueLeft);
        element.topMm = valueTop;
        element.widthMm = nextValueWidth;
        element.textAlign = normalizeTextAlign(element.textAlign || 'left');
        state.editorElements = state.editorElements.concat(label).sort((a, b) => Number(a.sortOrder || 0) - Number(b.sortOrder || 0));
        state.editorElements.forEach((item, index) => {
            item.sortOrder = index + 1;
        });
        state.selectedElementIds = [label.id, element.id];
        state.inspectorTab = 'batch';
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', '已补字段标题：' + labelText, 'ok');
    }

    function setSelectedElementFontSize(size) {
        const element = primarySelectedElement();
        if (!element || !elementUsesTextStyle(element)) {
            setStatus('middleStatus', '当前元素不支持字号设置', 'error');
            return;
        }
        updateSelectedElementField('fontSize', size);
        setStatus('middleStatus', '已调整字号', 'ok');
    }

    function elementFitContentText(element) {
        if (!element) return '';
        if (element.type === 'STATIC_TEXT') return element.text || '';
        if (element.type === 'FIELD_TEXT') return editorFieldDisplayText(element);
        return elementLabel(element);
    }

    function textWidthWeight(text) {
        const value = String(text || '');
        let weight = 0;
        for (let i = 0; i < value.length; i++) {
            weight += value.charCodeAt(i) > 255 ? 1.05 : 0.58;
        }
        return Math.max(1, weight);
    }

    function fitSelectedElementToContent() {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = primarySelectedElement();
        if (!element) {
            setStatus('middleStatus', '请选择元素', 'error');
            return;
        }
        if (element.locked) {
            setStatus('middleStatus', '元素已锁定，先解锁再适配内容', 'error');
            renderElementInspector();
            return;
        }
        if (!elementUsesTextStyle(element)) {
            setStatus('middleStatus', '当前元素不是文本或字段文本', 'error');
            return;
        }
        const pageWidth = Number(state.editorTemplate.pageWidthMm || 120);
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const fontSize = Math.max(6, Number(element.fontSize || 10));
        const maxWidth = Math.max(1, pageWidth - Number(element.leftMm || 0));
        const maxHeight = Math.max(1, pageHeight - Number(element.topMm || 0));
        const content = elementFitContentText(element);
        const targetWidth = roundMm(clamp(textWidthWeight(content) * fontSize * 0.34 + 4, 12, maxWidth));
        const targetHeight = roundMm(clamp(Math.max(Number(element.heightMm || 1), fontSize * 0.52 + 2), 3, maxHeight));
        if (Number(element.widthMm || 0) === targetWidth && Number(element.heightMm || 0) === targetHeight) {
            setStatus('middleStatus', '当前宽度已适合内容', 'ok');
            return;
        }
        snapshotEditorHistory();
        element.widthMm = targetWidth;
        element.heightMm = targetHeight;
        fitElementInsidePage(element);
        markEditorDirty();
        renderTemplateEditor(state.editorTemplate);
        setStatus('middleStatus', '已按内容调整宽度', 'ok');
    }

    function normalizeSelectedElement() {
        const element = primarySelectedElement();
        if (!element) {
            setStatus('middleStatus', '请选择元素', 'error');
            return;
        }
        const preset = componentPresetsForElement(element)[0];
        if (!preset) {
            setStatus('middleStatus', '当前元素没有推荐规格', 'error');
            return;
        }
        return applyComponentPreset(preset.key);
    }

    function duplicateSelectedElementBelow() {
        if (!requireEditorTemplate('middleStatus')) return;
        if (!requireSelectedElements('middleStatus', 1, '请选择元素')) return;
        const selected = selectedEditableElements();
        if (!selected.length) {
            setStatus('middleStatus', '选中元素已锁定，先解锁再向下复制', 'error');
            return;
        }
        snapshotEditorHistory();
        const pageHeight = Number(state.editorTemplate.pageHeightMm || 80);
        const gap = Math.max(1.5, currentSnapStepMm() * 2);
        const nextSortOrder = maxElementSortOrder() + 1;
        const copies = selected.map((element, index) => {
            const copy = Object.assign({}, element, {
                id: newElementId(),
                sortOrder: nextSortOrder + index,
                topMm: roundMm(Math.min(pageHeight - Number(element.heightMm || 1), Number(element.topMm || 0) + Number(element.heightMm || 1) + gap)),
                locked: false
            });
            return fitElementInsidePage(copy);
        });
        state.editorElements = state.editorElements.concat(copies);
        state.selectedElementIds = copies.map((item) => item.id);
        markEditorDirty();
        setRightPanelTab('properties');
        renderTemplateEditor(state.editorTemplate);
        renderFieldPalette();
        setStatus('middleStatus', `已向下复制 ${copies.length} 个元素`, 'ok');
    }

    function applySelectedFieldRowRecipe() {
        if (!requireEditorTemplate('middleStatus')) return;
        const element = primarySelectedElement();
        if (!element || element.type !== 'FIELD_TEXT') {
            setStatus('middleStatus', '请选择字段文本元素', 'error');
            return;
        }
        if (element.locked) {
            setStatus('middleStatus', '字段值已锁定，先解锁再整理成行', 'error');
            renderElementInspector();
            return;
        }
        if (!element.fieldName) {
            setStatus('middleStatus', '请先绑定字段，再整理成标题和值', 'error');
            return;
        }
        const pair = fieldValuePairForElement(element);
        if (pair && pair.label) {
            state.selectedElementIds = [pair.label.id, pair.value.id];
            state.inspectorTab = 'batch';
        } else {
            createFieldLabelForSelectedElement();
        }
        if (!selectedLayoutTargetPairs('selected').length) {
            renderTemplateEditor(state.editorTemplate);
            setStatus('middleStatus', '已选中字段值，请补标题后再整理', 'ok');
            return;
        }
        applyFieldLayoutPreset('selected');
    }

    function applyModificationLayoutRecipe(recipe) {
        if (recipe === 'field-row') return applySelectedFieldRowRecipe();
        if (recipe === 'fit-content') return fitSelectedElementToContent();
        if (recipe === 'duplicate-next-row') return duplicateSelectedElementBelow();
        if (recipe === 'normalize') return normalizeSelectedElement();
        setStatus('middleStatus', '未知快速布局方案', 'error');
        return null;
    }

    function wireTemplateModificationPanel() {
        const stepSelect = $('modificationPanelStepMm');
        if (stepSelect) {
            stepSelect.onchange = () => setSnapStepMm(stepSelect.value);
        }
        wireModificationModeTabs();
        wireModificationBindingStrip();
        wireModificationGeometryInputs();
        wireModificationTextStyleStrip();
        Array.prototype.forEach.call(document.querySelectorAll('[data-mod-panel-preset]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyComponentPreset(button.getAttribute('data-mod-panel-preset')));
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-mod-panel-recipe]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => applyModificationLayoutRecipe(button.getAttribute('data-mod-panel-recipe')));
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-mod-panel-action]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => handleTemplateModificationAction(button.getAttribute('data-mod-panel-action')));
        });
    }

    function quickSetElementTextAlign(align) {
        const element = primarySelectedElement();
        if (!element || !elementUsesTextStyle(element)) {
            setStatus('middleStatus', '当前元素不支持文字对齐', 'error');
            return;
        }
        updateSelectedElementField('textAlign', align);
        setStatus('middleStatus', '已更新文字对齐', 'ok');
    }

    function quickMoveSelectedLayer(mode) {
        moveSelectedLayer(mode);
    }

    function wireInspectorQuickEditBar() {
        const bind = (id, action) => {
            if ($(id)) $(id).onclick = () => runAction('middleStatus', action);
        };
        bind('quickDuplicateElementBtn', duplicateSelectedElements);
        bind('quickDeleteElementBtn', deleteSelectedElement);
        bind('quickLockElementBtn', () => toggleSelectedElementLock());
        Array.prototype.forEach.call(document.querySelectorAll('[data-quick-align]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => quickSetElementTextAlign(button.getAttribute('data-quick-align')));
        });
        Array.prototype.forEach.call(document.querySelectorAll('[data-quick-layer]'), (button) => {
            button.onclick = () => runAction('middleStatus', () => quickMoveSelectedLayer(button.getAttribute('data-quick-layer')));
        });
    }

    function modificationPanelMode() {
        const modes = modificationPanelModeOptions().map((item) => item.mode);
        return modes.indexOf(state.modificationPanelMode) >= 0
            ? state.modificationPanelMode
            : 'content';
    }

    function setModificationPanelMode(mode) {
        const modes = modificationPanelModeOptions().map((item) => item.mode);
        const nextMode = modes.indexOf(mode) >= 0 ? mode : suggestedModificationPanelMode(primarySelectedElement());
        const element = primarySelectedElement();
        state.modificationPanelMode = nextMode === 'content' && !elementUsesContentTools(element) ? 'nudge' : nextMode;
        renderElementInspector();
    }

    function renderModificationModeTabs(activeMode) {
        const active = activeMode || modificationPanelMode();
        return `<div class="modificationPanelModeTabs template-modification-mode-tabs modification-focus-modes" id="modificationPanelModeTabs">
            <button type="button" class="${active === 'content' ? 'active' : ''}" data-modification-panel-mode="content">内容</button>
            <button type="button" class="${active === 'nudge' ? 'active' : ''}" data-modification-panel-mode="nudge">位置</button>
            <button type="button" class="${active === 'arrange' ? 'active' : ''}" data-modification-panel-mode="arrange">排列</button>
            <button type="button" class="${active === 'select' ? 'active' : ''}" data-modification-panel-mode="select">选择</button>
        </div>`;
    }

    function modificationIntentSuggestions(element) {
        if (!element) return [];
        const suggestions = [];
        const seen = {};
        const add = (action, title, detail, primary) => {
            if (!action || seen[action]) return;
            seen[action] = true;
            suggestions.push({
                action: action,
                title: title,
                detail: detail,
                primary: primary || suggestions.length === 0
            });
        };
        if (element.locked) {
            add('lock', '解锁编辑', '恢复拖拽和修改', true);
            return suggestions;
        }
        if (elementExceedsPage(element)) {
            add('fit-page', '放回页面', '避免打印裁切', true);
        }
        if (elementUsesFieldBinding(element) && !element.fieldName) {
            add('bind-first-required', '绑定字段', '优先匹配必填', true);
        }
        if (element.type === 'FIELD_TEXT' && element.fieldName) {
            const hasLabel = !!fieldLabelElementForValue(element, true);
            add('create-field-row', hasLabel ? '整理字段行' : '补标题成行', hasLabel ? '标题和值对齐' : '生成标题和值', !suggestions.length);
        }
        if (elementUsesTextStyle(element)) {
            add('fit-content-width', '适配内容', '按样例调宽', !suggestions.length);
        }
        const preset = componentPresetsForElement(element)[0];
        if (preset) {
            add('normalize-component', '推荐规格', preset.label || '套用常用尺寸', !suggestions.length);
        }
        add('duplicate-below', '复制下一行', '保持样式续排', !suggestions.length);
        return suggestions.slice(0, 3);
    }

    function modificationWorkflowSuggestions(element) {
        return modificationIntentSuggestions(element);
    }

    function renderModificationIntentActions(element, disabled) {
        const suggestions = modificationIntentSuggestions(element);
        if (!suggestions.length) return '';
        const renderButton = (item) => {
            const content = `<strong>${escapeHtml(item.title)}</strong><span>${escapeHtml(item.detail)}</span>`;
            const buttonClass = item.primary ? ' class="primary"' : '';
            const disabledAttr = disabled && item.action !== 'lock' ? 'disabled' : '';
            if (item.action === 'fit-content-width') {
                return `<button type="button"${buttonClass} data-mod-panel-action="fit-content-width" ${disabledAttr}>${content}</button>`;
            }
            if (item.action === 'normalize-component') {
                return `<button type="button"${buttonClass} data-mod-panel-action="normalize-component" ${disabledAttr}>${content}</button>`;
            }
            if (item.action === 'duplicate-below') {
                return `<button type="button"${buttonClass} data-mod-panel-action="duplicate-below" ${disabledAttr}>${content}</button>`;
            }
            if (item.action === 'create-field-row') {
                return `<button type="button"${buttonClass} data-mod-panel-action="create-field-row" ${disabledAttr}>${content}</button>`;
            }
            return `<button type="button"${buttonClass} data-mod-panel-action="${escapeHtml(item.action)}" ${disabledAttr}>${content}</button>`;
        };
        return `<div class="modificationIntentActions modificationWorkflowRail modification-intent-actions" id="modificationIntentActions">
            <div class="modification-intent-head">
                <strong>推荐动作</strong>
                <span>${escapeHtml(elementLabel(element))}</span>
            </div>
            <div class="modification-intent-grid">
                ${suggestions.map(renderButton).join('')}
            </div>
        </div>`;
    }

    function modificationQuickAdjustSummary(element) {
        if (!element) return '选择元素后可快调位置和尺寸';
        return `X ${element.leftMm || 0} / Y ${element.topMm || 0} / W ${element.widthMm || 0} / H ${element.heightMm || 0} mm`;
    }

    function renderModificationQuickAdjustStrip(element, disabled) {
        if (!element) return '';
        const disabledAttr = disabled ? 'disabled' : '';
        return `<div class="modificationQuickAdjustStrip modification-quick-adjust-strip" id="modificationQuickAdjustStrip">
            <div class="modification-quick-adjust-head">
                <strong>常用调整</strong>
                <span>${escapeHtml(modificationQuickAdjustSummary(element))}</span>
            </div>
            <div class="modification-quick-adjust-controls">
                <button type="button" data-mod-panel-action="nudge-left" title="左移" ${disabledAttr}>&#8592;</button>
                <button type="button" data-mod-panel-action="nudge-up" title="上移" ${disabledAttr}>&#8593;</button>
                <button type="button" data-mod-panel-action="nudge-down" title="下移" ${disabledAttr}>&#8595;</button>
                <button type="button" data-mod-panel-action="nudge-right" title="右移" ${disabledAttr}>&#8594;</button>
                <button type="button" data-mod-panel-action="shrink-width" ${disabledAttr}>W-</button>
                <button type="button" data-mod-panel-action="grow-width" ${disabledAttr}>W+</button>
                <button type="button" data-mod-panel-action="shrink-height" ${disabledAttr}>H-</button>
                <button type="button" data-mod-panel-action="grow-height" ${disabledAttr}>H+</button>
                <button type="button" data-mod-panel-action="fit-page" ${disabledAttr}>页面内</button>
                <button type="button" data-mod-panel-action="page-center-middle" ${disabledAttr}>居中</button>
                <button type="button" data-mod-panel-action="save">保存</button>
                <button type="button" class="primary" data-mod-panel-action="save-preview">保存预览</button>
            </div>
        </div>`;
    }

    function renderModificationWorkflowRail(element, disabled) {
        return renderModificationIntentActions(element, disabled);
    }

    function modificationSectionAttrs(sectionId, activeMode) {
        const hidden = sectionId === activeMode ? '' : 'hidden';
        if (sectionId === 'content') {
            return `class="template-modification-section template-modification-section-content" data-modification-section="content" ${hidden}`;
        }
        if (sectionId === 'nudge') {
            return `class="template-modification-section template-modification-section-nudge" data-modification-section="nudge" ${hidden}`;
        }
        if (sectionId === 'arrange') {
            return `class="template-modification-section template-modification-section-arrange" data-modification-section="arrange" ${hidden}`;
        }
        if (sectionId === 'select') {
            return `class="template-modification-section template-modification-section-select" data-modification-section="select" ${hidden}`;
        }
        return `class="template-modification-section" data-modification-section="${escapeHtml(sectionId)}" ${hidden}`;
    }

    function renderModificationPresetChips(element, disabled) {
        const presets = componentPresetsForElement(element).slice(0, 2);
        if (!presets.length) return '';
        const disabledAttr = disabled ? 'disabled' : '';
        return `<div class="modificationPresetChips modification-preset-chips" id="modificationPresetChips">
            ${presets.map((preset) => `<button type="button" data-mod-panel-preset="${escapeHtml(preset.key)}" ${disabledAttr}>
                <strong>${escapeHtml(preset.label)}</strong>
                <span>${escapeHtml(preset.description)}</span>
            </button>`).join('')}
        </div>`;
    }

    function renderModificationPrimaryActions(element, disabled) {
        const disabledAttr = disabled ? 'disabled' : '';
        const fieldLayoutDisabledAttr = disabled || !selectedLayoutTargetPairs('selected').length ? 'disabled' : '';
        return `<div class="modificationPrimaryActions modification-primary-actions" id="modificationPrimaryActions">
            <button type="button" data-mod-panel-action="page-center-middle" ${disabledAttr}>
                <strong>居中页面</strong>
                <span>水平+垂直</span>
            </button>
            <button type="button" data-mod-panel-action="fit-page" ${disabledAttr}>
                <strong>页面内</strong>
                <span>修正越界</span>
            </button>
            <button type="button" data-mod-panel-action="tidy-selected-fields" ${fieldLayoutDisabledAttr}>
                <strong>整理字段</strong>
                <span>套用版式</span>
            </button>
            <button type="button" class="primary" data-mod-panel-action="save">
                <strong>保存</strong>
                <span>Ctrl+S</span>
            </button>
        </div>`;
    }

    function renderModificationStyleActions(element, disabled) {
        const copyDisabledAttr = element ? '' : 'disabled';
        const pasteDisabledAttr = disabled || !state.styleClipboard ? 'disabled' : '';
        return `<div class="modificationStyleActions modification-style-actions" id="modificationStyleActions">
            <button type="button" data-mod-panel-action="copy-style" ${copyDisabledAttr}>复制样式</button>
            <button type="button" data-mod-panel-action="paste-style" ${pasteDisabledAttr}>粘贴样式</button>
        </div>`;
    }

    function renderModificationBindingStrip(element, disabled) {
        if (!element) return '';
        const disabledAttr = disabled ? 'disabled' : '';
        if (['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) >= 0) {
            const source = fieldSourceByName(element.fieldName);
            const sample = source && source.value ? source.value : '暂无样例值';
            return `<div class="modificationBindingStrip modification-binding-strip" id="modificationBindingStrip">
                <label for="modPanelFieldSelect">字段绑定
                    <select id="modPanelFieldSelect" ${disabledAttr}>${fieldOptions(element.fieldName)}</select>
                </label>
                <span class="sample-value">${escapeHtml(sample)}</span>
                ${renderModificationBindingQuickChips(element, disabled)}
            </div>`;
        }
        if (element.type === 'STATIC_TEXT') {
            return `<div class="modificationBindingStrip modification-binding-strip" id="modificationBindingStrip">
                <label for="modPanelTextInput">文本内容
                    <input id="modPanelTextInput" value="${escapeHtml(element.text || '')}" ${disabledAttr}>
                </label>
            </div>`;
        }
        return '';
    }

    function wireModificationBindingStrip() {
        if ($('modPanelFieldSelect')) {
            $('modPanelFieldSelect').onchange = () => updateSelectedElementField('fieldName', $('modPanelFieldSelect').value);
        }
        if ($('modPanelTextInput')) {
            $('modPanelTextInput').oninput = () => runAction('middleStatus', () => updateSelectedElementFieldLive('text', $('modPanelTextInput').value));
            $('modPanelTextInput').onchange = () => updateSelectedElementField('text', $('modPanelTextInput').value);
        }
        wireModificationBindingQuickChips();
    }

    function wireModificationBindingQuickChips() {
        Array.prototype.forEach.call(document.querySelectorAll('[data-mod-panel-bind-field]'), (button) => {

    function fieldBindingCandidates(element) {
        if (!element || ['FIELD_TEXT', 'BARCODE', 'QRCODE'].indexOf(element.type) < 0) return [];
        const term = fieldBindingSearchTerm();
        const currentFieldName = element.fieldName || '';
        const defaultFieldName = defaultFieldNameForType(element.type);
        const byName = {};
        state.fieldContract.forEach((item) => {
            if (item && item.fieldName) byName[item.fieldName] = item;
        });
        if (currentFieldName && !byName[currentFieldName]) {
            byName[currentFieldName] = {fieldName: currentFieldName, displayName: fieldDisplayName(currentFieldName), category: ''};
        }
        const candidates = Object.keys(byName).map((fieldName) => byName[fieldName]).filter((item) => {
            if (term) return fieldMatchesSearch(item, term);
            return item.fieldName === currentFieldName
                || item.fieldName === defaultFieldName
                || commonFieldNames.indexOf(item.fieldName) >= 0;
        });
        return candidates.sort((a, b) => {
            const score = (item) => {
                if (item.fieldName === currentFieldName) return 0;
                if (item.fieldName === defaultFieldName) return 1;
                const commonIndex = commonFieldNames.indexOf(item.fieldName);
                if (commonIndex >= 0) return 10 + commonIndex;
                return 50 + String(item.displayName || item.fieldName).localeCompare('');
            };
            const scoreDelta = score(a) - score(b);
            if (scoreDelta) return scoreDelta;
            return String(a.displayName || a.fieldName).localeCompare(String(b.displayName || b.fieldName));
        }).slice(0, term ? 12 : 8);
    }

            const active = element && item.fieldName === element.fieldName;
            return `<button type="button" class="field-binding-option ${active ? 'active' : ''}" data-bind-field="${escapeHtml(item.fieldName)}" ${disabledAttr}>
                <strong>${escapeHtml(item.displayName || item.fieldName)}</strong>

        const preset = $('layoutPresetSelect') ? $('layoutPresetSelect').value : 'two-column';
