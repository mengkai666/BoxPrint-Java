<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模板维护中心</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #172026;
            --muted: #5d6975;
            --line: #d8dee5;
            --panel: #fff;
            --bg: #f3f5f7;
            --accent: #0f766e;
            --accent-dark: #0a5e58;
            --danger: #b42318;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
        }
        header {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding: 0 22px;
            background: #111827;
            color: #fff;
        }
        h1 { margin: 0; font-size: 18px; letter-spacing: 0; }
        header a { color: #d1fae5; text-decoration: none; }
        .header-left {
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .workspace-mode-switcher {
            display: grid;
            grid-template-columns: repeat(4, auto);
            gap: 4px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, .16);
            border-radius: 6px;
            background: rgba(255, 255, 255, .06);
        }
        .workspace-mode-switcher button {
            height: 28px;
            border-color: transparent;
            padding: 0 9px;
            background: transparent;
            color: #cbd5e1;
            white-space: nowrap;
        }
        .workspace-mode-switcher button:hover {
            border-color: rgba(255, 255, 255, .24);
            background: rgba(255, 255, 255, .08);
            color: #fff;
        }
        .workspace-mode-switcher button.active {
            border-color: #fff;
            background: #fff;
            color: var(--accent-dark);
            font-weight: 650;
        }
        main {
            display: grid;
            grid-template-columns: minmax(300px, 360px) minmax(520px, 1fr) minmax(340px, 420px);
            gap: 12px;
            padding: 12px;
            min-height: calc(100vh - 56px);
        }
        main.template-workbench {
            grid-template-columns: minmax(270px, 310px) minmax(680px, 1fr) minmax(310px, 370px);
            height: calc(100vh - 56px);
            min-height: 660px;
        }
        main.template-workbench.template-workbench-mode-balanced {
            grid-template-columns: minmax(270px, 310px) minmax(680px, 1fr) minmax(310px, 370px);
        }
        main.template-workbench.template-workbench-mode-fields {
            grid-template-columns: minmax(300px, 360px) minmax(700px, 1fr);
        }
        main.template-workbench.template-workbench-mode-inspect {
            grid-template-columns: minmax(700px, 1fr) minmax(320px, 390px);
        }
        main.template-workbench.template-workbench-mode-canvas,
        main.template-workbench.template-workbench-focus {
            grid-template-columns: minmax(680px, 1fr);
        }
        .template-workbench-mode-canvas .resource-sidebar,
        .template-workbench-mode-canvas .inspector-sidebar,
        .template-workbench-focus .resource-sidebar,
        .template-workbench-focus .inspector-sidebar {
            display: none;
        }
        .template-workbench-mode-fields .inspector-sidebar,
        .template-workbench-mode-inspect .resource-sidebar {
            display: none;
        }
        section {
            min-width: 0;
            min-height: 0;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .section-title {
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            border-bottom: 1px solid var(--line);
            background: #fafbfc;
            font-weight: 650;
        }
        .body { padding: 12px; overflow: auto; }
        .template-workbench .body { min-height: 0; }
        .resource-sidebar .body, .inspector-sidebar .body {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .canvasWorkspace .body {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 10px;
            overflow: hidden;
        }
        .panel-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            padding: 10px 12px;
            border-bottom: 1px solid var(--line);
            background: #fafbfc;
        }
        .panel-tabs button {
            width: 100%;
            padding: 0 8px;
            background: #fff;
        }
        .panel-tabs button.active {
            border-color: var(--accent);
            background: #e8f5f3;
            color: var(--accent-dark);
            font-weight: 650;
        }
        .right-tabs { grid-template-columns: repeat(2, 1fr); }
        .tab-panel { display: none; min-height: 0; overflow: auto; }
        .tab-panel.active { display: block; }
        .resource-sidebar .tab-panel, .inspector-sidebar .tab-panel { flex: 1; }
        .right-tab-body { padding: 0; overflow: hidden; }
        .right-tab-body .tab-panel { height: 100%; padding: 14px; }
        label { display: block; margin-bottom: 5px; color: var(--muted); font-size: 12px; }
        input, select, textarea {
            width: 100%;
            border: 1px solid #c6ccd3;
            border-radius: 4px;
            padding: 0 9px;
            background: #fff;
            font: inherit;
        }
        input, select { height: 34px; }
        textarea { min-height: 70px; padding-top: 8px; resize: vertical; }
        button {
            height: 34px;
            border: 1px solid #b8c0c8;
            border-radius: 4px;
            padding: 0 11px;
            background: #fff;
            color: var(--ink);
            font: inherit;
            cursor: pointer;
            transition: border-color .16s ease, background .16s ease, color .16s ease, transform .08s ease;
        }
        button:hover { border-color: #94a3b8; background: #f8fafc; }
        button:active { transform: translateY(1px); }
        button:disabled { opacity: .48; cursor: not-allowed; transform: none; }
        button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
            outline: 2px solid rgba(15, 118, 110, .28);
            outline-offset: 1px;
            border-color: var(--accent);
        }
        button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        button.primary:hover { background: var(--accent-dark); }
        button.active-toggle {
            border-color: var(--accent);
            background: #e8f5f3;
            color: var(--accent-dark);
            font-weight: 650;
        }
        .field { margin-bottom: 11px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 12px; }
        .tool-strip { display: grid; gap: 8px; }
        .toolbar-mode-shell {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: center;
            padding: 7px 8px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
        }
        .toolbar-mode-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .toolbar-mode-tabs button {
            height: 28px;
            padding: 0 10px;
            white-space: nowrap;
        }
        .toolbar-mode-tabs button.active {
            border-color: var(--accent);
            background: #e8f5f3;
            color: var(--accent-dark);
            font-weight: 650;
        }
        .toolbar-mode-summary {
            min-width: 0;
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toolbar-panel { display: none !important; }
        .tool-group.toolbar-panel-active { display: grid !important; }
        .quick-context-bar.toolbar-panel-active { display: flex !important; }
        .tool-group {
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            padding: 7px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fafbfc;
        }
        .tool-group-title {
            padding-top: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .tool-group .actions { margin: 0; gap: 6px; }
        .tool-group button { height: 30px; padding: 0 9px; }
        .tool-group .inline-control input { width: auto; height: auto; }
        .tool-group .inline-control select { height: 30px; }
        .layout-assistant-panel {
            display: inline-flex;
            min-width: min(100%, 520px);
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            padding: 5px 6px;
            border: 1px solid #d9e2e8;
            border-radius: 5px;
            background: #fff;
        }
        .layout-assistant-panel .inline-control select {
            min-width: 112px;
        }
        .layout-assistant-panel button {
            height: 28px;
        }
        .layout-assistant-hint {
            flex: 1 1 160px;
            min-width: 140px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.3;
        }
        .quick-context-bar {
            grid-column: 1 / -1;
            min-height: 36px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 8px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
        }
        .quick-context-bar button { height: 28px; padding: 0 9px; }
        .quick-select-control {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }
        .quick-select-control select {
            width: auto;
            min-width: 104px;
            height: 28px;
            padding: 0 7px;
        }
        .selection-quick-summary {
            flex: 1 1 260px;
            min-width: 220px;
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .editor-commit-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fafbfc;
        }
        .editor-commit-bar .actions { margin: 0; }
        .editor-commit-status { min-width: 0; color: var(--muted); font-size: 12px; }
        .list { border: 1px solid var(--line); border-radius: 4px; overflow: hidden; background: #fff; }
        .template-item, .field-item, .layer-item {
            width: 100%;
            height: auto;
            border: 0;
            border-bottom: 1px solid var(--line);
            border-radius: 0;
            display: grid;
            gap: 4px;
            align-content: center;
            text-align: left;
            min-height: 52px;
            padding: 8px 10px;
        }
        .layer-item { cursor: pointer; grid-template-columns: minmax(0, 1fr) auto; align-items: center; }
        .layer-item strong,
        .layer-item .muted { min-width: 0; }
        .layer-item-main { display: grid; gap: 4px; min-width: 0; }
        .layer-quick-actions {
            display: inline-flex;
            gap: 5px;
            justify-self: end;
            align-items: center;
        }
        .layer-quick-actions button {
            width: 30px;
            height: 28px;
            padding: 0;
            display: grid;
            place-items: center;
            font-size: 12px;
        }
        .template-item .muted, .field-item .muted, .layer-item .muted {
            line-height: 1.35;
            overflow-wrap: anywhere;
        }
        .template-item:last-child, .field-item:last-child, .layer-item:last-child { border-bottom: 0; }
        .template-item.active, .field-item.active, .layer-item.active { background: #e8f5f3; border-left: 3px solid var(--accent); }
        .muted { color: var(--muted); font-size: 12px; }
        .field-contract-groups { display: grid; gap: 8px; }
        .field-group { border: 1px solid var(--line); border-radius: 4px; overflow: hidden; background: #fff; }
        .field-group:not([open]) { background: #fbfcfd; }
        .field-group summary { cursor: pointer; padding: 8px 10px; background: #f7f9fa; font-weight: 650; }
        .field-group .field-item strong { font-weight: 650; }
        .field-group .field-item .muted { color: #7a8490; }
        .field-item .sample-value { color: #0f766e; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .source-status { display: inline-flex; width: fit-content; min-height: 20px; align-items: center; border-radius: 3px; padding: 0 6px; font-size: 11px; background: #edf2f7; color: #475569; }
        .source-status.status-ok { background: #dcfce7; color: #166534; }
        .source-status.status-fallback { background: #fef3c7; color: #92400e; }
        .source-status.status-missing { background: #fee2e2; color: #991b1b; }
        .editor-tools {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 8px;
            align-items: stretch;
        }
        .toolbar-row { align-items: center; }
        .inline-control { display: inline-flex; align-items: center; gap: 6px; margin: 0; color: var(--muted); font-size: 12px; }
        .inline-control select { width: auto; min-width: 86px; }
        .mode-switch { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
        .mode-switch button { width: 100%; padding: 0 8px; }
        .mode-switch button.active { border-color: var(--accent); background: #e8f5f3; color: var(--accent-dark); font-weight: 650; }
        .palette-options { display: flex; justify-content: space-between; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
        .palette-options label { margin: 0; display: inline-flex; align-items: center; gap: 6px; }
        .palette-options input { width: auto; height: auto; }
        .field-library-list-controls-hidden .field-list-filter-tabs,
        .field-library-list-controls-hidden .field-list-option {
            display: none;
        }
        .field-library-list-controls-hidden .field-library-options {
            justify-content: space-between;
            padding: 6px 8px;
            border: 1px solid #d8eee9;
            border-radius: 4px;
            background: #f7fbfa;
        }
        .field-library-list-controls-hidden .field-insert-option {
            flex: 1 1 auto;
        }
        .density-control select { min-width: 72px; height: 28px; }
        .palette-summary { color: var(--muted); font-size: 12px; }
        .page-preset-strip {
            display: grid;
            gap: 6px;
            margin-bottom: 11px;
            padding: 9px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fbfcfd;
        }
        .page-preset-controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
        }
        .page-preset-controls button { white-space: nowrap; }
        .template-basics-card {
            margin-top: 12px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
            overflow: hidden;
        }
        .template-basics-summary {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            background: #fbfcfd;
        }
        .template-basics-summary strong {
            display: block;
            margin-bottom: 3px;
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-basics-summary button { white-space: nowrap; }
        .template-summary-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            padding: 8px 10px;
            border-top: 1px solid var(--line);
            background: #fff;
        }
        .template-summary-metric {
            min-width: 0;
            padding: 6px;
            border: 1px solid #edf1f5;
            border-radius: 4px;
            background: #fafbfc;
        }
        .template-summary-metric span {
            display: block;
            color: var(--muted);
            font-size: 11px;
        }
        .template-summary-metric strong {
            display: block;
            margin-top: 2px;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-settings-panel {
            display: grid;
            gap: 10px;
            padding: 10px;
            border-top: 1px solid var(--line);
            background: #fff;
        }
        .template-settings-panel.collapsed { display: none; }
        .template-settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .template-settings-grid .field { margin-bottom: 0; }
        .template-settings-grid .wide { grid-column: 1 / -1; }
        .template-edit-actions {
            margin: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .template-edit-actions button { width: 100%; }
        .template-edit-actions .wide { grid-column: 1 / -1; }
        .field-quick-action-hint {
            min-height: 26px;
            display: flex;
            align-items: center;
            margin: -2px 0 8px;
            padding: 0 8px;
            border: 1px solid var(--line);
            border-radius: 4px;
            background: #fbfcfd;
            color: var(--muted);
            font-size: 12px;
        }
        .field-library-view-switcher {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            margin-bottom: 8px;
        }
        .field-library-quick-panel {
            display: grid;
            gap: 7px;
            margin-bottom: 8px;
            padding: 8px;
            border: 1px solid #d8eee9;
            border-radius: 5px;
            background: #f7fbfa;
        }
        .field-library-quick-panel[hidden] { display: none; }
        .field-library-quick-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
        }
        .field-library-quick-metrics span {
            min-width: 0;
            padding: 6px;
            border: 1px solid #d8eee9;
            border-radius: 4px;
            background: #fff;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.25;
        }
        .field-library-quick-metrics strong {
            display: block;
            margin-top: 2px;
            color: var(--ink);
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .field-library-quick-actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
        }
        .field-library-quick-actions button {
            height: 30px;
            min-width: 0;
            padding: 0 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .field-usage-digest {
            display: grid;
            gap: 7px;
            margin-bottom: 8px;
            padding: 8px;
            border: 1px solid #d8dee5;
            border-radius: 5px;
            background: #fff;
        }
        .field-usage-digest[hidden] { display: none; }
        .field-usage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .field-usage-head strong { font-size: 12px; font-weight: 650; }
        .field-usage-head span {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .field-coverage-meter {
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            background: #edf2f7;
        }
        .field-coverage-meter span {
            display: block;
            height: 100%;
            width: 0;
            background: var(--accent);
        }
        .field-usage-metrics {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
        }
        .field-usage-metrics span {
            min-width: 0;
            padding: 6px;
            border: 1px solid #edf1f5;
            border-radius: 4px;
            background: #fafbfc;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.25;
        }
        .field-usage-metrics strong {
            display: block;
            margin-top: 2px;
            color: var(--ink);
            font-size: 13px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .field-usage-actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
        }
        .field-usage-actions button {
            height: 30px;
            min-width: 0;
            padding: 0 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-starter-recipes {
            display: grid;
            gap: 7px;
            margin-bottom: 8px;
            padding: 8px;
            border: 1px solid #d8eee9;
            border-radius: 5px;
            background: #f7fbfa;
        }
        .template-starter-recipes[hidden] { display: none; }
        .template-starter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .template-starter-head strong { font-size: 12px; font-weight: 650; }
        .template-starter-head span {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
        }
        .template-starter-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }
        .template-starter-recipe {
            min-width: 0;
            min-height: 58px;
            display: grid;
            align-content: center;
            gap: 2px;
            padding: 7px;
            background: #fff;
            text-align: left;
        }
        .template-starter-recipe strong {
            color: var(--ink);
            font-size: 12px;
            font-weight: 650;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-starter-recipe span {
            color: var(--muted);
            font-size: 10px;
            line-height: 1.25;
        }
        .template-starter-recipe:not(:disabled):hover {
            border-color: var(--accent);
            background: #f0fdfa;
        }
        .field-library-view-quick .field-contract-groups[hidden],
        .field-library-view-list .field-contract-groups[hidden] {
            display: none;
        }
        .field-assistant-mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 5px;
            margin: 8px 0;
        }
        .field-assistant-mode-tabs[hidden] { display: none; }
        .field-assistant-mode-tabs button {
            height: 29px;
            min-width: 0;
            padding: 0 6px;
            background: #fff;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .field-assistant-mode-tabs button.active {

        }
        .template-modification-footer {
            border-top: 1px solid #d8eee9;
            padding-top: 8px;
        }
        .template-modification-row {
            display: grid;
            grid-template-columns: 42px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
        }
        .templateModificationPanel .template-modification-row {
            display: none;
        }
        .templateModificationPanel .template-modification-section .template-modification-row {
            display: grid;
        }
        .templateModificationPanel.modification-mode-nudge .template-modification-section-nudge,
        .templateModificationPanel.modification-mode-content .template-modification-section-content,
        .templateModificationPanel.modification-mode-arrange .template-modification-section-arrange,
        .templateModificationPanel.modification-mode-select .template-modification-section-select,
        .templateModificationPanel .template-modification-section-always {
            display: grid;
        }
        .templateModificationPanel.modification-mode-content .template-modification-row:has([data-mod-panel-action="bind-first-required"]),
        .templateModificationPanel.modification-mode-content .template-modification-row:has([data-mod-panel-action="font-size-10"]),
        .templateModificationPanel.modification-mode-nudge .template-modification-row:has([data-mod-panel-action="nudge-up"]),
        .templateModificationPanel.modification-mode-nudge .template-modification-row:has([data-mod-panel-action="grow-width"]),
        .templateModificationPanel.modification-mode-arrange .template-modification-row:has([data-mod-panel-action="page-center"]),
        .templateModificationPanel.modification-mode-arrange .template-modification-row:has([data-mod-panel-action="text-center"]),
        .templateModificationPanel.modification-mode-arrange .template-modification-row:has([data-mod-panel-action="layer-up"]),
        .templateModificationPanel.modification-mode-select .template-modification-row:has([data-mod-panel-action="select-same-type"]),
        .templateModificationPanel .template-modification-row:has([data-mod-panel-action="save"]) {
            display: grid;
        }
        .template-modification-label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .template-modification-actions,
        .template-modification-grid,
        .template-modification-pad {
            display: grid;
            gap: 5px;
        }
        .template-modification-actions {
            grid-template-columns: repeat(4, minmax(0, 1fr));
        }
        .template-modification-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .template-modification-pad {
            grid-template-columns: repeat(3, 32px);
            justify-content: start;
        }
        .template-modification-actions button,
        .template-modification-grid button,
        .template-modification-pad button {
            height: 30px;
            min-width: 0;
            padding: 0 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-modification-pad span {
            width: 32px;
            height: 30px;
        }
        .template-modification-actions button.active,
        .template-modification-grid button.active {
            border-color: var(--accent);
            background: #e8f5f3;
            color: var(--accent-dark);
            font-weight: 650;
        }
        .complete-inspector-details {
            margin-bottom: 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
            overflow: hidden;
        }
        .complete-inspector-details > summary {
            min-height: 38px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            cursor: pointer;
            padding: 9px 10px;
            background: #fbfcfd;
            color: var(--ink);
            list-style: none;
        }
        .complete-inspector-details > summary::-webkit-details-marker { display: none; }
        .complete-inspector-details > summary strong {
            min-width: 0;
            overflow: hidden;
            font-size: 13px;
            font-weight: 650;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .complete-inspector-details > summary span {
            color: var(--muted);
            font-size: 11px;
            white-space: nowrap;
        }
        .complete-inspector-details > summary span::after {
            content: "展开";
        }
        .complete-inspector-details[open] > summary span::after {
            content: "收起";
        }
        .complete-inspector-details .inspector-mode-tabs {
            margin: 10px 10px 8px;
        }
        .complete-inspector-details .inspector-section,
        .complete-inspector-details .inspector-advanced-details,
        .complete-inspector-details .inspector-actions {
            margin-left: 10px;
            margin-right: 10px;
        }
        .inspector-advanced-details {
            margin-bottom: 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
            overflow: hidden;
        }
        .inspector-advanced-details > summary {
            cursor: pointer;
            padding: 9px 10px;
            background: #fbfcfd;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .inspector-advanced-details > .inspector-section {
            margin: 0;
            border: 0;
            border-top: 1px solid var(--line);
            border-radius: 0;
        }
        .inspector-save-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 0 0 10px;
            padding: 8px 10px;
            border: 1px solid #cfe7e3;
            border-radius: 5px;
            background: #f1faf8;
        }
        .inspector-save-strip button { height: 30px; padding: 0 10px; }
        .save-shortcut-hint {
            min-width: 0;
            color: var(--accent-dark);
            font-size: 12px;
        }
        .save-readiness-strip {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
            padding: 9px 10px;
            border: 1px solid #d8eee9;
            border-radius: 5px;
            background: #f7fbfa;
        }
        .save-readiness-strip[data-save-readiness="dirty"] {
            border-color: #f2d28b;
            background: #fff8e7;
        }
        .save-readiness-copy {
            min-width: 0;
            display: grid;
            gap: 2px;
        }
        .save-readiness-copy strong {
            min-width: 0;
            overflow: hidden;
            font-size: 13px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .save-readiness-copy span {
            min-width: 0;
            overflow: hidden;
            color: var(--muted);
            font-size: 11px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .save-readiness-actions {
            display: inline-flex;
            gap: 6px;
        }
        .save-readiness-actions button {
            height: 30px;
            padding: 0 9px;
            white-space: nowrap;
        }
        .inspector-mode-tabs {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 6px;
            margin: 0 0 10px;
        }
        .inspector-mode-tabs button {
            height: 30px;
            padding: 0 6px;
            background: #fff;
        }
        .inspector-mode-tabs button.active {
            border-color: var(--accent);
            background: #e8f5f3;
            color: var(--accent-dark);
            font-weight: 650;
        }
        .inspector-section {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fff;
        }
        .inspector-section-title {
            margin-bottom: 9px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 650;
        }
        .inspector-section[hidden] { display: none; }
        .inspector-section .field:last-child { margin-bottom: 0; }
        .inspector-actions { align-items: center; margin-top: 0; }
        .geometry-quick-actions { margin: 8px 0 0; }
        .component-preset-panel {
            display: grid;
            gap: 7px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #d8eee9;
            border-radius: 5px;
            background: #f7fcfb;
        }
        .component-preset-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: var(--accent-dark);
            font-size: 12px;
            font-weight: 650;
        }
        .component-preset-title span {
            color: var(--muted);
            font-weight: 500;
        }
        .component-preset-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }
        .component-preset-grid button {
            height: auto;
            min-height: 42px;
            display: grid;
            align-content: center;
            gap: 2px;
            padding: 6px 7px;
            text-align: left;
            background: #fff;
        }
        .component-preset-grid button strong {
            color: var(--ink);
            font-size: 12px;
            font-weight: 650;
            line-height: 1.2;
        }
        .component-preset-grid button span {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        .geometry-nudge-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            margin: 8px 0 0;
        }
        .geometry-nudge-grid button,
        .geometry-nudge-grid span {
            height: 30px;
        }
        .geometry-nudge-grid button { padding: 0 6px; }
        .page-align-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
        }
        .page-align-grid button { height: 30px; padding: 0 6px; }
        .size-match-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            width: 100%;
            margin-top: 8px;
        }
        .size-match-actions button { height: 30px; padding: 0 6px; }
        .batch-edit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .batch-edit-actions { margin-bottom: 0; }
        .template-health-panel:empty { display: none; }
        .template-health-panel {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 5px;
            background: #fbfcfd;
        }
        .template-health-summary {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
            color: var(--muted);
            font-size: 12px;
        }
        .template-health-summary-main {
            min-width: 0;
            display: grid;
            gap: 2px;
        }
        .template-health-summary-main span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .template-health-summary strong { color: var(--ink); font-weight: 650; }
        .template-health-details-toggle {
            height: 28px;
            padding: 0 9px;
            background: #fff;
            white-space: nowrap;
        }
        .template-health-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
            gap: 6px;
        }
        .template-health-actions button {
            height: 30px;
            padding: 0 9px;
            justify-content: center;
        }
        .template-health-actions .template-health-action-select {
            background: #fff;
            color: #334155;
        }
        .template-health-actions .template-health-action-fix {
            border-color: rgba(15, 118, 110, .38);
            background: rgba(15, 118, 110, .08);
            color: var(--accent-dark);
            font-weight: 650;
        }
        .template-health-actions .template-health-action-primary-fix {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
            font-weight: 650;
        }
        .template-health-actions .template-health-action-primary-fix:hover {
            border-color: var(--accent-dark);
            background: var(--accent-dark);
        }
        .templateIssueNavigator { margin-top: -2px; }
        .template-health-list { display: grid; gap: 6px; }
        .template-health-details-collapsed .template-health-list { display: none; }
        .template-health-item {
            width: 100%;
            height: auto;
            min-height: 30px;
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            gap: 8px;
            align-items: center;
            padding: 6px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background: #fff;
            text-align: left;
            color: var(--ink);
        }
        .template-health-item.issue-error { border-color: #fecaca; background: #fff7f7; }
        .template-health-item.issue-warning { border-color: #fde68a; background: #fffbeb; }
        .template-health-severity {
            width: fit-content;
            border-radius: 3px;
            padding: 2px 6px;
            background: #e2e8f0;
            color: #475569;
            font-size: 11px;
        }
        .issue-error .template-health-severity { background: #fee2e2; color: #991b1b; }
        .issue-warning .template-health-severity { background: #fef3c7; color: #92400e; }
        .inspector-empty {
            display: grid;
            gap: 6px;
            padding: 14px;
            border: 1px dashed #cbd5df;
            border-radius: 5px;
            background: #f8fafc;
            color: var(--muted);
            font-size: 12px;
        }
        .inspector-empty strong { color: var(--ink); font-size: 13px; }
        .empty-inspector-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            margin-top: 4px;
        }
        .empty-inspector-actions button {
            min-width: 0;
            height: 32px;
            padding: 0 8px;
        }
        .empty-inspector-actions .wide {
            grid-column: 1 / -1;
        }
        .empty-template-starters {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
        }
        .empty-template-starters button {
            min-width: 0;
            height: auto;
            min-height: 34px;
            padding: 6px 8px;
            text-align: left;
        }
        .empty-inspector-meta {
            color: var(--muted);
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }
        .multi-selection-inspector { display: grid; gap: 10px; }
        .multi-selection-list { display: grid; gap: 6px; }
        .multi-selection-list span {
            display: block;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--muted);
            font-size: 12px;
        }
        .layer-item.locked strong,
        .layer-item.locked .muted { color: #64748b; }
        .layer-lock-badge { margin-left: 6px; color: #64748b; font-size: 11px; font-weight: 500; }
        .binding-cards { display: grid; gap: 8px; margin-bottom: 12px; }
        .binding-card { border: 1px solid var(--line); border-radius: 4px; padding: 9px; background: #fbfcfd; display: grid; gap: 5px; }
        .binding-card strong { font-weight: 650; }
        .binding-card .sample-value { color: #0f766e; font-size: 13px; overflow-wrap: anywhere; }
        .field-binding-quick {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        .field-binding-quick input {
            height: 32px;
        }
        .field-binding-quick-fields {
            display: grid;
            gap: 6px;
            max-height: 220px;
            overflow: auto;
            padding-right: 2px;
        }
        .field-binding-option {
            width: 100%;
            height: auto;
            min-height: 42px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px 8px;
            align-items: center;
            padding: 7px 8px;
            text-align: left;
            background: #fff;
        }
        .field-binding-option strong {
            overflow: hidden;
            color: var(--ink);
            font-size: 12px;
            font-weight: 650;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .field-binding-option .field-binding-code {
            grid-column: 1 / -1;
            min-width: 0;
            overflow: hidden;
            color: var(--muted);
            font-size: 11px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .field-binding-option .source-status {
            justify-self: end;
        }
        .field-binding-option.active {
            border-color: var(--accent);
            background: #e8f5f3;
        }
        .field-binding-empty {
            padding: 8px;
            border: 1px dashed var(--line);
            border-radius: 4px;
            color: var(--muted);
            font-size: 12px;
            background: #fbfcfd;
        }
        .output {
            min-height: 220px;
            border: 1px solid var(--line);
            border-radius: 4px;
            overflow: hidden;
            background: #edf0f3;
        }
        .output img { width: 100%; height: 280px; object-fit: contain; display: block; background: #fff; }
        .status {
            min-height: 34px;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
        }
        .status.ok { color: var(--accent-dark); }
        .status.error { color: var(--danger); }
        @media (max-width: 1180px) {
            header {
                height: auto;
                min-height: 56px;
                align-items: flex-start;
                flex-direction: column;
                padding: 12px;
            }
            .header-left {
                width: 100%;
                align-items: flex-start;
                flex-direction: column;
                gap: 10px;
            }
            .workspace-mode-switcher {
                width: 100%;
                grid-template-columns: repeat(4, 1fr);
            }
            main, main.template-workbench {
                grid-template-columns: 1fr;
                height: auto;
                min-height: calc(100vh - 112px);
            }
            .support-grid { grid-template-columns: 1fr; }
            .editor-tools { grid-template-columns: 1fr; }
            .toolbar-mode-shell { grid-template-columns: 1fr; }
            .toolbar-mode-summary { white-space: normal; }
            .canvasWorkspace .body { overflow: auto; }
            .canvas-quick-inspector {
                left: 28px;
                right: auto;
            }
            .modification-action-dock {
                left: 16px;
                right: 16px;
                bottom: 16px;
                width: auto;
                grid-template-columns: 1fr;
                transform: none;
            }
            .modification-dock-controls {
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
<header>
    <div class="header-left">
        <h1>模板维护中心</h1>
        <div class="workspace-mode-switcher" id="workspaceModeSwitcher" aria-label="工作区模式">
            <button type="button" class="active" data-workspace-mode="balanced">平衡</button>
            <button type="button" data-workspace-mode="fields">字段</button>
            <button type="button" data-workspace-mode="inspect">属性</button>
            <button type="button" data-workspace-mode="canvas">画布</button>
        </div>
    </div>
    <a href="/print-workbench">箱贴打印工作台</a>
</header>
<main class="template-workbench template-workbench-mode-balanced" data-active-workspace-mode="balanced">
    <section class="resource-sidebar">
        <div class="section-title">工作资源</div>
        <div class="panel-tabs" id="resourceTabs">
            <button type="button" class="active" data-resource-tab="templates">模板</button>
            <button type="button" data-resource-tab="fields">字段</button>
            <button type="button" data-resource-tab="layers">图层</button>
        </div>
        <div class="body">
            <div class="tab-panel active" id="resourcePanelTemplates" data-resource-panel="templates">
            <div class="row">
                <div class="field">
                    <label for="labelType">类型</label>
                    <select id="labelType">
                        <option value="BOX">箱贴</option>
                        <option value="BAG">袋贴</option>
                    </select>
                </div>
                <div class="field">
                    <label for="templateStatus">状态</label>
                    <select id="templateStatus">
                        <option value="">全部</option>
                        <option value="ACTIVE">启用</option>
                        <option value="DRAFT">草稿</option>
                    </select>
                </div>
            </div>
            <div class="actions">
                <button id="reloadTemplatesBtn" class="primary">刷新模板</button>
                <button id="legacyImportBtn">旧模板导入</button>
                <button id="imageImportBtn">样张识别</button>
            </div>
            <div id="templates" class="list"></div>

            <div class="template-basics-card" id="templateBasicsCard">
                <div class="template-basics-summary" id="templateBasicsSummary">
                    <div>
                        <strong id="templateSummaryName">请选择模板</strong>
                        <span id="templateSummaryMeta" class="muted">选择 CONFIG_LAYOUT 模板后可编辑基础信息。</span>
                    </div>
                    <button id="templateBasicsToggle" type="button" aria-expanded="false">编辑设置</button>
                </div>
                <div class="template-summary-metrics" id="templateSummaryMetrics">
                    <div class="template-summary-metric"><span>页面</span><strong id="templateSummarySize">120x80mm</strong></div>
                    <div class="template-summary-metric"><span>元素</span><strong id="templateSummaryElements">0</strong></div>
                    <div class="template-summary-metric"><span>体检</span><strong id="templateSummaryHealth">待选择</strong></div>
                </div>
                <div class="template-settings-panel collapsed" id="templateSettingsPanel">
                    <div class="template-settings-grid">
                        <div class="field wide">
                            <label for="templateCode">模板编码</label>
                            <input id="templateCode">
                        </div>
                        <div class="field wide">
                            <label for="templateName">模板名称</label>
                            <input id="templateName">
                        </div>
                        <div class="field">
                            <label for="pageWidthMm">宽 mm</label>
                            <input id="pageWidthMm" type="number" value="120">
                        </div>
                        <div class="field">
                            <label for="pageHeightMm">高 mm</label>
                            <input id="pageHeightMm" type="number" value="80">
                        </div>
                    </div>
                    <div class="page-preset-strip">
                        <label for="pagePresetSelect">版面预设</label>
                        <div class="page-preset-controls">
                            <select id="pagePresetSelect">
                                <option value="">自定义尺寸</option>
                                <option value="120x80">箱贴 120 x 80</option>
                                <option value="100x60">紧凑箱贴 100 x 60</option>
                                <option value="80x50">小标签 80 x 50</option>
                                <option value="150x100">大箱贴 150 x 100</option>
                            </select>
                            <button id="applyPagePresetBtn" type="button">应用尺寸</button>
                        </div>
                    </div>
                    <div class="actions template-edit-actions">
                        <button id="saveTemplateBtn">保存基础信息</button>
                        <button id="copyTemplateBtn">复制模板</button>
                        <button id="saveAllTemplateBtn" class="primary wide" type="button">保存全部</button>
                    </div>
                </div>
            </div>
            </div>
            <div class="tab-panel" id="resourcePanelFields" data-resource-panel="fields">
                <div class="support-panel" id="fieldPaletteSupport">
