server.port=8088
spring.application.name=java8-boxlabel-service

# Default profile: local fake operational database.
# SQL Server/local profiles can override this to point the same LP_* tables at a real database.
spring.datasource.url=jdbc:h2:mem:boxlabel-${random.uuid};MODE=MSSQLServer;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=true

cx.printing.template-path=src/main/resources/reports
cx.printing.logo-path=src/main/resources/static/logo
cx.printing.output-path=target/boxlabel-output
cx.printing.u8-database-name=UFDATA_001_2018
cx.printing.file-retention-hours=24
